<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Excel para Todos — Curso gratis de Iván Rodríguez</title>
<meta name="description" content="Aprende Excel desde cero hasta avanzado, gratis, desde tu celular. Curso del canal de Iván Rodríguez, con práctica interactiva y certificado.">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta name="referrer" content="no-referrer">
<meta name="theme-color" content="#217346">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --verde:#217346; --verde-osc:#17532f; --verde-claro:#e8f5ee;
  --amarillo:#ffc800; --rojo:#e05353; --rojo-claro:#fdecec;
  --gris:#b7c2bb; --texto:#213229; --texto2:#5b6f63;
  --fondo:#f2f7f4; --blanco:#ffffff; --azul:#2b6cb0;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:linear-gradient(180deg,#f4f9f6 0%,#e7f1ea 55%,#f2f7f4 100%) fixed, var(--fondo);
  color:var(--texto); font-size:17px; line-height:1.5;
  padding-bottom:40px;
}
.nodo.hecho .circ{background:linear-gradient(160deg,#2c8f58,#17532f);}
.nodo .circ{transition:box-shadow .2s;}
button{font-family:inherit;}
.wrap{max-width:520px;margin:0 auto;padding:0 16px;}

/* ---------- Barra superior ---------- */
.topbar{position:sticky;top:0;z-index:50;background:var(--verde);color:#fff;padding:12px 0;box-shadow:0 2px 10px rgba(0,0,0,.15);}
.topbar .wrap{display:flex;align-items:center;gap:10px;}
.logo{font-size:26px;background:#fff;border-radius:10px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;flex:none;}
.tb-tit{font-weight:800;font-size:18px;line-height:1.15;}
.tb-sub{font-size:12px;opacity:.9;}
.tb-right{margin-left:auto;text-align:right;}
.tb-pct{font-weight:800;font-size:18px;}
.tb-pctl{font-size:11px;opacity:.9;}
.pbar{height:8px;background:rgba(255,255,255,.25);border-radius:99px;margin-top:8px;overflow:hidden;}
.pbar>div{height:100%;background:var(--amarillo);border-radius:99px;transition:width .6s ease;}

/* ---------- Portada / bienvenida ---------- */
.hero{background:linear-gradient(160deg,var(--verde) 0%,var(--verde-osc) 100%);color:#fff;border-radius:22px;padding:22px 20px;margin:16px 0;box-shadow:0 8px 24px rgba(23,83,47,.25);}
.hero h1{margin:0 0 6px;font-size:24px;line-height:1.2;}
.hero p{margin:0;font-size:15px;opacity:.95;}
.hero .saludo{font-size:15px;background:rgba(255,255,255,.15);display:inline-block;padding:4px 12px;border-radius:99px;margin-bottom:10px;}

/* ---------- Secciones de nivel ---------- */
.nivel-head{display:flex;align-items:center;gap:12px;background:var(--blanco);border-radius:18px;padding:14px 16px;margin:26px 0 8px;box-shadow:0 3px 10px rgba(0,0,0,.06);border-left:8px solid var(--verde);}
.nivel-head.bloq{filter:grayscale(1);opacity:.7;}
.nh-ico{font-size:32px;}
.nh-tit{font-weight:800;font-size:18px;}
.nh-sub{font-size:13px;color:var(--texto2);}
.nh-prog{margin-left:auto;font-weight:800;color:var(--verde);font-size:15px;white-space:nowrap;}

/* ---------- Camino de lecciones ---------- */
.camino{display:flex;flex-direction:column;align-items:center;padding:8px 0 4px;}
.nodo{position:relative;margin:10px 0;border:none;background:none;padding:0;cursor:pointer;transition:transform .15s;}
.nodo:active{transform:scale(.93);}
.nodo .circ{
  width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:30px;background:var(--blanco);border:4px solid var(--gris);
  box-shadow:0 5px 0 #cfd8d2;position:relative;
}
.nodo.izq{transform:translateX(-64px);} .nodo.izq:active{transform:translateX(-64px) scale(.93);}
.nodo.der{transform:translateX(64px);} .nodo.der:active{transform:translateX(64px) scale(.93);}
.nodo.hecho .circ{border-color:var(--verde);background:var(--verde);box-shadow:0 5px 0 var(--verde-osc);}
.nodo.actual .circ{border-color:var(--verde);background:#fff;box-shadow:0 5px 0 #b9d8c6;animation:pulso 1.6s infinite;}
.nodo.bloq .circ{opacity:.55;filter:grayscale(1);}
@keyframes pulso{0%,100%{outline:4px solid rgba(33,115,70,.0);outline-offset:2px;}50%{outline:4px solid rgba(33,115,70,.35);outline-offset:6px;}}
.nodo .etq{margin-top:6px;font-size:12.5px;font-weight:700;color:var(--texto2);max-width:120px;text-align:center;line-height:1.2;}
.nodo.hecho .etq,.nodo.actual .etq{color:var(--texto);}
.nodo .stars{position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:13px;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,.25);}
.nodo .empieza{position:absolute;top:-34px;left:50%;transform:translateX(-50%);background:var(--verde);color:#fff;font-size:12px;font-weight:800;padding:4px 10px;border-radius:10px;white-space:nowrap;animation:flota 1.4s infinite;}
.nodo .empieza:after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--verde);}
@keyframes flota{0%,100%{transform:translate(-50%,0);}50%{transform:translate(-50%,-4px);}}
.nodo.cert .circ{border-radius:22px;font-size:34px;border-color:var(--amarillo);}
.nodo.cert.hecho .circ{background:var(--amarillo);box-shadow:0 5px 0 #cfa300;}

/* ---------- Pantalla de lección ---------- */
.pantalla{position:fixed;inset:0;background:var(--fondo);z-index:100;display:flex;flex-direction:column;animation:entra .25s ease;}
@keyframes entra{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.p-head{background:var(--blanco);padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.btn-x{border:none;background:#eef3ef;color:var(--texto2);width:38px;height:38px;border-radius:50%;font-size:18px;font-weight:800;cursor:pointer;flex:none;}
.p-prog{flex:1;height:12px;background:#e2eae5;border-radius:99px;overflow:hidden;}
.p-prog>div{height:100%;background:var(--verde);border-radius:99px;transition:width .4s;}
.p-body{flex:1;overflow-y:auto;padding:18px 16px 110px;-webkit-overflow-scrolling:touch;}
.p-body .wrap{padding:0;}
.p-foot{position:fixed;left:0;right:0;bottom:0;background:var(--blanco);padding:14px 16px calc(14px + env(safe-area-inset-bottom));box-shadow:0 -4px 14px rgba(0,0,0,.08);}
.btn{display:block;width:100%;max-width:520px;margin:0 auto;border:none;border-radius:16px;padding:16px;font-size:18px;font-weight:800;cursor:pointer;transition:transform .1s;}
.btn:active{transform:scale(.97);}
.btn-verde{background:var(--verde);color:#fff;box-shadow:0 4px 0 var(--verde-osc);}
.btn-gris{background:#dfe7e2;color:#8fa096;box-shadow:0 4px 0 #c4cfc8;cursor:default;}
.btn-blanco{background:#fff;color:var(--verde);border:2px solid var(--verde);margin-top:10px;}

.paso-tag{display:inline-block;background:var(--verde-claro);color:var(--verde);font-weight:800;font-size:13px;padding:5px 14px;border-radius:99px;margin-bottom:10px;}
.audio-bar{display:flex;gap:8px;margin:0 0 14px;}
.btn-audio{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;background:linear-gradient(135deg,#2b6cb0,#1a4e85);color:#fff;font-weight:800;font-size:15.5px;border-radius:14px;padding:13px 14px;cursor:pointer;box-shadow:0 4px 0 #143a63;}
.btn-audio:active{transform:translateY(2px);box-shadow:0 2px 0 #143a63;}
.btn-audio.sonando{background:linear-gradient(135deg,#e05353,#b83b3b);box-shadow:0 4px 0 #8a2b2b;animation:pulso-audio .9s infinite;}
@keyframes pulso-audio{0%,100%{filter:brightness(1);}50%{filter:brightness(1.18);}}
.btn-vel{flex:none;border:none;background:#fff3cd;color:#7a6200;font-weight:800;font-size:14px;border-radius:14px;padding:13px 15px;cursor:pointer;box-shadow:0 4px 0 #e6cf82;white-space:nowrap;}
.btn-vel:active{transform:translateY(2px);box-shadow:0 2px 0 #e6cf82;}
.lec-tit{font-size:23px;font-weight:800;margin:0 0 14px;line-height:1.25;}
.charla{background:var(--blanco);border-radius:18px;padding:18px;box-shadow:0 3px 10px rgba(0,0,0,.05);font-size:16.5px;}
.charla p{margin:0 0 14px;} .charla p:last-child{margin-bottom:0;}
.charla b{color:var(--verde-osc);}
.tip{background:#fff8e1;border-left:5px solid var(--amarillo);border-radius:12px;padding:12px 14px;margin-top:14px;font-size:15px;}
.formula-pill{display:inline-block;background:#eef2ff;color:var(--azul);font-family:ui-monospace,Menlo,Consolas,monospace;font-weight:700;font-size:14.5px;padding:2px 8px;border-radius:8px;}

/* ---------- Hoja de Excel simulada ---------- */
.xl{background:#fff;border-radius:14px;overflow-x:auto;box-shadow:0 3px 12px rgba(0,0,0,.08);margin:14px 0;border:1px solid #d8dfda;-webkit-overflow-scrolling:touch;}
.xl-top{display:flex;align-items:center;gap:8px;background:#f1f4f2;padding:8px 10px;border-bottom:1px solid #d8dfda;}
.xl-name{display:flex;gap:5px;}
.xl-name span{width:11px;height:11px;border-radius:50%;}
.xl-fx{flex:1;display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #cfd8d2;border-radius:8px;padding:4px 8px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13.5px;color:var(--azul);overflow-x:auto;white-space:nowrap;}
.xl-fx b{color:#888;font-style:italic;font-family:serif;}
.xl-grid{width:100%;border-collapse:collapse;font-size:14px;}
.xl-grid th{background:#e9edeb;color:#6b7a70;font-weight:700;font-size:12px;border:1px solid #d8dfda;padding:4px 6px;min-width:26px;}
.xl-grid td{border:1px solid #dfe5e1;padding:6px 8px;background:#fff;min-width:52px;}
.xl-grid td.num{text-align:right;font-variant-numeric:tabular-nums;}
.xl-grid td.hdr{font-weight:800;background:var(--verde-claro);color:var(--verde-osc);}
.xl-grid td.sel{outline:3px solid var(--verde);outline-offset:-3px;background:#f2fbf6;font-weight:800;position:relative;}
.xl-grid td.res{color:var(--azul);font-weight:800;}
.xl-cap{font-size:13px;color:var(--texto2);padding:8px 12px;background:#fafcfa;border-top:1px solid #eef1ef;}
.pasos{background:var(--blanco);border-radius:18px;padding:6px 18px 10px;box-shadow:0 3px 10px rgba(0,0,0,.05);margin-top:14px;counter-reset:p;}
.pasos h4{margin:12px 0 4px;font-size:16px;}
.pasos ol{margin:8px 0;padding-left:0;list-style:none;}
.pasos li{position:relative;padding:8px 0 8px 42px;counter-increment:p;font-size:15.5px;border-bottom:1px dashed #e5ebe7;}
.pasos li:last-child{border-bottom:none;}
.pasos li:before{content:counter(p);position:absolute;left:0;top:8px;width:28px;height:28px;background:var(--verde);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;}

/* ---------- Quiz ---------- */
.q-preg{background:var(--blanco);border-radius:18px;padding:18px;box-shadow:0 3px 10px rgba(0,0,0,.05);font-size:18px;font-weight:700;margin-bottom:16px;}
.q-op{display:block;width:100%;text-align:left;background:var(--blanco);border:2.5px solid #dfe7e2;border-radius:16px;padding:14px 16px;font-size:16.5px;margin-bottom:10px;cursor:pointer;box-shadow:0 3px 0 #e3eae5;transition:transform .1s;}
.q-op:active{transform:scale(.98);}
.q-op .letra{display:inline-flex;width:28px;height:28px;border-radius:50%;background:#eef3ef;color:var(--texto2);font-weight:800;align-items:center;justify-content:center;margin-right:10px;font-size:14px;}
.q-op.ok{border-color:var(--verde);background:var(--verde-claro);box-shadow:0 3px 0 #bcd9c8;}
.q-op.ok .letra{background:var(--verde);color:#fff;}
.q-op.mal{border-color:var(--rojo);background:var(--rojo-claro);box-shadow:0 3px 0 #eec3c3;}
.q-op.mal .letra{background:var(--rojo);color:#fff;}
.q-op:disabled{opacity:1;}
.q-op.apagada{opacity:.5;}
.q-fb{border-radius:16px;padding:14px 16px;margin-top:6px;font-size:15.5px;animation:entra .25s;}
.q-fb.ok{background:var(--verde-claro);border:2px solid var(--verde);}
.q-fb.mal{background:var(--rojo-claro);border:2px solid var(--rojo);}
.q-fb b{display:block;font-size:17px;margin-bottom:4px;}

/* ---------- Resultado ---------- */
.res-box{text-align:center;padding:30px 10px;}
.res-emoji{font-size:74px;animation:salta .6s ease;}
@keyframes salta{0%{transform:scale(.3);}60%{transform:scale(1.15);}100%{transform:scale(1);}}
.res-tit{font-size:26px;font-weight:800;margin:10px 0 4px;}
.res-sub{color:var(--texto2);font-size:16px;margin-bottom:18px;}
.res-stars{font-size:44px;letter-spacing:6px;margin:8px 0 18px;}
.res-score{display:inline-block;background:var(--blanco);border-radius:16px;padding:12px 22px;font-size:17px;font-weight:700;box-shadow:0 3px 10px rgba(0,0,0,.06);}

/* ---------- Certificado ---------- */
.cert-box{background:var(--blanco);border-radius:20px;padding:24px 20px;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.07);margin-top:10px;}
.cert-box input{width:100%;border:2px solid #cfd8d2;border-radius:14px;padding:14px;font-size:17px;margin:12px 0;text-align:center;font-family:inherit;}
.cert-box input:focus{outline:none;border-color:var(--verde);}

/* ---------- Modal nombre ---------- */
.velo{position:fixed;inset:0;background:rgba(20,40,28,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#fff;border-radius:22px;padding:26px 22px;max-width:400px;width:100%;text-align:center;animation:entra .3s;}
.modal h2{margin:6px 0 8px;font-size:22px;}
.modal p{color:var(--texto2);font-size:15px;margin:0 0 14px;}
.modal input{width:100%;border:2px solid #cfd8d2;border-radius:14px;padding:14px;font-size:17px;text-align:center;margin-bottom:14px;font-family:inherit;}
.modal input:focus{outline:none;border-color:var(--verde);}

/* ---------- Puntos y avatar ---------- */
.coin{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.18);border-radius:99px;padding:3px 10px;font-weight:800;font-size:14px;}
.avatar{position:relative;display:inline-block;width:74px;height:74px;flex:none;}
.avatar .aura{position:absolute;inset:-8px;font-size:22px;opacity:.9;display:flex;align-items:flex-start;justify-content:space-between;pointer-events:none;}
.avatar .base{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:52px;}
.avatar .top{position:absolute;top:-16px;left:50%;transform:translateX(-50%) rotate(-8deg);font-size:28px;z-index:2;}
.avatar .face{position:absolute;top:26px;left:50%;transform:translateX(-50%);font-size:24px;z-index:2;}
.avatar.mini{width:44px;height:44px;}
.avatar.mini .base{font-size:32px;} .avatar.mini .top{font-size:17px;top:-9px;} .avatar.mini .face{font-size:14px;top:16px;} .avatar.mini .aura{font-size:13px;inset:-4px;}
.avatar.xl{width:110px;height:110px;} .avatar.xl .base{font-size:80px;} .avatar.xl .top{font-size:42px;top:-22px;} .avatar.xl .face{font-size:36px;top:40px;} .avatar.xl .aura{font-size:30px;inset:-12px;}
.perfil{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.13);border-radius:16px;padding:12px 14px;margin-top:14px;}
.perfil .pf-n{font-weight:800;font-size:16px;}
.perfil .pf-p{font-size:13px;opacity:.9;}
.btn-tienda{margin-left:auto;background:var(--amarillo);color:#5c4a00;border:none;border-radius:14px;padding:10px 14px;font-weight:800;font-size:14px;cursor:pointer;box-shadow:0 3px 0 #cfa300;white-space:nowrap;}
.btn-tienda:active{transform:scale(.95);}
.pts-gana{display:inline-block;background:#fff8e1;border:2px solid var(--amarillo);color:#7a6200;font-weight:800;border-radius:99px;padding:6px 16px;font-size:17px;animation:salta .5s;}
/* ---------- Tiendita ---------- */
.t-tabs{display:flex;gap:8px;margin:4px 0 14px;}
.t-tab{flex:1;border:none;border-radius:12px;padding:10px;font-weight:800;font-size:15px;background:#e2eae5;color:var(--texto2);cursor:pointer;}
.t-tab.on{background:var(--verde);color:#fff;}
.t-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.t-item{background:var(--blanco);border-radius:18px;padding:14px 10px;text-align:center;box-shadow:0 3px 10px rgba(0,0,0,.06);border:2.5px solid transparent;position:relative;}
.t-item.equipado{border-color:var(--verde);}
.t-item .ti-e{font-size:44px;line-height:1.2;}
.t-item .ti-n{font-weight:800;font-size:14.5px;margin:4px 0 2px;}
.t-item .ti-d{font-size:12px;color:var(--texto2);min-height:28px;}
.t-item button{width:100%;border:none;border-radius:12px;padding:9px;font-weight:800;font-size:14px;cursor:pointer;margin-top:8px;}
.t-comprar{background:var(--amarillo);color:#5c4a00;box-shadow:0 3px 0 #cfa300;}
.t-comprar:disabled{background:#e8e8e8;color:#aaa;box-shadow:none;}
.t-equipar{background:#e8f5ee;color:var(--verde);}
.t-item .puesto{position:absolute;top:8px;right:8px;background:var(--verde);color:#fff;font-size:10.5px;font-weight:800;border-radius:99px;padding:3px 8px;}
.t-saldo{position:sticky;top:0;z-index:5;background:var(--verde);color:#fff;border-radius:14px;padding:10px 16px;font-weight:800;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;box-shadow:0 4px 12px rgba(23,83,47,.3);}
/* ---------- Mascota compañera ---------- */
.mascota{position:fixed;right:12px;bottom:104px;z-index:150;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation;animation:m-idle 3s ease-in-out infinite;filter:drop-shadow(0 4px 6px rgba(0,0,0,.2));}
.mascota .burbuja{position:absolute;top:-34px;right:44px;background:#fff;border-radius:14px;border-bottom-right-radius:2px;padding:5px 12px;font-size:19px;font-weight:800;box-shadow:0 3px 12px rgba(0,0,0,.18);opacity:0;transform:scale(.4);transition:all .2s;white-space:nowrap;pointer-events:none;}
.mascota.hablando .burbuja{opacity:1;transform:scale(1);}
.mascota.feliz{animation:m-salto .55s ease 2;}
.mascota.molesto{animation:m-tiembla .4s ease 2;}
.mascota.amor{animation:m-baile .65s ease 2;}
@keyframes m-idle{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes m-salto{0%,100%{transform:translateY(0);}40%{transform:translateY(-20px) rotate(-8deg);}70%{transform:translateY(0) rotate(5deg);}}
@keyframes m-tiembla{0%,100%{transform:translateX(0);}20%{transform:translateX(-7px) rotate(-7deg);}40%{transform:translateX(7px) rotate(7deg);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
@keyframes m-baile{0%,100%{transform:rotate(0) scale(1);}30%{transform:rotate(-10deg) scale(1.15);}60%{transform:rotate(10deg) scale(1.15);}}
.footerlinks{text-align:center;margin:34px 0 10px;font-size:13px;color:var(--texto2);}
.footerlinks button{border:none;background:none;color:var(--texto2);text-decoration:underline;font-size:13px;cursor:pointer;}
.confeti{position:fixed;top:-20px;font-size:22px;z-index:300;animation:cae linear forwards;pointer-events:none;}
@keyframes cae{to{transform:translateY(110vh) rotate(720deg);}}
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <div class="wrap">
    <div class="logo">📊</div>
    <div>
      <div class="tb-tit">Excel para Todos</div>
      <div class="tb-sub">Canal de Iván Rodríguez</div>
    </div>
    <button id="btnMute" onclick="toggleMute()" style="border:none;background:rgba(255,255,255,.18);color:#fff;width:38px;height:38px;border-radius:50%;font-size:18px;cursor:pointer;flex:none">🔊</button>
    <div class="tb-right">
      <div class="coin" id="tbCoins">🪙 0</div>
      <div class="tb-pctl" style="margin-top:3px"><span class="tb-pct" id="tbPct" style="font-size:14px">0%</span> completado</div>
    </div>
  </div>
  <div class="wrap"><div class="pbar"><div id="tbBar" style="width:0%"></div></div></div>
</div>

<div class="wrap" id="home"></div>
<div id="pantallas"></div>

<script>
/* =========================================================
   DATOS DEL CURSO
   ========================================================= */
const DATA = [

{t:'¿Qué es Excel y para qué sirve?', e:'👋',

{t:'La pantalla: celdas, filas y columnas', e:'🗺️',
txt:'<p>Vamos a conocer el terreno. En Excel todo tiene nombre y es más fácil de lo que parece:</p><p>📍 Las <b>columnas</b> son las verticales y se llaman con letras: A, B, C...<br>📍 Las <b>filas</b> son las horizontales y se llaman con números: 1, 2, 3...<br>📍 Cada cuadrito se llama <b>celda</b>, y su nombre es la letra + el número: la celda <b>B3</b> está en la columna B, fila 3. ¡Como Batalla Naval!</p><p>Arriba hay una barra larga llamada <b>barra de fórmulas</b> (dice <i>fx</i>): ahí ves lo que de verdad hay dentro de la celda.</p><div class="tip">💡 Abajo a la izquierda verás pestañas que dicen <b>Hoja1, Hoja2</b>... Un mismo archivo puede tener varias hojas, como un cuaderno con varias páginas.</div>',
ex:{tit:'Encuentra la celda B3', desc:'Mira la hoja: la celda seleccionada (con borde verde) es la B3, porque está en la columna B y la fila 3.',
grid:[['','',''],['','',''],['','Aquí es B3',''],['','','']],
sel:'B3', formula:'', cap:'El nombre de la celda seleccionada aparece siempre arriba a la izquierda, en el "cuadro de nombres".',
pasos:['Abre Excel y toca cualquier celda: mira cómo se marca con un borde.','Fíjate arriba a la izquierda: aparece el nombre de la celda (ej: C5).','Practica: busca y toca la celda A1, luego la D4. ¡Ya sabes ubicarte!']},

{q:'¿Cómo se llaman las columnas en Excel?', o:['Con números: 1, 2, 3','Con letras: A, B, C','Con colores','Con nombres de personas'], c:1, fb:'Columnas = letras (A, B, C...). Filas = números (1, 2, 3...).'},
{q:'La celda que está en la columna C y la fila 5 se llama...', o:['5C','C5','CC5','Celda 35'], c:1, fb:'Primero la letra de la columna y luego el número de la fila: C5.'},

{t:'Escribir, borrar y corregir', e:'✍️',
txt:'<p>Ahora sí, manos a la obra. Escribir en Excel es facilísimo:</p><p>1️⃣ <b>Para escribir:</b> toca la celda y escribe. Al terminar, presiona <b>Enter</b> y el dato queda guardado en la celda.<br>2️⃣ <b>Para borrar:</b> toca la celda y presiona la tecla <b>Suprimir</b> (Delete). En el celular: toca la celda y elige "Borrar".<br>3️⃣ <b>Para corregir sin borrar todo:</b> haz <b>doble clic</b> (o doble toque) en la celda y edita solo lo que necesites.</p><p>Ojo con esto: los <b>números</b> se alinean solos a la derecha y los <b>textos</b> a la izquierda. Así Excel te avisa qué entendió.</p><div class="tip">💡 ¿Escribiste en la celda equivocada? Presiona la tecla <b>Esc</b> antes de dar Enter y no pasa nada. Y el botón <b>deshacer (↩️ Ctrl+Z)</b> es tu mejor amigo: revierte el último error.</div>',

{t:'Guardar tu archivo (¡no pierdas tu trabajo!)', e:'💾',
txt:'<p>Esto es sagrado: <b>de nada sirve trabajar 2 horas si no guardas</b>. Grábatelo.</p><p>En el computador: menú <b>Archivo → Guardar como</b>, eliges dónde (por ejemplo, Documentos), le pones un nombre claro y listo. Después, para guardar cambios basta con <b>Ctrl+G</b> (o Ctrl+S) o el botón del disquito 💾.</p><p>En el celular con la app de Excel, se guarda casi solo, pero revisa que diga "Guardado".</p><p>Un consejo de oro: ponle <b>nombres que se entiendan</b>. "Cuentas_casa_julio" es mil veces mejor que "Libro1".</p><div class="tip">💡 El archivo de Excel queda con terminación <b>.xlsx</b>. Así lo reconoces cuando te lo manden por WhatsApp o correo.</div>',
ex:{tit:'Guardando las cuentas de la casa', desc:'Hiciste esta tablita de gastos. Antes de cerrar, hay que guardarla con un buen nombre.',
grid:[['Gasto','Valor'],['Arriendo','$ 500.000'],['Servicios','$ 180.000'],['Mercado','$ 400.000']],
sel:'A1', formula:'', cap:'Nombre sugerido para este archivo: "Gastos_casa_2026.xlsx". Claro y fácil de encontrar.',
pasos:['Con tu lista del mercado abierta, ve a Archivo → Guardar como.','Elige la carpeta Documentos y escribe: Mi_primera_lista.','Cierra Excel, vuelve a abrirlo y busca tu archivo en "Recientes". ¡Ahí está!','De ahora en adelante: Ctrl+G cada tanto, por si acaso.']},
quiz:[
{q:'¿Cuál es el atajo para guardar rápido?', o:['Ctrl+Z','Ctrl+G (o Ctrl+S)','Ctrl+X','Enter'], c:1, fb:'Ctrl+G (Guardar) en Excel en español, o Ctrl+S. Hazlo seguido y no pierdes nada.'},
{q:'¿Cuál es el mejor nombre para un archivo de gastos de julio?', o:['Libro1','archivo final FINAL2','Gastos_casa_julio','asdfgh'], c:2, fb:'Un nombre claro te ahorra horas buscando. "Gastos_casa_julio" se entiende de una.'},
{q:'¿Con qué terminación quedan los archivos de Excel?', o:['.pdf','.docx','.xlsx','.jpg'], c:2, fb:'.xlsx es la marca de los archivos de Excel. Así los reconoces donde los veas.'}]},

{t:'Copiar, pegar, cortar y mover', e:'📋',
txt:'<p>Estos atajos te van a ahorrar la vida entera. Apréndetelos como el número de tu cédula:</p><p>📄 <b>Copiar: Ctrl+C</b> — hace una copia de la celda.<br>📌 <b>Pegar: Ctrl+V</b> — pone la copia donde estés.<br>✂️ <b>Cortar: Ctrl+X</b> — se lleva la celda para pegarla en otro lado (mover).</p><p>¿Y para seleccionar varias celdas? <b>Haz clic y arrastra</b> sobre ellas (en celular: toca y arrastra los circulitos azules). Verás que se pintan de gris: eso se llama <b>rango</b>. Por ejemplo, de A1 a A5 se escribe <b>A1:A5</b>.</p><div class="tip">💡 También puedes mover celdas agarrándolas por el borde con el mouse y arrastrándolas. ¡Como mover fichas de parqués!</div>',
ex:{tit:'Duplicando la lista sin volver a escribir', desc:'Tienes la lista de la semana 1 y la semana 2 es casi igual. En vez de escribir todo otra vez: selecciona, copia y pega.',
grid:[['Semana 1','','Semana 2'],['Arroz','','Arroz'],['Aceite','','Aceite'],['Panela','','Panela']],
sel:'C2', formula:'', cap:'Se seleccionó A2:A4, se copió con Ctrl+C, se tocó la celda C2 y se pegó con Ctrl+V. Tres segundos, cero esfuerzo.',
pasos:['Selecciona de A2 hasta A4 arrastrando el mouse (queda gris).','Presiona Ctrl+C: verás un borde punteado bailando alrededor.','Toca la celda C2 y presiona Ctrl+V. ¡Lista copiada!','Ahora prueba Ctrl+X en una celda y pégala en otra: eso es mover.']},
quiz:[
{q:'¿Cuál es el trío de atajos copiar / pegar / cortar?', o:['Ctrl+C / Ctrl+V / Ctrl+X','Ctrl+A / Ctrl+B / Ctrl+C','Ctrl+Z / Ctrl+Y / Ctrl+W','F1 / F2 / F3'], c:0, fb:'Ctrl+C copia, Ctrl+V pega, Ctrl+X corta. El trío de oro de la informática.'},
{q:'¿Cómo se escribe el rango que va de la celda B2 a la B6?', o:['B2-B6','B2+B6','B2:B6','B2aB6'], c:2, fb:'Los dos puntos (:) significan "desde... hasta". B2:B6 = de B2 hasta B6.'},
{q:'Quieres MOVER un dato a otra celda (que no quede en las dos). ¿Qué usas?', o:['Ctrl+C y Ctrl+V','Ctrl+X y Ctrl+V','Ctrl+Z','Lo escribes dos veces'], c:1, fb:'Cortar (Ctrl+X) y pegar (Ctrl+V) mueve el dato. Copiar lo dejaría repetido.'}]},

{t:'Ajustar columnas y filas', e:'↔️',
txt:'<p>¿Te ha pasado que escribes "Supermercado La Economía" y el texto se sale del cuadrito o se ve cortado? Tranquilo, la columna solo está muy angosta.</p><p>La solución: lleva el mouse a la <b>línea que separa las letras de las columnas</b> (entre la A y la B, por ejemplo). El cursor se convierte en una flechita doble ↔. Ahí:</p><p>👉 <b>Arrastra</b> para dar el ancho que quieras, o<br>👉 Haz <b>doble clic</b> y la columna se ajusta sola al contenido más largo. ¡Magia!</p><p>Con las filas es igual, pero en los números del lado izquierdo.</p><div class="tip">💡 Si en una celda ves <b>#####</b> no es un error grave: solo significa "la columna está muy angosta para mostrar este número". Ensánchala y listo.</div>',
ex:{tit:'Antes y después de ajustar', desc:'Arriba: columna angosta con textos cortados y números convertidos en #####. Abajo: después del doble clic en el borde de la columna (o de arrastrar los circulitos azules en el celular).',
antes:[['Cliente','Deuda'],['María Fernan…','#####'],['Jorge Rodríg…','#####'],['Tienda Don J…','#####']],
grid:[['Cliente','Deuda'],['María Fernanda López','$ 45.000'],['Jorge Rodríguez P.','$ 30.000'],['Tienda Don José','$ 120.000']],
sel:'A2', formula:'', cap:'Doble clic en el borde derecho de la letra "A" ajusta la columna automáticamente al texto más largo. Los datos siempre estuvieron completos: solo faltaba espacio para verlos.',
pasos:['Escribe un texto largo en A1, como el nombre completo de alguien.','Lleva el mouse a la línea entre las letras A y B hasta ver la flecha ↔.','Haz doble clic: la columna se ajusta sola.','Prueba también arrastrar para dejarla del ancho que tú quieras.']},
quiz:[
{q:'Ves ##### en una celda. ¿Qué significa?', o:['El archivo se dañó','Hay un virus','La columna está muy angosta para el número','Escribiste una clave'], c:2, fb:'Solo falta espacio. Ensancha la columna y el número aparece completo.'},
{q:'¿Cuál es la forma más rápida de ajustar una columna a su contenido?', o:['Borrar el texto largo','Doble clic en el borde de la letra de la columna','Escribir más pequeño','Cambiar de hoja'], c:1, fb:'Doble clic en el borde derecho del encabezado de la columna la autoajusta.'},
{q:'¿Dónde arrastras para cambiar la altura de una fila?', o:['En la barra fx','En el borde entre los números de fila','En cualquier celda','En el nombre del archivo'], c:1, fb:'En el borde entre los números de fila (lado izquierdo), igual que con las columnas pero en vertical.'}]},

{t:'Dale estilo: negrita, colores y bordes', e:'🎨',
txt:'<p>Una tabla bien presentada se entiende mejor y da gusto mostrarla. Los botones están en la pestaña <b>Inicio</b>:</p><p>🅱️ <b>Negrita (Ctrl+N):</b> para resaltar títulos y totales.<br>🎨 <b>Color de relleno</b> (el balde 🪣): pinta el fondo de las celdas.<br>🔤 <b>Color de fuente</b> (la letra A con color): cambia el color del texto.<br>⬜ <b>Bordes</b> (el cuadrito ⊞): dibuja las líneas de la tabla. Ojo: las líneas grises que ves normalmente NO salen al imprimir; los bordes sí.</p><p>La receta clásica: <b>encabezados con negrita y fondo de color, bordes en toda la tabla y el total resaltado</b>. Con eso cualquier tabla queda profesional.</p><div class="tip">💡 No abuses del color: 2 o 3 colores máximo. Una tabla arcoíris cansa la vista y se ve menos seria.</div>',
ex:{tit:'La misma tabla, pero elegante', desc:'A la tabla de ventas le pusimos: encabezado verde con negrita, bordes y el total en negrita. ¿A que se ve mejor?',
grid:[['Producto','Ventas'],['Empanadas','$ 30.000'],['Jugos','$ 22.000'],['TOTAL','$ 52.000']],
sel:'A1', formula:'', cap:'Selecciona primero las celdas y después aplica el formato: esa es siempre la regla en Excel.',
pasos:['Selecciona los encabezados (A1:B1).','En la pestaña Inicio: clic en Negrita y luego en el balde de color para el fondo.','Selecciona toda la tabla y en el botón de bordes elige "Todos los bordes".','Pon el total en negrita. ¡Tabla lista para mostrar!']},
quiz:[
{q:'¿Cuál es el atajo de negrita en Excel en español?', o:['Ctrl+B','Ctrl+N','Ctrl+G','Ctrl+E'], c:1, fb:'Ctrl+N (de Negrita) en Excel en español. En inglés es Ctrl+B.'},
{q:'¿Las líneas grises de la cuadrícula salen al imprimir?', o:['Sí, siempre','No: hay que ponerles bordes','Solo si es a color','Solo los martes'], c:1, fb:'La cuadrícula gris es solo de guía. Para que salgan líneas al imprimir, aplica bordes.'},
{q:'¿Qué haces PRIMERO antes de aplicar un formato?', o:['Guardar el archivo','Seleccionar las celdas','Imprimir','Cerrar Excel'], c:1, fb:'Primero seleccionas, después aplicas. Excel formatea lo que esté seleccionado.'}]},

{t:'Diseño bonito: de fea a profesional', e:'💅',
txt:'<p>Ya conoces los botones de formato. Ahora te enseño el <b>método completo</b> para que cualquier tabla tuya se vea de lujo. Síguelo siempre en este orden:</p><p>1️⃣ <b>Ordena los datos:</b> títulos en la fila 1, cada dato en su columna, sin filas vacías en el medio.<br>2️⃣ <b>Ajusta las columnas</b> (doble clic en el borde) para que nada quede cortado.<br>3️⃣ <b>Encabezados:</b> negrita + fondo de color + letra blanca. Que se noten.<br>4️⃣ <b>Bordes</b> en toda la tabla ("Todos los bordes").<br>5️⃣ <b>Formato de números:</b> moneda para plata, con sus puntos de miles.<br>6️⃣ <b>Resalta lo importante:</b> el total en negrita, quizás con un fondo suavecito.<br>7️⃣ <b>Alinea:</b> títulos centrados, textos a la izquierda, números a la derecha (solos se acomodan).</p><div class="tip">💡 Regla de diseño de los que saben: máximo 2 colores, tonos suaves, y mucho espacio en blanco. Menos es más. Una tabla sobria dice "aquí trabajó un profesional".</div>',
ex:{tit:'La tabla del restaurante, transformada', desc:'Mismos datos del restaurante de doña Rosa, aplicando el método de 7 pasos. Mira la diferencia:',
antes:[['ventas','',''],['almuerzos','48','432000'],['','',''],['jugos','60','150000'],['TOTAL?','','582000']],
grid:[['Producto','Cant.','Total'],['Almuerzos','48','$ 432.000'],['Jugos','60','$ 150.000'],['TOTAL','108','$ 582.000']],
sel:'A1', formula:'', cap:'Arriba: sin títulos claros, con filas vacías y números regados. Abajo: el método completo aplicado. Mismos datos, otro nivel.',
pasos:['Toma cualquier tabla tuya que esté "fea".','Aplica los 7 pasos EN ORDEN, uno por uno.','Compara con una foto de cómo estaba antes.','Guárdala: esa va a ser tu plantilla de referencia para todo.']},
quiz:[
{q:'¿Cuál es el primer paso del método de diseño?', o:['Poner colores','Ordenar los datos: títulos arriba y cada cosa en su columna','Imprimir','Poner bordes'], c:1, fb:'Primero el orden, después la belleza. Sin datos ordenados, el color no arregla nada.'},
{q:'¿Cuántos colores recomienda usar una tabla profesional?', o:['Todos los que se pueda','Máximo 2, en tonos suaves','Mínimo 5','Ninguno, prohibido'], c:1, fb:'Máximo 2 colores y tonos suaves. La sobriedad se ve profesional; el arcoíris, no.'},
{q:'¿Qué se resalta al final de la tabla?', o:['Nada','El total: negrita y fondo suave','Todas las celdas por igual','Solo la fecha'], c:1, fb:'El total es la estrella de la tabla: que se encuentre de un vistazo.'}]},

{t:'Formato de números: pesos, % y fechas', e:'💲',
txt:'<p>Excel puede mostrar el mismo número de muchas formas. En la pestaña <b>Inicio</b>, grupo "Número", están los botones:</p><p>💲 <b>Moneda:</b> convierte 50000 en <b>$ 50.000</b>. Ideal para cuentas de plata.<br>％ <b>Porcentaje:</b> convierte 0,25 en <b>25%</b>.<br>🔢 <b>Millares:</b> pone los puntos de miles para leer fácil.<br>📅 <b>Fecha:</b> si escribes 15/07/2026, Excel entiende que es una fecha.</p><p>Lo importante: <b>el formato no cambia el número, solo cómo se ve</b>. Por dentro sigue siendo 50000 y las cuentas salen perfectas.</p><div class="tip">💡 Nunca escribas el signo $ a mano dentro de la celda: escribe solo el número y aplica formato moneda. Si escribes "$50.000" como texto, Excel no podrá sumarlo.</div>',
ex:{tit:'Cuentas claras con formato de moneda', desc:'Arriba: números "pelados" que no se entienden, y un "$150.000" escrito a mano que quedó como TEXTO (mira que está pegado a la izquierda: ese no suma). Abajo: números limpios + formato de moneda y porcentaje.',
antes:[['Mes','Ahorro','Meta'],['Mayo','100000','0,5'],['Junio','$150.000 ⚠️','0,75'],['Julio','200000','1']],
grid:[['Mes','Ahorro','Meta'],['Mayo','$ 100.000','50%'],['Junio','$ 150.000','75%'],['Julio','$ 200.000','100%']],
sel:'B2', formula:'', cap:'En B2 lo que hay escrito es solo 100000. El "$" y los puntos los pone el formato. El de junio de arriba tocó reescribirlo: por escribirle el $ a mano quedó como texto y no sumaba.',
pasos:['Escribe en una celda 250000 (sin puntos ni signo).','Selecciónala y toca el botón $ (formato de moneda contable).','Escribe en otra celda 0,8 y tócale el botón %. Verás 80%.','Escribe 20/07/2026 y mira cómo Excel la trata como fecha.']},
quiz:[
{q:'¿Por qué NO debes escribir "$50.000" a mano en la celda?', o:['Porque se ve feo','Porque queda como texto y Excel no lo puede sumar','Porque es ilegal','Porque borra la hoja'], c:1, fb:'Con el $ escrito a mano, Excel lo trata como texto. Escribe 50000 y aplica formato moneda.'},
{q:'Escribes 0,5 y le aplicas formato porcentaje. ¿Qué se ve?', o:['0,5%','5%','50%','500%'], c:2, fb:'0,5 equivale a la mitad, o sea 50%.'},
{q:'El formato de número...', o:['Cambia el valor real del número','Solo cambia cómo se ve el número','Borra los decimales para siempre','Bloquea la celda'], c:1, fb:'Es solo apariencia: por dentro el número sigue intacto y las cuentas salen bien.'}]},

{t:'Tu primera fórmula: +, -, ×, ÷', e:'🧮',
txt:'<p>Llegó el momento estrella. Las fórmulas son la razón de ser de Excel, y todas empiezan igual: <b>con el signo =</b>. Si no pones el =, Excel cree que es texto.</p><p>Los símbolos para operar son:<br>➕ Sumar: <span class="formula-pill">=5+3</span> &nbsp;➖ Restar: <span class="formula-pill">=10-4</span><br>✖️ Multiplicar (con asterisco): <span class="formula-pill">=6*2</span> &nbsp;➗ Dividir (con barra): <span class="formula-pill">=20/4</span></p><p>Pero el verdadero truco es usar <b>celdas en vez de números</b>: <span class="formula-pill">=B2*C2</span> significa "multiplica lo que haya en B2 por lo que haya en C2". Si mañana cambias el valor de B2, <b>el resultado se actualiza solo</b>.</p><div class="tip">💡 Para meter una celda en la fórmula no tienes que escribirla: después del =, simplemente haz clic en la celda y Excel escribe su nombre por ti.</div>',
ex:{tit:'¿Cuánto pago por 3 kilos de arroz?', desc:'Precio por kilo en B2, cantidad en C2. En D2 escribimos la fórmula que los multiplica.',
grid:[['Producto','Precio kilo','Kilos','A pagar'],['Arroz','4.500','3','13.500'],['Fríjol','9.000','2','18.000']],
sel:'D2', formula:'=B2*C2', res:['D2','D3'], cap:'D2 muestra 13.500 pero por dentro tiene =B2*C2. Cambia los kilos y mira cómo se actualiza solo.',
pasos:['Copia esta tablita en tu Excel (productos, precios y kilos).','En D2 escribe = luego clic en B2, luego escribe * y clic en C2. Da Enter.','Cambia la cantidad de kilos en C2 y observa cómo D2 se recalcula al instante.','Haz lo mismo en D3 para el fríjol.']},
quiz:[
{q:'¿Con qué símbolo empieza TODA fórmula en Excel?', o:['Con +','Con =','Con $','Con #'], c:1, fb:'El signo = le avisa a Excel: "esto es una fórmula, calcúlala". Sin él, es solo texto.'},
{q:'¿Cómo se multiplica en Excel?', o:['Con la x: =B2xC2','Con asterisco: =B2*C2','Con punto: =B2.C2','No se puede multiplicar'], c:1, fb:'El asterisco (*) es el símbolo de multiplicar: =B2*C2.'},
{q:'D2 tiene =B2*C2. Si cambias el valor de C2, ¿qué pasa con D2?', o:['Queda igual','Se borra','Se recalcula solo con el nuevo valor','Aparece un error'], c:2, fb:'Esa es la magia: las fórmulas con celdas se actualizan solas cuando cambian los datos.'}]},

{t:'La función SUMA: adiós a sumar a mano', e:'➕',
txt:'<p>Imagina sumar 50 celdas así: =B1+B2+B3+B4... ¡qué pereza! Para eso existe la función <b>SUMA</b>, tu primera función de Excel:</p><p><span class="formula-pill">=SUMA(B2:B6)</span></p><p>Se lee: "suma todo lo que hay desde B2 hasta B6". No importa si son 5 celdas o 5.000: la fórmula es igual de cortica.</p><p>Las partes: el <b>nombre de la función</b> (SUMA), <b>paréntesis</b>, y adentro el <b>rango</b> (B2:B6). Casi todas las funciones de Excel funcionan con esta misma estructura, así que ya aprendiste el molde.</p><div class="tip">💡 Atajo ninja: selecciona la celda debajo de tus números y presiona <b>Alt + =</b> (Autosuma). Excel escribe la SUMA solito. También está el botón ∑ en la pestaña Inicio.</div>',
ex:{tit:'El total de gastos del mes', desc:'Todos los gastos de la casa en la columna B. En vez de sumarlos uno por uno, una sola SUMA en B6.',
grid:[['Gasto','Valor'],['Arriendo','500.000'],['Mercado','400.000'],['Servicios','180.000'],['Transporte','120.000'],['TOTAL','1.200.000']],
sel:'B6', formula:'=SUMA(B2:B5)', res:['B6'], cap:'=SUMA(B2:B5) suma las 4 celdas de una vez. Si agregas un gasto nuevo dentro del rango, el total se actualiza.',
pasos:['Escribe tus gastos del mes en una columna.','En la celda de abajo escribe =SUMA( y selecciona con el mouse todos los valores.','Cierra el paréntesis ) y da Enter.','Ahora prueba el atajo: bórrala, párate ahí mismo y presiona Alt + =.']},
quiz:[
{q:'¿Cuál fórmula suma desde B2 hasta B10?', o:['=SUMA(B2:B10)','=SUMA B2-B10','=B2+B10','=TOTAL(B2:B10)'], c:0, fb:'=SUMA(rango) con los dos puntos: desde B2 hasta B10.'},
{q:'¿Qué hace el atajo Alt + = ?', o:['Borra la celda','Escribe la Autosuma automáticamente','Cierra Excel','Cambia el color'], c:1, fb:'Alt + = activa la Autosuma: Excel detecta los números de arriba y arma la SUMA solo.'},
{q:'=SUMA(A1:A100) suma...', o:['Solo A1 y A100','Las 100 celdas de A1 hasta A100','Nada, está mal escrita','Solo las que tengan color'], c:1, fb:'El rango A1:A100 incluye TODAS las celdas entre A1 y A100.'}]},

{t:'PROMEDIO, MAX y MIN', e:'📊',
txt:'<p>Ya sabes sumar con SUMA. Ahora conoce a sus tres primos, que funcionan igualito (mismo molde, ¿recuerdas?):</p><p>📊 <span class="formula-pill">=PROMEDIO(B2:B6)</span> — el promedio de los valores (los suma y divide entre cuántos son).<br>🔝 <span class="formula-pill">=MAX(B2:B6)</span> — el valor más ALTO del rango.<br>🔻 <span class="formula-pill">=MIN(B2:B6)</span> — el valor más BAJO del rango.</p><p>¿Para qué sirven? El promedio de notas de tu hijo, la venta más alta del mes, el día que menos vendiste, el precio más barato entre varios proveedores... cosas de todos los días.</p><div class="tip">💡 En Excel en español es PROMEDIO. Si te llega un archivo en inglés verás AVERAGE: es la misma función.</div>',
ex:{tit:'¿Cómo van las ventas de la semana?', desc:'Ventas de lunes a viernes. Con tres fórmulas sabemos el promedio diario, el mejor día y el peor día.',
grid:[['Día','Venta'],['Lunes','80.000'],['Martes','65.000'],['Miércoles','90.000'],['Jueves','70.000'],['Viernes','120.000'],['Promedio','85.000']],
sel:'B7', formula:'=PROMEDIO(B2:B6)', res:['B7'], cap:'Además: =MAX(B2:B6) da 120.000 (viernes, el mejor) y =MIN(B2:B6) da 65.000 (martes, el más flojo).',
pasos:['Escribe las ventas (o notas, o gastos) de 5 días en una columna.','Debajo calcula =PROMEDIO( selecciona el rango y cierra paréntesis.','En otras dos celdas calcula =MAX(...) y =MIN(...) del mismo rango.','Pregúntate: ¿qué día conviene abrir más temprano? Los datos te lo dicen.']},
quiz:[
{q:'¿Qué función te dice el valor más alto de un rango?', o:['=ALTO()','=MAX()','=MAYOR()','=TOP()'], c:1, fb:'MAX de máximo. =MAX(B2:B6) devuelve el valor más grande.'},
{q:'Las notas son 3, 4 y 5. ¿Qué devuelve =PROMEDIO de esas celdas?', o:['12','5','4','3'], c:2, fb:'(3+4+5) ÷ 3 = 4. El promedio suma todo y divide entre la cantidad.'},
{q:'Quieres saber el gasto MÁS BAJO del mes. ¿Cuál usas?', o:['=MIN(rango)','=MAX(rango)','=SUMA(rango)','=BAJO(rango)'], c:0, fb:'MIN de mínimo: devuelve el valor más pequeño del rango.'}]},

{t:'El cuadrito mágico: rellenar en serie', e:'🪄',
txt:'<p>Este truco enamora a todo el mundo. Cuando seleccionas una celda, mira su esquina inferior derecha: hay un <b>cuadrito pequeñito</b>. Se llama <b>controlador de relleno</b>, pero dile "el cuadrito mágico".</p><p>Si escribes <b>Enero</b> y arrastras el cuadrito hacia abajo... Excel escribe Febrero, Marzo, Abril... ¡solo! Lo mismo con Lunes, Martes... o con 1, 2, 3... (para números escribe 1 y 2, selecciona ambos y arrastra).</p><p>Y lo más poderoso: <b>también rellena fórmulas</b>. Si D2 tiene =B2*C2 y arrastras el cuadrito hacia abajo, D3 queda =B3*C3, D4 queda =B4*C4... Excel ajusta las filas automáticamente.</p><div class="tip">💡 Doble clic en el cuadrito mágico rellena hacia abajo hasta donde lleguen los datos de al lado. Ideal para tablas largas.</div>',
ex:{tit:'Una fórmula, arrastrada para toda la tabla', desc:'Escribimos =B2*C2 una sola vez en D2 y arrastramos el cuadrito hacia abajo: Excel calculó todas las filas.',
grid:[['Producto','Precio','Cant.','Total'],['Cuadernos','3.500','10','35.000'],['Lápices','800','20','16.000'],['Borradores','500','15','7.500']],
sel:'D2', formula:'=B2*C2', res:['D2','D3','D4'], cap:'D3 quedó =B3*C3 y D4 quedó =B4*C4 sin escribir nada: el relleno ajustó las filas solo.',
pasos:['Escribe "Enero" en una celda, agarra el cuadrito de la esquina y arrastra 5 celdas hacia abajo.','Escribe 1 y 2 en dos celdas, selecciona ambas y arrastra: 3, 4, 5...','Arma la tablita del ejemplo y escribe =B2*C2 solo en D2.','Arrastra el cuadrito de D2 hacia abajo y mira cómo se calcula todo.']},
quiz:[
{q:'Escribes "Lunes" y arrastras el cuadrito mágico hacia abajo. ¿Qué aparece?', o:['Lunes, Lunes, Lunes','Martes, Miércoles, Jueves...','Nada','Error'], c:1, fb:'Excel reconoce las series: días, meses, números... y las continúa solo.'},
{q:'D2 tiene =B2*C2. La arrastras hacia abajo a D3. ¿Qué fórmula queda en D3?', o:['=B2*C2','=B3*C3','=B2*C3','=D2'], c:1, fb:'Al arrastrar, Excel ajusta las referencias fila por fila: en D3 queda =B3*C3.'},
{q:'¿Dónde está el "cuadrito mágico" de relleno?', o:['En la esquina inferior derecha de la celda seleccionada','En el menú Archivo','En la barra fx','Debajo del teclado'], c:0, fb:'Es el puntico en la esquina inferior derecha de la selección. Agárralo y arrastra.'}]},

{t:'Ordenar datos: de la A a la Z', e:'🔤',
txt:'<p>Tienes una lista de 50 clientes toda desordenada y necesitas encontrar a alguien rápido. En vez de buscar con el dedo, <b>ordena la lista en 2 clics</b>.</p><p>Toca cualquier celda de la columna que quieres ordenar, ve a la pestaña <b>Datos</b> y usa los botones:</p><p>🔤 <b>A→Z:</b> orden alfabético (o del número menor al mayor).<br>🔡 <b>Z→A:</b> al revés (o del mayor al menor: perfecto para ver quién te debe más).</p><p>Regla de oro: <b>nunca selecciones una sola columna para ordenar</b> si tu tabla tiene varias. Toca una celda cualquiera de la tabla y deja que Excel ordene las filas completas, para que cada nombre siga con su dato.</p><div class="tip">💡 ¿Ordenaste y te arrepentiste? Ctrl+Z y todo vuelve como estaba. Ya sabes: es el salvavidas.</div>',
ex:{tit:'¿Quién debe más en la tienda?', desc:'Arriba: la lista como se fue anotando, toda revuelta. Abajo: ordenada de mayor a menor deuda (Z→A en la columna B). De un vistazo sabes a quién cobrarle primero.',
antes:[['Cliente','Debe'],['Luisa','12.000'],['Don José','120.000'],['Jorge','30.000'],['María F.','45.000']],
grid:[['Cliente','Debe'],['Don José','120.000'],['María F.','45.000'],['Jorge','30.000'],['Luisa','12.000']],
sel:'B1', formula:'', cap:'Cada cliente conservó SU deuda porque Excel movió las filas completas, no solo los números. Si solo se ordenara la columna B, ¡Luisa quedaría debiendo 120.000!',
pasos:['Escribe 5 nombres con un valor al lado, en desorden.','Toca cualquier celda de la tabla (una sola, sin seleccionar columnas).','Pestaña Datos → botón Z→A sobre la columna de valores.','Verifica que cada nombre siga con su valor correcto.']},
quiz:[
{q:'Para ver los valores de MAYOR a menor, usas...', o:['A→Z','Z→A','Ctrl+Z','El cuadrito mágico'], c:1, fb:'Z→A ordena descendente: primero lo más grande.'},
{q:'¿Por qué NO debes seleccionar solo una columna antes de ordenar una tabla?', o:['Porque es más lento','Porque se puede desarmar la tabla: los datos quedan con la fila equivocada','Porque Excel se cierra','Porque no deja imprimir'], c:1, fb:'Si ordenas solo una columna, esa se mueve y las demás no: los datos quedan revueltos. Toca una celda y deja que Excel ordene filas completas.'},
{q:'Ordenaste mal y la tabla quedó revuelta. ¿Qué haces primero?', o:['Cerrar sin guardar y rezar','Ctrl+Z para deshacer','Borrar todo','Escribir todo de nuevo'], c:1, fb:'Ctrl+Z revierte el orden y la tabla vuelve a como estaba.'}]},

{t:'Filtros: encuentra lo que buscas', e:'🔍',
txt:'<p>Los filtros son como un colador: te muestran <b>solo las filas que cumplen una condición</b> y esconden las demás (¡no las borran, solo las esconden!).</p><p>Cómo se usa: toca una celda de tu tabla, ve a <b>Datos → Filtro</b> (el embudo 🔽). A cada encabezado le aparece una flechita. Al tocarla puedes:</p><p>✅ Marcar solo lo que quieres ver (ej: solo "Pendiente")<br>🔍 Buscar por texto<br>🔢 Filtrar números: mayores que, menores que, los 10 mejores...</p><p>Para volver a ver todo: toca la flechita y elige "Borrar filtro", o quita el embudo.</p><div class="tip">💡 Cuando un filtro está activo, los números de fila se ven azules y salteados. Así sabes que hay filas escondidas.</div>',
ex:{tit:'Solo los pedidos pendientes', desc:'De todos los pedidos, filtramos la columna Estado para ver únicamente los que están "Pendiente". Los entregados siguen ahí, solo están ocultos.',
grid:[['Cliente','Pedido','Estado'],['Luisa','Torta','Pendiente'],['Mario','Galletas','Pendiente'],['Sofía','Cupcakes','Pendiente']],
sel:'C1', formula:'', cap:'Mira los números de fila de tu Excel cuando filtres: van salteados (2, 5, 8...) porque hay filas ocultas entre ellas.',
pasos:['Arma una lista de pedidos con una columna "Estado" (Pendiente / Entregado).','Toca una celda de la tabla y ve a Datos → Filtro.','Toca la flechita de Estado y deja marcado solo "Pendiente".','Para ver todo de nuevo: flechita → Borrar filtro.']},
quiz:[
{q:'Cuando filtras una tabla, las filas que no cumplen la condición...', o:['Se borran para siempre','Se esconden temporalmente','Se van a otra hoja','Cambian de color'], c:1, fb:'Solo se ocultan. Al quitar el filtro, todas vuelven a aparecer.'},
{q:'¿En qué pestaña está el botón de Filtro?', o:['Inicio','Insertar','Datos','Vista'], c:2, fb:'Datos → Filtro (el embudo). También aparece con Ctrl+Shift+L.'},
{q:'¿Cómo sabes que una tabla tiene un filtro activo?', o:['Suena una alarma','Los números de fila están azules y salteados','La hoja se pone gris','No se puede saber'], c:1, fb:'Filas azules y salteadas = hay filas ocultas por un filtro.'}]},

{t:'Proyecto final: presupuesto del hogar 🏠', e:'🏁',
txt:'<p>¡Llegaste al final del nivel Básico! 👏 Hora de juntar TODO lo que aprendiste en un proyecto real: <b>el presupuesto mensual de tu casa</b>.</p><p>Vas a usar: escribir datos ✍️, formato de moneda 💲, negrita y colores 🎨, la función SUMA ➕, una resta ➖ y el cuadrito mágico 🪄.</p><p>La idea es simple: anotas cuánto entra (ingresos), cuánto sale (gastos), y Excel te dice <b>cuánto te queda</b>. Ese numerito final es de las cosas más útiles que puede darte Excel: saber si el mes cierra en verde o en rojo.</p><div class="tip">💡 Guarda este archivo como "Presupuesto_familiar" y actualízalo cada mes. En unos meses vas a ver claritico en qué se va la plata.</div>',
ex:{tit:'El presupuesto completo', desc:'Así queda armado. Fíjate en las tres fórmulas: total ingresos, total gastos, y la resta final que dice cuánto queda.',
grid:[['Concepto','Valor'],['Sueldo','1.400.000'],['Ventas extra','300.000'],['Total ingresos','1.700.000'],['Arriendo','500.000'],['Mercado','450.000'],['Servicios','200.000'],['Total gastos','1.150.000'],['ME QUEDA','550.000']],
sel:'B9', formula:'=B4-B8', res:['B4','B8','B9'], cap:'B4 es =SUMA(B2:B3), B8 es =SUMA(B5:B7) y B9 es la resta =B4-B8. ¡Quedaron $550.000 este mes!',
pasos:['Crea el archivo y escribe tus ingresos reales con sus valores (formato moneda).','Suma los ingresos con =SUMA(...).','Lista tus gastos y súmalos igual.','En la última celda calcula: =TotalIngresos - TotalGastos (con clics en las celdas).','Decora: negrita en títulos, verde si te queda plata. ¡Y guarda!']},
quiz:[
{q:'En el presupuesto, "ME QUEDA" se calcula con...', o:['=SUMA de todo','=Total ingresos - Total gastos','=MAX(gastos)','=PROMEDIO(ingresos)'], c:1, fb:'Lo que entra menos lo que sale: =B4-B8 en nuestro ejemplo.'},
{q:'Ingresos: $1.700.000. Gastos: $1.150.000. ¿Cuánto queda?', o:['$450.000','$550.000','$650.000','$2.850.000'], c:1, fb:'1.700.000 - 1.150.000 = 550.000. ¡Y Excel lo calcula solo!'},
{q:'Si el mes que viene sube el arriendo, ¿qué haces en tu presupuesto?', o:['Crear un archivo nuevo desde cero','Cambiar solo ese valor: los totales se recalculan solos','Sumar todo a mano otra vez','Borrar la fórmula'], c:1, fb:'Cambias el dato y las fórmulas hacen el resto. Para eso construimos todo con fórmulas.'}]},
