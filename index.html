{t:'El signo $: referencias fijas', e:'📌',
txt:'<p>Bienvenido(a) al nivel Intermedio 🚀. Empezamos con un truco que separa a los principiantes de los que saben: <b>el signo $ en las fórmulas</b>.</p><p>Ya viste que al arrastrar una fórmula, Excel ajusta las celdas (B2 pasa a B3, B4...). Eso se llama <b>referencia relativa</b> y casi siempre es lo que quieres.</p><p>Pero a veces necesitas que una celda <b>NO se mueva</b>. Por ejemplo, si el precio del dólar está en la celda F1 y todas tus fórmulas deben usar ESA celda. La solución: escribirla como <span class="formula-pill">$F$1</span>. El $ la "clava" en su sitio: por más que arrastres, siempre apunta a F1. Eso es una <b>referencia absoluta</b>.</p><div class="tip">💡 Truco de teclado: al escribir la fórmula, toca la celda y presiona <b>F4</b>. Excel le pone los $ automáticamente.</div>',
ex:{tit:'Precios en dólares a pesos', desc:'El valor del dólar está en B1. Cada producto se multiplica por ESA celda fija: por eso la fórmula usa $B$1.',
grid:[['Dólar hoy:','4.000'],['Producto','Precio USD','En pesos'],['Audífonos','10','40.000'],['Teclado','25','100.000'],['Mouse','15','60.000']],
sel:'C3', formula:'=B3*$B$1', res:['C3','C4','C5'], cap:'Al arrastrar hacia abajo, B3 cambió a B4 y B5 (relativa), pero $B$1 se quedó quieta (absoluta). Si mañana cambia el dólar, cambias solo B1.',
pasos:['Escribe el valor del dólar en B1.','Haz una lista de productos con precio en dólares.','En la primera fila calcula =B3*$B$1 (usa F4 para poner los $).','Arrastra hacia abajo con el cuadrito mágico y revisa las fórmulas: $B$1 no se movió.']},
quiz:[
{q:'¿Qué hace el $ en una referencia como $B$1?', o:['Convierte a pesos','Fija la celda para que no cambie al arrastrar','Suma un dólar','Pone formato moneda'], c:1, fb:'El $ ancla la referencia: por más que copies la fórmula, seguirá apuntando a B1.'},
{q:'¿Qué tecla pone los $ automáticamente al escribir una fórmula?', o:['F1','F4','Esc','Tab'], c:1, fb:'F4 alterna entre B1, $B$1, B$1 y $B1. La más usada: $B$1.'},
{q:'C2 tiene =B2*$F$1 y la arrastras a C3. ¿Qué queda en C3?', o:['=B3*$F$1','=B3*$F$2','=B2*$F$1','=C3*F1'], c:0, fb:'B2 es relativa y baja a B3; $F$1 es absoluta y se queda igual.'}]},

{t:'CONTAR y CONTAR.SI', e:'🔢',
txt:'<p>A veces no quieres sumar, sino <b>contar</b>: ¿cuántos asistieron?, ¿cuántos pagaron?, ¿cuántos pedidos hay pendientes? Para eso hay tres funciones hermanas:</p><p>🔢 <span class="formula-pill">=CONTAR(A2:A20)</span> — cuenta cuántas celdas tienen <b>números</b>.<br>📝 <span class="formula-pill">=CONTARA(A2:A20)</span> — cuenta las celdas <b>no vacías</b> (números o texto).<br>🎯 <span class="formula-pill">=CONTAR.SI(B2:B20;"Pagó")</span> — cuenta solo las que cumplen una <b>condición</b>.</p><p>La estrella es CONTAR.SI: dile qué rango mirar y qué buscar (entre comillas si es texto), y te dice cuántas veces aparece. También sirve con números: <span class="formula-pill">=CONTAR.SI(C2:C20;"&gt;50000")</span> cuenta los mayores a 50.000.</p><div class="tip">💡 Según la configuración de tu Excel, los argumentos se separan con punto y coma (;) o con coma (,). Si una fórmula te da error, prueba con el otro.</div>',
ex:{tit:'¿Cuántos han pagado la cuota?', desc:'Lista de vecinos con el estado de su cuota. CONTAR.SI cuenta los "Pagó" en un segundo, sin revisar uno por uno.',
grid:[['Vecino','Cuota'],['Ana','Pagó'],['Luis','Debe'],['Marta','Pagó'],['Pedro','Pagó'],['Pagaron:','3']],
sel:'B6', formula:'=CONTAR.SI(B2:B5;"Pagó")', res:['B6'], cap:'Cambia un "Debe" por "Pagó" y el contador sube solo. Perfecto para cuotas, asistencias y rifas.',
pasos:['Haz una lista de personas con una columna de estado (Pagó / Debe).','Debajo escribe =CONTAR.SI( selecciona la columna de estados.','Escribe ;"Pagó") y da Enter.','Haz otro contador para "Debe". Ya tienes tu tablero de cobros.']},
quiz:[
{q:'¿Cuál función cuenta solo las celdas que dicen "Pendiente"?', o:['=CONTAR(rango)','=CONTAR.SI(rango;"Pendiente")','=SUMA(rango)','=SI(rango)'], c:1, fb:'CONTAR.SI cuenta las celdas que cumplen la condición que le des.'},
{q:'¿Qué cuenta =CONTARA(A1:A10)?', o:['Solo los números','Las celdas no vacías (texto o número)','Las celdas con color','Las letras A'], c:1, fb:'CONTARA cuenta todo lo que no esté vacío. CONTAR solo cuenta números.'},
{q:'Para contar ventas mayores a 100.000 escribes...', o:['=CONTAR.SI(C2:C20;">100000")','=CONTAR(C2:C20>100000)','=MAX(C2:C20)','=CONTARA(100000)'], c:0, fb:'La condición va entre comillas: ">100000". CONTAR.SI también trabaja con comparaciones.'}]},

{t:'SUMAR.SI: sumas con condición', e:'🎯',
txt:'<p>SUMAR.SI es la mezcla perfecta de lo que ya sabes: <b>suma, pero solo lo que cumple una condición</b>.</p><p><span class="formula-pill">=SUMAR.SI(A2:A20;"Mercado";B2:B20)</span></p><p>Se lee así: "mira la columna A, y donde diga <b>Mercado</b>, suma el valor de la columna B". Tres partes:</p><p>1️⃣ Dónde buscar (A2:A20)<br>2️⃣ Qué buscar ("Mercado")<br>3️⃣ Qué sumar (B2:B20)</p><p>¿Usos reales? Cuánto gastaste solo en transporte, cuánto vendió solo un vendedor, cuánto suman los pedidos de un solo cliente. Es la función de los resúmenes.</p><div class="tip">💡 Si lo que buscas y lo que sumas están en la misma columna (ej: sumar solo valores mayores a 50.000), basta con dos partes: =SUMAR.SI(B2:B20;"&gt;50000").</div>',
ex:{tit:'¿Cuánto se ha ido en mercado este mes?', desc:'Gastos anotados uno por uno con su categoría. SUMAR.SI junta todo lo de "Mercado" aunque esté regado por toda la lista.',
grid:[['Categoría','Valor'],['Mercado','120.000'],['Transporte','15.000'],['Mercado','80.000'],['Servicios','95.000'],['Mercado','60.000'],['Total Mercado:','260.000']],
sel:'B7', formula:'=SUMAR.SI(A2:A6;"Mercado";B2:B6)', res:['B7'], cap:'120.000 + 80.000 + 60.000 = 260.000. Solo sumó las filas donde la categoría es "Mercado".',
pasos:['Anota 8 gastos reales con su categoría (Mercado, Transporte, etc.).','Debajo escribe =SUMAR.SI( y selecciona la columna de categorías.','Sigue con ;"Mercado"; y selecciona la columna de valores. Cierra y Enter.','Copia la fórmula para cada categoría: acabas de hacer tu primer resumen de gastos.']},
quiz:[
{q:'=SUMAR.SI(A2:A10;"Ana";B2:B10) suma...', o:['Todo B2:B10','Los valores de B solo en las filas donde A dice "Ana"','Las celdas que digan Ana','Nada, está mal'], c:1, fb:'Busca "Ana" en la columna A y suma el valor correspondiente de la columna B.'},
{q:'¿Cuántas partes tiene SUMAR.SI cuando buscas en una columna y sumas otra?', o:['Una','Dos','Tres: dónde buscar, qué buscar, qué sumar','Cinco'], c:2, fb:'Rango de búsqueda, criterio y rango de suma. En ese orden.'},
{q:'¿Cuál es el mejor uso de SUMAR.SI?', o:['Cambiar colores','Saber cuánto gastaste solo en una categoría','Ordenar la tabla','Contar celdas vacías'], c:1, fb:'Resúmenes por categoría: gastos por tipo, ventas por vendedor, pedidos por cliente.'}]},

{t:'La función SI: Excel toma decisiones', e:'🤔',
txt:'<p>Esta es de mis favoritas. La función <b>SI</b> hace que Excel decida entre dos respuestas, como un semáforo:</p><p><span class="formula-pill">=SI(B2&gt;=3;"Aprobó";"Perdió")</span></p><p>Se lee: "SI lo que hay en B2 es mayor o igual a 3, escribe <b>Aprobó</b>; si no, escribe <b>Perdió</b>". Tres partes separadas por punto y coma:</p><p>1️⃣ La <b>pregunta</b> (B2&gt;=3)<br>2️⃣ Qué poner si es <b>verdadera</b><br>3️⃣ Qué poner si es <b>falsa</b></p><p>Los comparadores: <b>&gt;</b> mayor, <b>&lt;</b> menor, <b>&gt;=</b> mayor o igual, <b>&lt;=</b> menor o igual, <b>=</b> igual, <b>&lt;&gt;</b> distinto.</p><div class="tip">💡 El resultado también puede ser un cálculo: =SI(B2&gt;500000;B2*0,9;B2) aplica 10% de descuento solo si la compra pasa de $500.000.</div>',
ex:{tit:'¿Aprobó o perdió la materia?', desc:'Notas finales de los estudiantes. La columna C decide sola con la función SI: nota de 3 para arriba, aprobó.',
grid:[['Estudiante','Nota','Resultado'],['Camila','4,5','Aprobó'],['Andrés','2,8','Perdió'],['Valeria','3,0','Aprobó'],['Samuel','2,5','Perdió']],
sel:'C2', formula:'=SI(B2>=3;"Aprobó";"Perdió")', res:['C2','C3','C4','C5'], cap:'Escribes la fórmula una vez en C2 y la arrastras. Excel evalúa cada nota y decide.',
pasos:['Haz una lista de nombres con una nota de 1 a 5.','En la columna siguiente escribe =SI( la celda de la nota &gt;=3;"Aprobó";"Perdió")','Arrastra hacia abajo con el cuadrito mágico.','Cambia una nota y mira cómo el resultado cambia solo.']},
quiz:[
{q:'¿Cuántas partes tiene la función SI?', o:['Una','Dos','Tres: pregunta, respuesta si es verdad, respuesta si es falso','Diez'], c:2, fb:'Condición; valor si verdadero; valor si falso. El semáforo de Excel.'},
{q:'=SI(B2>=100;"Meta cumplida";"Falta") y B2 vale 80. ¿Qué aparece?', o:['Meta cumplida','Falta','80','Error'], c:1, fb:'80 no es mayor o igual a 100, así que la condición es falsa: muestra "Falta".'},
{q:'¿Qué comparador significa "distinto de"?', o:['><','<>','==','!='], c:1, fb:'En Excel, distinto se escribe <> (menor y mayor juntos).'}]},

{t:'SI con Y / O: condiciones dobles', e:'🚦',
txt:'<p>¿Y si la decisión depende de <b>dos cosas a la vez</b>? Para eso el SI se combina con dos ayudantes:</p><p>🔗 <b>Y:</b> exige que se cumplan <b>TODAS</b> las condiciones.<br><span class="formula-pill">=SI(Y(B2&gt;=3;C2&gt;=80%);"Pasa";"No pasa")</span><br>→ Pasa solo si la nota es ≥3 <b>y además</b> la asistencia es ≥80%.</p><p>🔀 <b>O:</b> basta con que se cumpla <b>UNA</b>.<br><span class="formula-pill">=SI(O(B2="Sábado";B2="Domingo");"Descansa";"Trabaja")</span><br>→ Descansa si es sábado <b>o</b> domingo.</p><p>Piénsalo como en la vida: "te doy permiso SI haces tareas <b>Y</b> arreglas el cuarto" (las dos), versus "salimos SI deja de llover <b>O</b> conseguimos sombrilla" (cualquiera).</p><div class="tip">💡 Puedes meter hasta 255 condiciones dentro de Y() u O(), separadas por punto y coma. Con 2 o 3 basta para casi todo.</div>',
ex:{tit:'¿Quién gana el bono del mes?', desc:'Para ganar bono hay que vender al menos $1.000.000 Y tener 90 o más en servicio al cliente. Las dos cosas.',
grid:[['Vendedor','Ventas','Servicio','Bono'],['Paola','1.200.000','95','SÍ'],['Diego','1.500.000','70','NO'],['Karen','800.000','98','NO']],
sel:'D2', formula:'=SI(Y(B2>=1000000;C2>=90);"SÍ";"NO")', res:['D2','D3','D4'], cap:'Diego vendió mucho pero su servicio fue 70: no cumple las DOS condiciones, no hay bono.',
pasos:['Arma la tabla con ventas y calificación de servicio.','Escribe la fórmula con Y(): las dos condiciones separadas por ;','Arrastra y verifica: solo gana quien cumpla ambas.','Cámbiala por O() y mira cómo ahora basta cumplir una.']},
quiz:[
{q:'¿Cuándo devuelve "verdadero" la función Y?', o:['Cuando se cumple al menos una condición','Cuando se cumplen TODAS las condiciones','Siempre','Nunca'], c:1, fb:'Y = todas obligatorias. O = basta una.'},
{q:'=SI(O(A2="Lunes";A2="Viernes");"Reunión";"Normal") y A2 dice "Viernes". ¿Resultado?', o:['Normal','Reunión','Error','Viernes'], c:1, fb:'Con O basta una condición verdadera: es viernes, así que "Reunión".'},
{q:'Bono si ventas ≥ 1 millón Y servicio ≥ 90. Ventas: 2 millones, servicio: 85. ¿Bono?', o:['SÍ, vendió mucho','NO: falla una de las dos condiciones','Depende del jefe','Error'], c:1, fb:'Con Y deben cumplirse ambas. El servicio quedó en 85: no hay bono.'}]},

{t:'Jugar con textos: unir y arreglar', e:'🔤',
txt:'<p>Excel no es solo números: también es un crack con los textos. Tres trucos que se usan a diario:</p><p>🔗 <b>Unir textos con &amp;:</b> <span class="formula-pill">=A2&amp;" "&amp;B2</span> junta el nombre de A2 con el apellido de B2 (las comillas con espacio " " ponen la separación).</p><p>🔠 <b>Arreglar mayúsculas:</b><br><span class="formula-pill">=MAYUSC(A2)</span> → TODO EN MAYÚSCULA<br><span class="formula-pill">=MINUSC(A2)</span> → todo en minúscula<br><span class="formula-pill">=NOMPROPIO(A2)</span> → Primera Letra De Cada Palabra</p><p>🧹 <b>Quitar espacios de más:</b> <span class="formula-pill">=ESPACIOS(A2)</span> limpia los espacios dobles que quedan cuando la gente escribe a la carrera.</p><div class="tip">💡 Combo ganador para limpiar listas de nombres mal escritos: =NOMPROPIO(ESPACIOS(A2)). Arregla mayúsculas Y espacios de una.</div>',
ex:{tit:'Armando la lista de invitados', desc:'Nombre y apellido en columnas separadas y mal escritos. En la columna C los unimos y arreglamos con una sola fórmula.',
grid:[['Nombre','Apellido','Completo'],['ana maría','lópez','Ana María López'],['CARLOS','ruiz','Carlos Ruiz'],['  pedro','GÓMEZ','Pedro Gómez']],
sel:'C2', formula:'=NOMPROPIO(ESPACIOS(A2&" "&B2))', res:['C2','C3','C4'], cap:'Une nombre + espacio + apellido, quita espacios sobrantes y pone las mayúsculas bien. Todo en una fórmula.',
pasos:['Escribe nombres y apellidos en dos columnas, con errores a propósito.','En la tercera columna prueba =A2&" "&B2 y mira el resultado.','Mejórala: envuélvela en ESPACIOS( ) y luego en NOMPROPIO( ).','Arrastra hacia abajo: lista limpia y profesional.']},
quiz:[
{q:'¿Con qué símbolo se unen textos en una fórmula?', o:['Con +','Con &','Con %','Con #'], c:1, fb:'El & pega textos: =A2&B2. Y con &" "& queda el espacio en medio.'},
{q:'¿Qué hace =NOMPROPIO("juan pérez")?', o:['JUAN PÉREZ','juan pérez','Juan Pérez','Lo borra'], c:2, fb:'NOMPROPIO pone en mayúscula la primera letra de cada palabra.'},
{q:'Una lista tiene espacios dobles por todos lados. ¿Qué función la limpia?', o:['=LIMPIAR.TODO()','=ESPACIOS()','=BORRAR()','=MAYUSC()'], c:1, fb:'ESPACIOS elimina los espacios sobrantes y deja solo uno entre palabras.'}]},

{t:'Fechas: HOY() y contar días', e:'📅',
txt:'<p>Secreto revelado: para Excel, <b>las fechas son números</b> (cuenta los días desde 1900). Por eso puede restarlas, compararlas y sumarles días. Lo esencial:</p><p>📅 <span class="formula-pill">=HOY()</span> — pone la fecha de hoy y se actualiza sola cada día. Sin nada entre los paréntesis.<br>➖ <b>Restar fechas:</b> <span class="formula-pill">=B2-A2</span> te da los <b>días</b> entre dos fechas.<br>➕ <b>Sumar días:</b> <span class="formula-pill">=A2+30</span> te da la fecha 30 días después. Ideal para vencimientos.</p><p>¿Usos? Saber cuántos días lleva vencida una factura, cuándo se cumple el mes del pedido, cuántos días faltan para la fiesta.</p><div class="tip">💡 Si el resultado de restar fechas te sale como fecha rara en vez de número, cámbiale el formato a "General" o "Número". Es el mismo valor, mal vestido.</div>',
ex:{tit:'¿Hace cuántos días fiaron?', desc:'La fecha del fiado en B, y en C calculamos los días que han pasado hasta hoy con =HOY()-B2.',
grid:[['Cliente','Fecha fiado','Días'],['Don José','01/07/2026','20'],['Luisa','10/07/2026','11'],['Mario','18/07/2026','3']],
sel:'C2', formula:'=HOY()-B2', res:['C2','C3','C4'], cap:'Cada día que abras el archivo, los días aumentan solos, porque HOY() siempre es la fecha actual.',
pasos:['Escribe en una celda =HOY() y da Enter: ahí está la fecha actual.','Haz una lista con fechas pasadas (compras, fiados, pedidos).','Al lado calcula =HOY()- la celda de la fecha.','Si sale con formato de fecha, cámbialo a Número. Ya sabes la antigüedad de cada cosa.']},
quiz:[
{q:'¿Qué devuelve =HOY()?', o:['La hora','La fecha actual, actualizada cada día','El día de tu cumpleaños','Un número al azar'], c:1, fb:'HOY() siempre trae la fecha del día. Mañana mostrará la de mañana.'},
{q:'Factura del 01/07 y hoy es 21/07. ¿Qué da =HOY()-fecha de factura?', o:['20 días','21 días','1 mes','Error'], c:0, fb:'Del 1 al 21 hay 20 días. Restar fechas da los días entre ellas.'},
{q:'¿Cómo calculas la fecha de vencimiento a 30 días de la compra (en A2)?', o:['=A2+30','=A2*30','=30-A2','=VENCE(A2)'], c:0, fb:'A la fecha se le suman días directamente: =A2+30.'}]},

{t:'BUSCARV: el famoso buscador', e:'🕵️',
txt:'<p>Llegamos a la función más famosa de Excel, la que piden en las hojas de vida: <b>BUSCARV</b> (buscar en vertical).</p><p>¿Qué hace? <b>Busca un dato en una tabla y te trae la información de al lado</b>. Como cuando buscas una cédula en una lista y quieres saber el nombre y el teléfono de esa persona.</p><p><span class="formula-pill">=BUSCARV(E2;A2:C20;3;FALSO)</span></p><p>Sus 4 partes:<br>1️⃣ <b>Qué buscar</b> (lo que hay en E2)<br>2️⃣ <b>Dónde buscar</b> (la tabla A2:C20)<br>3️⃣ <b>Qué columna traer</b> (la 3ª de esa tabla)<br>4️⃣ <b>FALSO</b> = coincidencia exacta (casi siempre usarás FALSO)</p><div class="tip">💡 Regla vital: lo que buscas debe estar en la <b>primera columna</b> de la tabla donde buscas. BUSCARV mira la primera columna y trae datos hacia la derecha.</div>',
ex:{tit:'Buscando el precio por código', desc:'Tienes el catálogo (A:C) y llega un cliente preguntando por el producto P02. BUSCARV encuentra su precio al instante.',
grid:[['Código','Producto','Precio'],['P01','Camiseta','35.000'],['P02','Pantalón','80.000'],['P03','Chaqueta','120.000'],['Busco:','P02','80.000']],
sel:'C5', formula:'=BUSCARV(B5;A2:C4;3;FALSO)', res:['C5'], cap:'Buscó "P02" en la primera columna del catálogo y trajo la columna 3 (el precio): $80.000.',
pasos:['Arma un catálogo: código, producto y precio (mínimo 5 filas).','En una celda aparte escribe un código a buscar.','Al lado: =BUSCARV( clic en el código; selecciona toda la tabla; 3; FALSO)','Cambia el código de búsqueda y mira cómo trae el precio correcto cada vez.']},
quiz:[
{q:'¿Para qué sirve BUSCARV?', o:['Para sumar columnas','Para buscar un dato en una tabla y traer información relacionada','Para cambiar colores','Para ordenar'], c:1, fb:'Es el buscador de Excel: le das un dato y te trae lo que está en la misma fila de la tabla.'},
{q:'¿Qué significa el número 3 en =BUSCARV(E2;A2:C20;3;FALSO)?', o:['Que busca 3 veces','La columna de la tabla que debe traer','Que empieza en la fila 3','Los decimales'], c:1, fb:'Es la columna a devolver, contando desde la primera de la tabla: aquí, la columna C.'},
{q:'¿Dónde debe estar el dato que buscas con BUSCARV?', o:['En la última columna','En la primera columna de la tabla de búsqueda','En otra hoja siempre','Da igual'], c:1, fb:'BUSCARV solo busca en la PRIMERA columna del rango y trae datos hacia la derecha.'}]},

{t:'Errores de Excel y cómo arreglarlos', e:'🩹',
txt:'<p>Tarde o temprano Excel te va a sacar un letrero raro con #. ¡Que no cunda el pánico! Cada error te está diciendo qué pasó:</p><p>🔍 <b>#N/D</b> — "No Disponible": BUSCARV no encontró lo que buscabas. Revisa que esté bien escrito (¡ojo con espacios de más!).<br>➗ <b>#¡DIV/0!</b> — estás dividiendo entre cero o entre una celda vacía.<br>📛 <b>#¿NOMBRE?</b> — escribiste mal el nombre de la función (SUMMA en vez de SUMA).<br>🔗 <b>#¡REF!</b> — la fórmula apuntaba a celdas que borraste.<br>↔️ <b>#####</b> — ya lo conoces: columna angosta, no es error.</p><p>El arreglo elegante: <span class="formula-pill">=SI.ERROR(tu fórmula;"revisar")</span> — si la fórmula da error, muestra lo que tú quieras en vez del letrero feo.</p><div class="tip">💡 Un número pegado a la izquierda que no suma no muestra error, pero ES un problema: Excel lo ve como texto. Revisa que no tenga espacios o letras escondidas.</div>',
ex:{tit:'Domando un #N/D', desc:'Buscamos el código "P09" que no existe en el catálogo: BUSCARV da #N/D. Con SI.ERROR mostramos algo útil.',
grid:[['Código','Precio'],['P01','35.000'],['P02','80.000'],['Busco:','P09'],['Resultado:','No existe']],
sel:'B5', formula:'=SI.ERROR(BUSCARV(B4;A2:B3;2;FALSO);"No existe")', res:['B5'], cap:'Sin SI.ERROR la celda mostraría #N/D. Así, muestra "No existe": más claro para cualquiera que use tu archivo.',
pasos:['En tu catálogo de la lección pasada, busca un código que NO exista: verás #N/D.','Envuelve tu BUSCARV así: =SI.ERROR( tu fórmula ;"No existe")','Prueba dividir un número entre una celda vacía: saluda al #¡DIV/0!','Escribe =SUMMA(A1:A2) con doble M y conoce el #¿NOMBRE?']},
quiz:[
{q:'BUSCARV te devuelve #N/D. ¿Qué significa?', o:['El archivo se dañó','No encontró el dato buscado','Falta internet','La tabla es muy grande'], c:1, fb:'#N/D = no disponible: el dato no está en la primera columna de la tabla, o está escrito diferente.'},
{q:'¿Qué error aparece si divides entre una celda vacía?', o:['#N/D','#¡DIV/0!','#####','#¿NOMBRE?'], c:1, fb:'Dividir entre cero (o vacío) es imposible: #¡DIV/0!'},
{q:'¿Qué hace =SI.ERROR(fórmula;"-")?', o:['Borra la fórmula','Muestra "-" cuando la fórmula da error','Repite la fórmula dos veces','Nada'], c:1, fb:'SI.ERROR reemplaza el letrero de error por lo que tú definas. Tus hojas se ven limpias y profesionales.'}]},

{t:'Formato condicional: celdas que avisan', e:'🚨',
txt:'<p>¿Y si las celdas cambiaran de color solas según su valor? Eso existe y se llama <b>formato condicional</b>: rojos los que deben, verdes los que pagaron, sin pintar nada a mano.</p><p>Está en <b>Inicio → Formato condicional</b>. Los más útiles:</p><p>🎨 <b>Reglas de celdas:</b> "si es mayor que...", "si es menor que...", "si contiene el texto..." → le pones color.<br>📊 <b>Barras de datos:</b> dibuja una barrita dentro de la celda según el tamaño del valor. Mini-gráfico instantáneo.<br>🚦 <b>Escalas de color:</b> pinta del rojo al verde según el valor. Perfecto para ver de un golpe qué está bien y qué está mal.</p><p>Lo mejor: si el valor cambia, <b>el color se actualiza solo</b>. La celda "vigila" su propio contenido.</p><div class="tip">💡 Para quitar las reglas: Formato condicional → Borrar reglas. Y para editarlas: Administrar reglas. No hay que borrarlo todo.</div>',
ex:{tit:'Semáforo de deudas', desc:'Regla aplicada: valores mayores a 50.000 se pintan rojos solos. Mario y Don José saltan a la vista de inmediato.',
grid:[['Cliente','Debe'],['Ana','10.000'],['Mario','85.000'],['Luisa','25.000'],['Don José','120.000']],
sel:'B5', formula:'', cap:'En tu Excel, B3 y B5 quedarían con fondo rojo automático. Si Mario abona y baja de 50.000, el rojo se le quita solo.',
pasos:['Haz una lista de deudas con valores variados.','Selecciona la columna de valores.','Inicio → Formato condicional → Reglas para resaltar celdas → Es mayor que... 50000, relleno rojo.','Cambia un valor por encima y por debajo de 50.000 y mira el color aparecer y desaparecer.']},
quiz:[
{q:'¿Qué hace el formato condicional?', o:['Pinta celdas a mano','Cambia el formato de las celdas automáticamente según su valor','Borra los datos grandes','Imprime a color'], c:1, fb:'Define reglas y Excel pinta solo: colores que reaccionan a los datos.'},
{q:'Si un valor con formato condicional cambia y ya no cumple la regla...', o:['El color se queda para siempre','El color se quita solo','Hay que reiniciar Excel','La celda se borra'], c:1, fb:'El formato condicional se recalcula siempre: el color aparece y desaparece según el valor.'},
{q:'¿Qué opción dibuja barritas dentro de las celdas según su valor?', o:['Bordes','Barras de datos','Autosuma','Filtros'], c:1, fb:'Las barras de datos convierten cada celda en un mini-gráfico. Muy visual para comparar.'}]},

{t:'Listas desplegables (validación)', e:'📝',
txt:'<p>¿Te ha pasado que en una misma lista la gente escribe "Pagó", "pago", "PAGADO" y "si pagó"? Después no hay CONTAR.SI que funcione. La solución: <b>listas desplegables</b>.</p><p>Con la <b>validación de datos</b> conviertes una celda en un menú: la persona solo puede <b>elegir</b> entre las opciones que tú definas. Se acabó el desorden.</p><p>Cómo se hace: selecciona las celdas → pestaña <b>Datos → Validación de datos</b> → en "Permitir" elige <b>Lista</b> → escribe las opciones separadas por punto y coma: <b>Pagó;Debe;Abonó</b> → Aceptar. Ahora cada celda tiene su flechita con el menú.</p><div class="tip">💡 Si alguien intenta escribir otra cosa, Excel le saca un aviso y no lo deja. Tú decides las reglas del juego.</div>',
ex:{tit:'Estado de pedidos sin errores de dedo', desc:'La columna Estado tiene validación: solo se puede elegir Pendiente, En camino o Entregado. Nadie puede escribir "pendientee".',
grid:[['Pedido','Cliente','Estado'],['Torta','Luisa','Entregado'],['Galletas','Mario','En camino'],['Cupcakes','Sofía','Pendiente']],
sel:'C4', formula:'', cap:'Al tocar C4 en tu Excel aparece una flechita ▾ con las tres opciones. Elegir en vez de escribir = cero errores.',
pasos:['Haz tu lista de pedidos con una columna Estado vacía.','Selecciona las celdas de Estado.','Datos → Validación de datos → Permitir: Lista → escribe: Pendiente;En camino;Entregado','Acepta y prueba las flechitas. Intenta escribir otra cosa a ver qué pasa 😄.']},
quiz:[
{q:'¿Para qué sirve la validación con lista?', o:['Para poner colores','Para que solo se pueda elegir entre opciones definidas','Para sumar más rápido','Para imprimir'], c:1, fb:'Convierte la celda en un menú desplegable: solo se elige, no se inventa.'},
{q:'¿En qué pestaña está la Validación de datos?', o:['Inicio','Insertar','Datos','Fórmulas'], c:2, fb:'Datos → Validación de datos → Permitir: Lista.'},
{q:'¿Por qué es importante que todos escriban igual (ej: siempre "Pagó")?', o:['Por estética','Para que funciones como CONTAR.SI y los filtros funcionen bien','Porque Excel cobra por variedad','No es importante'], c:1, fb:'Si cada quien escribe distinto, los conteos, sumas condicionales y filtros no encuentran nada. Datos parejos = fórmulas felices.'}]},

{t:'Gráficos: tus datos en imagen', e:'📈',
txt:'<p>Un buen gráfico dice más que cien números. Y en Excel se hace en <b>dos clics</b>: seleccionas los datos → pestaña <b>Insertar</b> → eliges el gráfico.</p><p>¿Cuál elegir? Guía rápida:</p><p>📊 <b>Columnas:</b> para comparar cantidades (ventas por mes, votos por candidato). El todoterreno.<br>🥧 <b>Circular (torta):</b> para mostrar partes de un total (en qué se va la plata del mes). Úsalo con pocas categorías (máximo 5 o 6).<br>📈 <b>Líneas:</b> para ver cómo algo cambia en el tiempo (el ahorro mes a mes, sube o baja).</p><p>Al tocar el gráfico aparecen las pestañas de diseño: cámbiale colores, título y etiquetas. Y si cambias los datos de la tabla, <b>el gráfico se actualiza solo</b>.</p><div class="tip">💡 ¿Con pereza de decidir? Selecciona tus datos y presiona <b>Alt+F1</b>: gráfico instantáneo. También está "Gráficos recomendados", donde Excel te sugiere el mejor.</div>',
ex:{tit:'¿En qué se va la plata? (para gráfico de torta)', desc:'Con esta tablita seleccionada, Insertar → Gráfico circular crea la torta de gastos: el arriendo es la tajada más grande.',
grid:[['Gasto','Valor'],['Arriendo','500.000'],['Mercado','450.000'],['Servicios','200.000'],['Transporte','150.000']],
sel:'A1', formula:'', cap:'Para el gráfico se seleccionan las DOS columnas (nombres y valores) y Excel arma la torta con porcentajes.',
pasos:['Copia esta tabla de gastos en tu Excel.','Selecciónala completa (A1:B5).','Insertar → Gráfico circular. ¡Ahí está tu torta!','Prueba también el de columnas y el de líneas. Cambia un valor y mira el gráfico moverse.']},
quiz:[
{q:'¿Cuál gráfico es mejor para mostrar en qué se reparte el gasto total del mes?', o:['Líneas','Circular (torta)','Ninguno','Radar'], c:1, fb:'La torta muestra las partes de un todo: cada gasto es una tajada del total.'},
{q:'¿Cuál gráfico es mejor para ver si tu ahorro sube o baja mes a mes?', o:['Circular','Líneas','Ninguno','Mapa'], c:1, fb:'Las líneas muestran la evolución en el tiempo: perfectas para tendencias.'},
{q:'Si cambias un dato de la tabla, ¿qué pasa con el gráfico?', o:['Nada, queda viejo','Se actualiza automáticamente','Se borra','Hay que hacerlo de nuevo'], c:1, fb:'El gráfico está conectado a los datos: cambian los números, cambia el dibujo.'}]},

{t:'Inmovilizar paneles y varias hojas', e:'🧊',
txt:'<p>Dos trucos de gente que maneja tablas grandes:</p><p>🧊 <b>Inmovilizar paneles:</b> cuando tu lista tiene 200 filas y bajas, los encabezados se pierden y ya no sabes qué columna es qué. Solución: <b>Vista → Inmovilizar → Inmovilizar fila superior</b>. La fila de títulos queda congelada arriba mientras todo lo demás se desplaza. También puedes congelar la primera columna.</p><p>📑 <b>Varias hojas:</b> abajo están las pestañas (Hoja1, Hoja2...). Con el <b>+</b> creas hojas nuevas. Doble clic en el nombre para renombrarla ("Enero", "Febrero", "Clientes"...) y clic derecho para ponerle color a la pestañita.</p><p>Bonus: las fórmulas pueden conectar hojas: <span class="formula-pill">=Enero!B10</span> trae el valor de la celda B10 de la hoja "Enero".</p><div class="tip">💡 Organización pro: una hoja por mes y una hoja "Resumen" que junte los totales de todas. Un solo archivo, todo ordenado.</div>',
ex:{tit:'Encabezados congelados', desc:'Imagina esta lista con 300 clientes. Con la fila 1 inmovilizada, aunque bajes hasta la fila 300, siempre ves los títulos.',
grid:[['Cliente','Teléfono','Deuda'],['Ana','300 111 2233','10.000'],['Mario','301 444 5566','85.000'],['...y 297 más','...','...']],
sel:'A1', formula:'', cap:'La fila 1 queda fija con Vista → Inmovilizar fila superior. El resto de la tabla se mueve debajo de ella.',
pasos:['Abre una lista larga (o crea una con muchas filas).','Ve a Vista → Inmovilizar → Inmovilizar fila superior.','Baja con el scroll: los títulos no se mueven. 🧊','Crea una hoja nueva con el +, renómbrala "Resumen" y trae un dato con =Hoja1!B2']},
quiz:[
{q:'¿Para qué sirve inmovilizar la fila superior?', o:['Para que nadie la edite','Para ver siempre los encabezados aunque bajes en la lista','Para imprimirla','Para sumarla'], c:1, fb:'Los títulos quedan congelados arriba mientras navegas las demás filas.'},
{q:'¿Cómo le cambias el nombre a una hoja?', o:['No se puede','Doble clic en la pestaña y escribes el nuevo nombre','Borrándola','Con una fórmula'], c:1, fb:'Doble clic en la pestañita de abajo, escribes el nombre y Enter.'},
{q:'¿Qué trae la fórmula =Enero!B10?', o:['Un error','El valor de la celda B10 de la hoja llamada Enero','El mes de enero','La fila 10 completa'], c:1, fb:'El formato es NombreHoja!Celda: conecta datos entre hojas del mismo archivo.'}]},

{t:'Imprimir sin sorpresas', e:'🖨️',
txt:'<p>Todos hemos pasado por esto: le das imprimir y salen 7 hojas con pedacitos de tabla regados. 😩 Nunca más. La receta:</p><p>1️⃣ <b>Selecciona lo que quieres imprimir</b> y ve a <b>Disposición de página → Área de impresión → Establecer área de impresión</b>. Solo eso saldrá.<br>2️⃣ En <b>Archivo → Imprimir</b> mira la <b>vista previa</b>: lo que ves ahí es lo que sale.<br>3️⃣ ¿La tabla no cabe? En los ajustes de impresión elige <b>"Ajustar hoja en una página"</b>, o cambia la orientación a <b>Horizontal</b> si la tabla es ancha.</p><p>Y si tu lista ocupa varias páginas: <b>Disposición de página → Imprimir títulos</b> → "Repetir filas en extremo superior" → seleccionas la fila 1. Así los encabezados salen en TODAS las páginas.</p><div class="tip">💡 ¿Sin impresora? Elige "Guardar como PDF" en la lista de impresoras: se crea un PDF perfecto para mandar por WhatsApp.</div>',
ex:{tit:'Lista de asistencia lista para imprimir', desc:'Esta lista se imprimirá en una sola página, horizontal, con área de impresión definida. Sin sorpresas.',

sel:'A1', formula:'', cap:'Con bordes puestos (recuerda: la cuadrícula gris no se imprime) y área de impresión definida, queda perfecta en papel.',

{t:'Porcentajes reales: IVA y descuentos', e:'💯',
txt:'<p>Los porcentajes asustan hasta que los ves en fórmulas. Con lo que sabes de multiplicar, ya puedes con todos. Ejemplos con la <b>ferretería de don Hernando</b>:</p><p>➕ <b>Sacar el IVA (19%):</b> <span class="formula-pill">=B2*19%</span> te da cuánto es el IVA de un precio.<br>💵 <b>Precio CON IVA:</b> <span class="formula-pill">=B2*1,19</span> (el precio completico, con impuesto incluido).<br>🔻 <b>Aplicar descuento del 20%:</b> <span class="formula-pill">=B2*0,8</span> (si quitas el 20%, pagas el 80%).<br>📈 <b>Subir precios un 10%:</b> <span class="formula-pill">=B2*1,1</span></p><p>El truco mental: <b>descuento = multiplicar por lo que QUEDA</b> (100% − descuento). ¿Descuento del 30%? Multiplica por 0,7. ¿Del 15%? Por 0,85.</p><div class="tip">💡 ¿Qué porcentaje es 45.000 de 150.000? Al revés también se puede: =45000/150000 y le das formato de porcentaje: 30%.</div>',
ex:{tit:'Lista de precios de la ferretería', desc:'Precio base en B, y las fórmulas calculan el precio con IVA y el precio con 10% de descuento para clientes fieles.',
grid:[['Producto','Base','Con IVA','Con dcto.'],['Martillo','25.000','29.750','26.775'],['Taladro','180.000','214.200','192.780'],['Pintura','48.000','57.120','51.408']],
sel:'C2', formula:'=B2*1,19', res:['C2','C3','C4','D2','D3','D4'], cap:'C2 es =B2*1,19 (con IVA) y D2 es =C2*0,9 (el precio con IVA menos el 10%). Arrastradas hacia abajo, toda la lista queda calculada.',
pasos:['Haz una lista de productos con precio base.','Calcula el precio con IVA: =B2*1,19 y arrastra.','Agrega columna de descuento del 10%: =C2*0,9.','Juega: ¿cuánto quedaría con descuento del 25%? (pista: por 0,75).']},
quiz:[
{q:'¿Cómo calculas un precio CON IVA del 19%?', o:['=B2*19','=B2*1,19','=B2+19','=B2/19'], c:1, fb:'Multiplicar por 1,19 = el precio completo más su 19%. Multiplicar por 19% solo te da el impuesto.'},
{q:'Para aplicar un descuento del 30%, multiplicas por...', o:['0,3','0,7','30','1,3'], c:1, fb:'Pagas lo que queda: 100% − 30% = 70%, o sea × 0,7.'},
{q:'Una camisa de $80.000 queda en $60.000. ¿Qué descuento le hicieron?', o:['20%','25%','30%','15%'], c:1, fb:'Rebajaron $20.000 de $80.000: 20000/80000 = 0,25 = 25%.'}]},

{t:'REDONDEAR: decimales bajo control', e:'🎯',
txt:'<p>Haces una división y Excel te suelta un 3.416,6666667... ¿Y ahora? Nadie cobra $3.416,67 en efectivo. Para eso existe <b>REDONDEAR</b>:</p><p><span class="formula-pill">=REDONDEAR(B2;0)</span> → sin decimales: 3.417<br><span class="formula-pill">=REDONDEAR(B2;2)</span> → con 2 decimales: 3.416,67<br><span class="formula-pill">=REDONDEAR(B2;-2)</span> → ¡a las centenas!: 3.400</p><p>Y sus primos con carácter:<br>⬆️ <span class="formula-pill">=REDONDEAR.MAS(B2;0)</span> — siempre para arriba (para no perder plata cobrando).<br>⬇️ <span class="formula-pill">=REDONDEAR.MENOS(B2;0)</span> — siempre para abajo.</p><p>Ojo con esto: el botón de "quitar decimales" de la pestaña Inicio solo los <b>esconde</b> (el número sigue completo por dentro). REDONDEAR sí <b>cambia el número de verdad</b>. Para cuentas de plata, usa la función.</p><div class="tip">💡 En la panadería de doña Inés: el bulto de harina rinde 3 tandas y cada tanda 47,33 panes. ¿Cuántos panes vendes? REDONDEAR.MENOS: 47. El 0,33 de pan no se puede vender. 😄</div>',
ex:{tit:'El costo por pan de doña Inés', desc:'Costo de ingredientes dividido entre panes producidos da decimales larguísimos. REDONDEAR deja el costo listo para calcular precios.',
grid:[['Concepto','Valor'],['Costo tanda','85.000'],['Panes por tanda','60'],['Costo por pan','1.416,6667'],['Redondeado','1.417']],
sel:'B5', formula:'=REDONDEAR(B4;0)', res:['B4','B5'], cap:'B4 es =B2/B3 (sale con decimales infinitos) y B5 lo redondea. Sobre ese $1.417 doña Inés define su precio de venta.',
pasos:['Divide dos números que den decimales largos (=100000/7 por ejemplo).','Aplica =REDONDEAR(celda;0) y compara.','Prueba con 2, con -2 y con REDONDEAR.MAS.','Piensa un caso tuyo: ¿qué cifras necesitas redondear?']},
quiz:[
{q:'¿Qué devuelve =REDONDEAR(1416,67;0)?', o:['1416,67','1417','1416','1400'], c:1, fb:'Con 0 decimales, 1416,67 sube a 1417 (el ,67 redondea hacia arriba).'},
{q:'¿Cuál es la diferencia entre REDONDEAR y el botón de quitar decimales?', o:['Ninguna','El botón solo esconde los decimales; la función cambia el número de verdad','La función es de pago','El botón es más exacto'], c:1, fb:'El formato es maquillaje; REDONDEAR es cirugía. Para plata, usa la función.'},
{q:'Vendes panes enteros y la cuenta da 47,9 panes. ¿Qué función usas para saber cuántos puedes vender?', o:['REDONDEAR.MAS','REDONDEAR.MENOS','SUMA','MAX'], c:1, fb:'REDONDEAR.MENOS baja a 47: el 0,9 de pan no existe en la vitrina.'}]},

{t:'Pegado especial: valores y transponer', e:'📐',
txt:'<p>El pegado normal (Ctrl+V) pega TODO: fórmulas, formatos, colores. Pero a veces quieres pegar <b>solo una parte</b>. Para eso: copia normal (Ctrl+C) y luego <b>clic derecho → Pegado especial</b>. Las dos joyas:</p><p>🔢 <b>Pegar solo VALORES:</b> pega el resultado y mata la fórmula. ¿Para qué? Cuando vas a enviar el archivo y no quieres que se dañen las fórmulas en otro computador, o cuando quieres "congelar" resultados para que no sigan cambiando.</p><p>🔄 <b>TRANSPONER:</b> convierte filas en columnas y columnas en filas. La tabla que armaste a lo alto queda a lo ancho, en un clic. Salva vidas cuando armaste la tabla "al revés".</p><p>También puedes pegar solo formatos (la brochita 🖌️ de la pestaña Inicio hace algo parecido: copia el formato de una celda y lo "pinta" en otra).</p><div class="tip">💡 En el celular: mantén presionada la celda al pegar y busca "Pegado especial" en el menú. En Sheets: Ctrl+Shift+V pega solo valores directo.</div>',
ex:{tit:'La tabla del menú, girada', desc:'El menú del restaurante estaba en vertical y lo necesitaban en horizontal para el informe. Copiar → Pegado especial → Transponer:',
antes:[['Plato','Precio'],['Bandeja','18.000'],['Mojarra','22.000'],['Ajiaco','15.000']],
grid:[['Plato','Bandeja','Mojarra','Ajiaco'],['Precio','18.000','22.000','15.000']],
sel:'A1', formula:'', cap:'Misma información, otra orientación. Sin volver a escribir nada: eso es transponer.',
pasos:['Copia una tabla vertical (Ctrl+C).','En una zona libre: clic derecho → Pegado especial → marca Transponer.','Ahora prueba pegar solo valores: copia una celda con fórmula y pégala como valores.','Toca la celda pegada: ya no hay fórmula, solo el número. Quedó congelada.']},
quiz:[
{q:'¿Qué hace "pegar solo valores"?', o:['Pega la fórmula viva','Pega el resultado y elimina la fórmula','Pega solo el color','No pega nada'], c:1, fb:'Queda el número puro, congelado. Ideal para compartir archivos sin que se dañen.'},
{q:'¿Qué hace Transponer?', o:['Traduce el texto','Convierte filas en columnas y viceversa','Borra los datos','Suma la tabla'], c:1, fb:'Gira la tabla: lo vertical queda horizontal. Sin reescribir nada.'},
{q:'¿Para qué sirve la brochita de "copiar formato"?', o:['Para pintar dibujos','Para copiar el formato de una celda y aplicarlo a otras','Para borrar celdas','Para hacer gráficos'], c:1, fb:'Copia solo la ropa (negrita, color, bordes) y se la pone a otras celdas.'}]},

{t:'Nombres de rango: fórmulas que se leen', e:'🏷️',
txt:'<p>¿Qué es más fácil de entender: <span class="formula-pill">=B2*$F$1</span> o <span class="formula-pill">=B2*ComisionEstilista</span>? Exacto. En Excel puedes <b>bautizar celdas y rangos</b> con nombres propios.</p><p>Cómo: selecciona la celda (o rango) → ve al <b>cuadro de nombres</b> (la casillita a la izquierda de la barra fx, donde aparece "B2") → escribe el nombre → Enter. Reglas: sin espacios, que empiece por letra.</p><p>Desde ahí, ese nombre funciona en cualquier fórmula del libro:</p><p><span class="formula-pill">=SUMA(VentasJulio)</span><br><span class="formula-pill">=B5*Comision</span></p><p>Ventajas: las fórmulas <b>se explican solas</b>, los nombres funcionan como referencias absolutas (no se corren al arrastrar) y sirven desde cualquier hoja sin escribir Hoja1!$F$1.</p><div class="tip">💡 Para ver y administrar todos tus nombres: pestaña <b>Fórmulas → Administrador de nombres</b>. Ahí los editas o borras.</div>',
ex:{tit:'Las comisiones del salón de belleza', desc:'La celda B1 se bautizó "Comision". Ahora la fórmula de cada estilista se lee como una frase:',
grid:[['% Comisión:','40%'],['Estilista','Servicios','Gana'],['Yesica','800.000','320.000'],['Paola','650.000','260.000']],
sel:'C3', formula:'=B3*Comision', res:['C3','C4'], cap:'"Comision" apunta a B1 (40%). Si suben la comisión al 45%, cambias B1 y todos los pagos se recalculan. Y la fórmula la entiende cualquiera.',
pasos:['Escribe un porcentaje en una celda.','Selecciónala, ve al cuadro de nombres (izquierda de la barra fx) y escribe: Comision. Enter.','Úsala en una fórmula: =B3*Comision y arrastra.','Revisa Fórmulas → Administrador de nombres para ver tu creación.']},
quiz:[
{q:'¿Dónde le pones nombre a una celda?', o:['En el menú Archivo','En el cuadro de nombres, a la izquierda de la barra fx','No se puede','En la Play Store'], c:1, fb:'Seleccionas, escribes el nombre en el cuadro de nombres y Enter. Bautizada.'},
{q:'¿Cuál es una ventaja de los nombres de rango?', o:['Hacen el archivo más pesado','Las fórmulas se entienden solas y no se corren al arrastrar','Cambian los colores','Suman más rápido'], c:1, fb:'=B5*Comision se explica sola, y el nombre se comporta como referencia fija.'},
{q:'¿Cuál nombre de rango es VÁLIDO?', o:['Ventas Julio (con espacio)','VentasJulio','2Ventas','Ventas-Julio!'], c:1, fb:'Sin espacios, empezando por letra: VentasJulio o Ventas_Julio.'}]},

{t:'Atajos que te hacen volar ⚡', e:'⚡',
txt:'<p>Cierre del nivel con regalo: los atajos que usan los que parecen magos frente a Excel. Ya conoces Ctrl+C/V/X/Z/G. Súmale estos (también sirven casi todos en Sheets):</p><p>⚡ <b>Ctrl+flechas:</b> salta al final de tus datos (arriba/abajo/lados). En listas largas es teletransporte.<br>⚡ <b>Ctrl+Shift+flechas:</b> selecciona hasta el final. Miles de filas seleccionadas en un segundo.<br>⚡ <b>Ctrl+E:</b> ya lo conoces, Relleno rápido.<br>⚡ <b>Ctrl+T:</b> spoiler del nivel Avanzado. 😉<br>⚡ <b>Ctrl+Shift+L:</b> pone y quita filtros.<br>⚡ <b>F2:</b> edita la celda (como el doble clic).<br>⚡ <b>Ctrl+Inicio:</b> vuelve a A1 desde donde estés.<br>⚡ <b>Alt+Enter:</b> salto de línea DENTRO de una celda.</p><div class="tip">💡 No intentes memorizarlos todos hoy. Elige DOS, úsalos toda la semana, y cuando salgan solos, adopta otros dos. En un mes eres otra persona frente a la hoja.</div>',
ex:{tit:'Tu tabla de entrenamiento', desc:'Pega esta mini rutina en tu hoja de práctica y ve tachando. Es un plan de gimnasio, pero para tus dedos:',
grid:[['Semana','Atajos a dominar'],['1','Ctrl+flechas y Ctrl+Shift+flechas'],['2','F2 y Ctrl+Shift+L'],['3','Ctrl+E y Alt+Enter'],['4','Repaso: todos sin mirar']],
sel:'B2', formula:'', cap:'Dos por semana. La constancia (¿te suena?) también aplica para los atajos.',
pasos:['Abre una lista larga y prueba Ctrl+flecha abajo: ¡zas, al final!','Vuelve con Ctrl+Inicio.','Selecciona toda una columna de datos con Ctrl+Shift+flecha abajo.','Escribe una dirección larga en una celda usando Alt+Enter para los renglones.']},
quiz:[
{q:'¿Qué hace Ctrl+flecha abajo en una lista de 5.000 filas?', o:['Baja una fila','Salta directo a la última fila con datos','Borra la lista','Cierra Excel'], c:1, fb:'Teletransporte al final de los datos. Con Shift, además selecciona todo el camino.'},
{q:'¿Cómo escribes dos renglones DENTRO de una misma celda?', o:['Con Enter normal','Con Alt+Enter','No se puede','Con espacios'], c:1, fb:'Alt+Enter hace el salto de línea sin salirte de la celda.'},
{q:'¿Cuál es la mejor estrategia para aprender atajos?', o:['Memorizar 20 en un día','Adoptar 2 por semana hasta que salgan solos','No usarlos','Imprimirlos y ya'], c:1, fb:'De a poquitos y con uso real. Los atajos se aprenden en los dedos, no en la cabeza.'}]},

{t:'Proyecto: inventario de la tienda 🏪', e:'🏁',
txt:'<p>¡Final del nivel Intermedio! 👏 Este proyecto junta todo: vas a armar el <b>control de inventario</b> de una tienda (o de tu emprendimiento, o de la papelería del colegio).</p><p>Vas a usar: fórmulas con $ 📌, SI para alertas 🤔, CONTAR.SI y SUMAR.SI 🎯, formato condicional 🚨, validación 📝 y lo que se te antoje del nivel.</p><p>La lógica del inventario es simple: <b>Stock actual = lo que había + lo que entra − lo que sale</b>. Y una columna de alerta que grite cuando algo se esté acabando.</p><div class="tip">💡 Este mismo modelo sirve para la despensa de la casa, los materiales de una obra o los medicamentos de la droguería. Cambia los productos y ya.</div>',
ex:{tit:'El inventario con alertas', desc:'Stock = inicial + entradas − salidas. Y la columna Alerta usa SI: cuando el stock queda en 5 o menos, avisa "¡PEDIR!".',
grid:[['Producto','Inicial','Entra','Sale','Stock','Alerta'],['Arroz','20','10','25','5','¡PEDIR!'],['Aceite','15','0','6','9','OK'],['Panela','30','12','38','4','¡PEDIR!']],
sel:'E2', formula:'=B2+C2-D2', res:['E2','E3','E4','F2','F3','F4'], cap:'E2 es =B2+C2-D2 y F2 es =SI(E2<=5;"¡PEDIR!";"OK"). Con formato condicional, los "¡PEDIR!" quedan rojos automáticamente.',
pasos:['Crea las columnas: Producto, Inicial, Entra, Sale, Stock, Alerta.','Stock: =B2+C2-D2, y arrastra hacia abajo.','Alerta: =SI(E2<=5;"¡PEDIR!";"OK") y arrastra.','Formato condicional en Alerta: si contiene "PEDIR", fondo rojo.','Bonus: =CONTAR.SI(F2:F20;"¡PEDIR!") te dice cuántos productos hay que reponer ya.']},
quiz:[
{q:'¿Cómo se calcula el stock actual?', o:['Inicial + Entradas − Salidas','Inicial × Salidas','Entradas − Inicial','Con MAX'], c:0, fb:'Lo que había, más lo que llegó, menos lo que se vendió o salió.'},
{q:'¿Qué fórmula avisa "¡PEDIR!" cuando el stock es 5 o menos?', o:['=SUMA(E2:E10)','=SI(E2<=5;"¡PEDIR!";"OK")','=CONTAR(E2)','=MAX(E2;5)'], c:1, fb:'La función SI evalúa el stock y decide el mensaje. Tu inventario habla solo.'},
{q:'¿Para qué el formato condicional en la columna de alerta?', o:['Decoración','Para que los productos por pedir salten a la vista en rojo, solos','Para imprimir','Para bloquear celdas'], c:1, fb:'Rojo automático en lo urgente: abres el archivo y en 2 segundos sabes qué pedir.'}]},
