{t:'Tablas de Excel: Ctrl+T', e:'🧱',
txt:'<p>Bienvenido(a) al nivel Avanzado 🏆. Arrancamos con un cambio de mentalidad: deja de trabajar con "celdas sueltas" y empieza a trabajar con <b>Tablas de verdad</b>.</p><p>Toca cualquier celda de tus datos y presiona <b>Ctrl+T</b> (o Insertar → Tabla). Tu rango se convierte en una Tabla oficial de Excel, y eso te regala:</p><p>✅ Filtros automáticos en los encabezados<br>✅ Colores alternados en las filas (legible al instante)<br>✅ Si agregas una fila nueva, <b>las fórmulas se copian solas</b><br>✅ Fila de totales con un clic<br>✅ Los gráficos y tablas dinámicas conectados crecen solos con los datos</p><p>Además puedes ponerle nombre (pestaña "Diseño de tabla"): en vez de A2:C500, tus fórmulas dirán cosas como <span class="formula-pill">=SUMA(Ventas[Total])</span>. Se lee solo.</p><div class="tip">💡 Regla para que Ctrl+T funcione perfecto: tus datos deben tener encabezados en la primera fila y ninguna fila o columna completamente vacía en el medio.</div>',
ex:{tit:'De rango simple a Tabla pro', desc:'Esta tabla de ventas ya es una Tabla de Excel: tiene filtros, colores alternados y fila de totales automática.',
grid:[['Fecha','Producto','Total'],['01/07','Empanadas','30.000'],['01/07','Jugos','22.000'],['02/07','Empanadas','45.000'],['Total','','97.000']],
sel:'C5', formula:'=SUBTOTALES(109;[Total])', res:['C5'], cap:'La fila de totales usa SUBTOTALES: si filtras solo "Empanadas", el total se ajusta a lo visible. Los rangos normales no hacen eso.',
pasos:['Abre cualquiera de tus listas (inventario, gastos...).','Toca una celda y presiona Ctrl+T → Aceptar.','En "Diseño de tabla" activa "Fila de totales" y ponle nombre a la tabla: Ventas.','Escribe una fila nueva al final: mira cómo hereda formato y fórmulas sola.']},
quiz:[
{q:'¿Cuál es el atajo para convertir un rango en Tabla de Excel?', o:['Ctrl+B','Ctrl+T','Ctrl+P','Alt+F4'], c:1, fb:'Ctrl+T convierte tus datos en Tabla con filtros, estilos y superpoderes.'},
{q:'Agregas una fila nueva al final de una Tabla con fórmulas. ¿Qué pasa?', o:['Queda vacía','Las fórmulas y el formato se copian solos a la fila nueva','Se daña la tabla','Hay que rehacer todo'], c:1, fb:'Las Tablas se expanden solas: fórmulas, formato y filtros incluyen la fila nueva.'},
{q:'¿Qué requisito necesitan tus datos antes de Ctrl+T?', o:['Estar ordenados alfabéticamente','Tener encabezados y no tener filas/columnas vacías en el medio','Tener colores','Ser menos de 100 filas'], c:1, fb:'Encabezados claros y datos continuos: así Excel detecta bien el rango de la Tabla.'}]},

{t:'SUMAR.SI.CONJUNTO: varias condiciones', e:'🎛️',
txt:'<p>Ya dominas SUMAR.SI con UNA condición. ¿Pero si necesitas dos o más? "Cuánto vendió <b>Paola</b> en <b>julio</b>", por ejemplo. Para eso está la versión recargada:</p><p><span class="formula-pill">=SUMAR.SI.CONJUNTO(C2:C50;A2:A50;"Paola";B2:B50;"Julio")</span></p><p>Ojo al orden, que aquí cambia: <b>primero va lo que quieres sumar</b>, y después van los pares "dónde miro; qué busco" las veces que necesites:</p><p>1️⃣ Rango a sumar (C2:C50)<br>2️⃣ Primer rango de criterio + criterio (vendedora = "Paola")<br>3️⃣ Segundo rango + criterio (mes = "Julio")<br>...y así hasta 127 condiciones.</p><p>Su hermano <span class="formula-pill">=CONTAR.SI.CONJUNTO(A2:A50;"Paola";B2:B50;"Julio")</span> cuenta en vez de sumar.</p><div class="tip">💡 También acepta comparaciones: ...;D2:D50;"&gt;=100000" suma solo cuando además el valor es de 100.000 para arriba.</div>',
ex:{tit:'¿Cuánto vendió Paola en julio?', desc:'Registro de ventas con vendedora y mes. La fórmula suma solo las filas que cumplen las DOS condiciones.',
grid:[['Vendedora','Mes','Venta'],['Paola','Julio','300.000'],['Diego','Julio','250.000'],['Paola','Junio','180.000'],['Paola','Julio','200.000'],['Paola en julio:','','500.000']],
sel:'C6', formula:'=SUMAR.SI.CONJUNTO(C2:C5;A2:A5;"Paola";B2:B5;"Julio")', res:['C6'], cap:'300.000 + 200.000 = 500.000: solo las filas donde es Paola Y es julio. La venta de junio no entra.',
pasos:['Arma un registro de ventas con columnas: vendedor, mes, valor.','Escribe la fórmula: primero el rango de valores a sumar.','Agrega los pares: rango de vendedores;"Paola"; rango de meses;"Julio".','Cámbiale los criterios y compárala con la realidad. Cuadra perfecto.']},
quiz:[
{q:'En SUMAR.SI.CONJUNTO, ¿qué va PRIMERO?', o:['El primer criterio','El rango que se va a sumar','El nombre de la hoja','Un punto y coma'], c:1, fb:'Al revés de SUMAR.SI: aquí primero se indica qué sumar, luego los pares de condiciones.'},
{q:'¿Cuál fórmula cuenta los pedidos de "Luisa" que están "Pendiente"?', o:['=CONTAR.SI.CONJUNTO(A:A;"Luisa";B:B;"Pendiente")','=CONTAR(A:A)','=SUMAR.SI(A:A;"Luisa")','=SI(A1="Luisa";1;0)'], c:0, fb:'CONTAR.SI.CONJUNTO acepta varios pares rango-criterio y cuenta las filas que cumplen todos.'},
{q:'¿Cuántas condiciones soporta SUMAR.SI.CONJUNTO?', o:['Solo 2','Hasta 127','Solo 1','Ilimitadas pero pagando'], c:1, fb:'Hasta 127 pares de condiciones. En la práctica, con 2 o 3 resuelves casi todo.'}]},

{t:'Tablas dinámicas I: el resumen mágico', e:'🪄',
txt:'<p>Llegó la joya de la corona. Si Excel tuviera un truco de magia estrella, sería la <b>tabla dinámica</b>: convierte una lista de 1.000 movimientos en un resumen perfecto <b>en segundos, sin escribir una sola fórmula</b>.</p><p>Cómo se crea: toca tu lista → <b>Insertar → Tabla dinámica</b> → Aceptar. Se abre una hoja nueva con un panel a la derecha con 4 cajones:</p><p>📋 <b>Filas:</b> lo que quieres ver como lista (ej: Producto)<br>📊 <b>Valores:</b> lo que quieres calcular (ej: Suma de Venta)<br>📐 <b>Columnas:</b> para cruzar (ej: Mes)<br>🔍 <b>Filtros:</b> para ver solo una parte</p><p>Arrastra los campos a los cajones y el resumen se arma solo. ¿Quieres verlo por vendedor en vez de producto? Arrastras otro campo y ya. Por eso se llama <b>dinámica</b>.</p><div class="tip">💡 Si cambian los datos de origen, la dinámica no se entera sola: clic derecho sobre ella → <b>Actualizar</b>. No se te olvide.</div>',
ex:{tit:'De 500 filas a esto', desc:'Imagina 500 ventas registradas una por una. La tabla dinámica las resume así, arrastrando Producto a Filas y Venta a Valores:',
grid:[['Producto','Suma de Venta'],['Empanadas','1.250.000'],['Jugos','830.000'],['Tortas','2.100.000'],['Total general','4.180.000']],
sel:'B4', formula:'', cap:'Cero fórmulas escritas. Solo arrastrar campos. Y si mañana quieres el resumen por mes, lo cambias en 5 segundos.',
pasos:['Necesitas una lista con varias columnas (fecha, producto, vendedor, valor) y hartas filas.','Toca la lista → Insertar → Tabla dinámica → Aceptar.','Arrastra Producto al cajón Filas y Valor al cajón Valores.','Juega: saca Producto, mete Vendedor. Mete Mes en Columnas. Es adictivo.']},
quiz:[
{q:'¿Cuál es el gran poder de una tabla dinámica?', o:['Pintar celdas','Resumir miles de datos en segundos sin fórmulas','Corregir ortografía','Imprimir rápido'], c:1, fb:'Resúmenes instantáneos y reorganizables arrastrando campos. La herramienta más poderosa de Excel.'},
{q:'¿A qué cajón arrastras "Producto" para ver la lista de productos resumida?', o:['Valores','Filas','Filtros','Ninguno'], c:1, fb:'Filas muestra cada producto como una fila del resumen. Valores calcula (suma, cuenta...).'},
{q:'Cambiaron los datos de origen. ¿Qué haces con la dinámica?', o:['Nada, se actualiza sola','Clic derecho → Actualizar','Borrarla y hacer otra','Reiniciar el computador'], c:1, fb:'Las dinámicas no se actualizan solas: clic derecho → Actualizar y quedan al día.'}]},

{t:'Tablas dinámicas II: filtros y segmentación', e:'🎚️',
txt:'<p>Vamos a ponerle turbo a tu tabla dinámica:</p><p>🧮 <b>Cambiar el cálculo:</b> en el cajón Valores, toca el campo → "Configuración de campo de valor". ¿No quieres suma? Elige <b>Cuenta</b> (cuántos), <b>Promedio</b>, Máx, Mín... El mismo dato, mil lecturas.</p><p>📊 <b>Mostrar porcentajes:</b> ahí mismo, en "Mostrar valores como" → <b>% del total general</b>. Sabrás qué producto es el 40% de tus ventas.</p><p>🎛️ <b>Segmentación de datos:</b> la elegancia máxima. Con la dinámica seleccionada: <b>Insertar → Segmentación de datos</b> → eliges por ejemplo "Mes". Aparecen <b>botones grandes</b> para filtrar con un dedo: tocas "Julio" y toda la tabla muestra solo julio. Perfecto para pantallas y para jefes con afán.</p><div class="tip">💡 Una misma segmentación puede controlar varias tablas dinámicas a la vez (clic derecho → Conexiones de informe). Así se construyen los tableros profesionales.</div>',
ex:{tit:'Ventas con botones de filtro', desc:'La dinámica muestra ventas por producto, y arriba imagina los botones de segmentación: [Junio] [Julio] [Agosto]. Con "Julio" activo:',
grid:[['Filtro: JULIO','',''],['Producto','Ventas','% del total'],['Tortas','800.000','47%'],['Empanadas','550.000','32%'],['Jugos','350.000','21%']],
sel:'C3', formula:'', cap:'El % del total se activó en "Mostrar valores como". Ahora no solo sabes cuánto: sabes qué tanto pesa cada producto.',
pasos:['En tu dinámica, toca el campo de Valores → Configuración → prueba Cuenta y Promedio.','Duplica el campo de valores y a la copia ponle "% del total general".','Insertar → Segmentación de datos → elige Mes (o Vendedor).','Toca los botones y mira el resumen cambiar al instante.']},
quiz:[
{q:'¿Qué es la segmentación de datos?', o:['Cortar la tabla en pedazos','Botones visuales para filtrar la tabla dinámica con un clic','Un tipo de gráfico','Dividir celdas'], c:1, fb:'Filtros en forma de botones grandes: tocas y la dinámica se filtra. Ideal para tableros.'},
{q:'¿Dónde cambias "Suma" por "Promedio" en una dinámica?', o:['En la barra fx','En Configuración de campo de valor','Borrando la tabla','En Archivo'], c:1, fb:'Tocas el campo en el cajón Valores → Configuración de campo de valor → eliges el cálculo.'},
{q:'¿Para qué sirve "% del total general"?', o:['Para sumar dos veces','Para ver cuánto pesa cada categoría dentro del total','Para quitar decimales','Para nada'], c:1, fb:'Convierte los valores en porcentajes del total: se ve de una qué es lo más importante.'}]},

{t:'Gráficos dinámicos', e:'📊',
txt:'<p>Ya tienes el resumen (tabla dinámica) y los botones (segmentación). Falta el broche: el <b>gráfico dinámico</b>, un gráfico conectado directamente a tu tabla dinámica.</p><p>Con la dinámica seleccionada: <b>Insertar → Gráfico dinámico</b>, eliges el tipo (columnas para comparar, torta para proporciones, líneas para tiempo) y listo.</p><p>¿Qué lo hace especial frente a un gráfico normal?</p><p>🔗 Si filtras con la segmentación, <b>el gráfico se filtra también</b>, en vivo.<br>🔄 Si reorganizas la dinámica (cambias Producto por Vendedor), el gráfico se rearma solo.<br>🎛️ El propio gráfico trae botones de campo para filtrar desde ahí mismo.</p><p>Tabla dinámica + segmentación + gráfico dinámico = ya casi tienes un tablero profesional. De hecho, ese es el proyecto de la lección 14. 😉</p><div class="tip">💡 Para presentar bonito: clic derecho en los botones grises del gráfico → "Ocultar botones de campo". Queda limpio como de revista.</div>',
ex:{tit:'El combo completo en acción', desc:'Así se ve el resumen que alimenta al gráfico de columnas: tocas "Julio" en la segmentación y tabla + gráfico cambian juntos.',
grid:[['Producto','Ventas'],['Tortas','800.000'],['Empanadas','550.000'],['Jugos','350.000']],
sel:'B2', formula:'', cap:'En tu Excel, junto a esta tabla estaría el gráfico de columnas bailando cada vez que filtras. Conexión total.',
pasos:['Selecciona tu tabla dinámica.','Insertar → Gráfico dinámico → Columnas agrupadas.','Filtra con tu segmentación: mira la tabla y el gráfico cambiar juntos.','Reorganiza la dinámica y observa el gráfico rearmarse. 🤯']},
quiz:[
{q:'¿Qué pasa con el gráfico dinámico cuando filtras la tabla dinámica?', o:['Nada','Se filtra también, al instante','Se borra','Se imprime'], c:1, fb:'Están conectados: mismo filtro, misma información, cero esfuerzo.'},
{q:'¿Cómo se inserta un gráfico dinámico?', o:['Con la dinámica seleccionada: Insertar → Gráfico dinámico','Dibujándolo a mano','Con Ctrl+Z','Desde WhatsApp'], c:0, fb:'Seleccionas la dinámica, Insertar → Gráfico dinámico, eliges el tipo y listo.'},
{q:'Tabla dinámica + segmentación + gráfico dinámico se parece mucho a...', o:['Una carta','Un tablero (dashboard) profesional','Un correo','Una macro'], c:1, fb:'Ese combo es la base de los dashboards que verás en la lección 14.'}]},

{t:'BUSCARX: el buscador moderno', e:'🔎',
txt:'<p>¿Te acuerdas de BUSCARV y su regla de "solo busca en la primera columna"? Microsoft también se cansó de eso y creó <b>BUSCARX</b> (XLOOKUP), disponible en las versiones recientes de Excel:</p><p><span class="formula-pill">=BUSCARX(E2;A2:A50;C2:C50;"No está")</span></p><p>Se lee facilito: "busca lo de E2 <b>en esta columna</b> (A), tráeme lo de <b>esta otra</b> (C), y si no lo encuentras di <b>No está</b>". Sus ventajas:</p><p>✅ Busca en cualquier columna y trae de cualquier otra (¡también hacia la izquierda!)<br>✅ El mensaje de "no encontrado" viene incluido, sin SI.ERROR<br>✅ Coincidencia exacta por defecto, sin acordarse del FALSO</p><div class="tip">💡 ¿Tu Excel es viejito y no tiene BUSCARX? El combo clásico =INDICE(columna_a_traer;COINCIDIR(dato;columna_donde_buscar;0)) hace lo mismo. Es bueno conocer ambos.</div>',
ex:{tit:'Buscar el teléfono por nombre', desc:'La columna de nombres NO es la primera y no importa: BUSCARX busca en B y trae de C sin despeinarse.',
grid:[['Código','Cliente','Teléfono'],['C-01','Luisa','300 111 2233'],['C-02','Mario','301 444 5566'],['C-03','Sofía','302 777 8899'],['Busco a:','Mario','301 444 5566']],
sel:'C5', formula:'=BUSCARX(B5;B2:B4;C2:C4;"No está")', res:['C5'], cap:'Buscó "Mario" en la columna B y trajo su teléfono de la C. Con BUSCARV clásico habrías tenido que reorganizar la tabla.',
pasos:['Arma un directorio: código, nombre, teléfono.','En una celda escribe un nombre a buscar.','=BUSCARX( el nombre; la columna de nombres; la columna de teléfonos;"No está")','Prueba con un nombre que no exista: sale tu mensaje, no un error feo.']},
quiz:[
{q:'¿Qué ventaja tiene BUSCARX sobre BUSCARV?', o:['Es más bonito','Busca en cualquier columna y trae de cualquier otra, incluso a la izquierda','Suma más rápido','Ninguna'], c:1, fb:'Sin la regla de la primera columna, y con mensaje de "no encontrado" incorporado.'},
{q:'En =BUSCARX(E2;A2:A50;C2:C50;"Nada") ¿qué es C2:C50?', o:['Donde busca','Lo que trae (columna de resultados)','Un error','El criterio'], c:1, fb:'Primero qué buscar, luego dónde buscar (A), luego qué traer (C).'},
{q:'Tu Excel no tiene BUSCARX. ¿Cuál es el combo clásico equivalente?', o:['SUMA+RESTA','INDICE + COINCIDIR','MAX + MIN','CONTAR + SI'], c:1, fb:'INDICE(qué traer;COINCIDIR(qué buscar;dónde;0)) es el BUSCARX de los Excel veteranos.'}]},

{t:'Cirugía de texto: EXTRAE y compañía', e:'✂️',
txt:'<p>A veces el dato que necesitas está <b>atrapado dentro</b> de otro texto: el año en "FAC-2026-091", los primeros dígitos de una cédula, el nombre en un correo. Bisturí:</p><p>⬅️ <span class="formula-pill">=IZQUIERDA(A2;3)</span> — los primeros 3 caracteres.<br>➡️ <span class="formula-pill">=DERECHA(A2;4)</span> — los últimos 4.<br>🎯 <span class="formula-pill">=EXTRAE(A2;5;4)</span> — desde la posición 5, saca 4 caracteres.<br>📏 <span class="formula-pill">=LARGO(A2)</span> — cuántos caracteres tiene (útil para validar cédulas o celulares).</p><p>Y el truco que enamora: <b>Relleno rápido (Ctrl+E)</b>. Escribe a mano el primer resultado que quieres, presiona Ctrl+E, y Excel <b>detecta el patrón</b> y llena el resto solo. Sin fórmulas.</p><div class="tip">💡 ¿Datos pegados en una sola columna ("Pérez;Juan;3001112233")? Datos → <b>Texto en columnas</b> los separa usando el ; como tijera.</div>',
ex:{tit:'Sacando el año de la factura', desc:'Los códigos son FAC-2026-091: el año empieza en la posición 5 y mide 4 caracteres. EXTRAE lo saca limpio.',
grid:[['Factura','Año'],['FAC-2026-091','2026'],['FAC-2025-457','2025'],['FAC-2026-102','2026']],
sel:'B2', formula:'=EXTRAE(A2;5;4)', res:['B2','B3','B4'], cap:'Cuenta las posiciones: F(1) A(2) C(3) -(4) 2(5). Desde la 5, cuatro caracteres: el año.',
pasos:['Escribe códigos tipo FAC-2026-091 en una columna.','Al lado usa =EXTRAE(A2;5;4) y arrastra.','Ahora bórralas y prueba el camino fácil: escribe "2026" a mano en la primera y presiona Ctrl+E.','Prueba LARGO sobre una columna de celulares: los que no midan 10, están mal.']},
quiz:[
{q:'¿Qué devuelve =DERECHA("2026-091";3)?', o:['202','091','-09','2026'], c:1, fb:'DERECHA toma los últimos caracteres: los 3 finales son 091.'},
{q:'¿Qué hace =EXTRAE(A2;5;4)?', o:['Borra 5 letras','Desde la posición 5, extrae 4 caracteres','Multiplica 5×4','Extrae la celda E5'], c:1, fb:'EXTRAE(texto;desde_dónde;cuántos): cirugía de precisión en el texto.'},
{q:'¿Qué es el Relleno rápido (Ctrl+E)?', o:['Un borrador','Excel detecta el patrón de tu primer ejemplo y llena el resto solo','Un color de relleno','Pegado especial'], c:1, fb:'Escribes el primer resultado deseado, Ctrl+E, y Excel imita el patrón en toda la columna. Magia sin fórmulas.'}]},

{t:'Datos limpios: duplicados fuera', e:'🧹',
txt:'<p>Los datos de la vida real llegan sucios: gente registrada dos veces, espacios de más, mayúsculas revueltas. Y con datos sucios, <b>toda fórmula miente</b>. Kit de limpieza profesional:</p><p>🗑️ <b>Quitar duplicados:</b> selecciona tu tabla → <b>Datos → Quitar duplicados</b> → eliges las columnas que definen el duplicado (¿misma cédula? ¿mismo correo?) → Excel borra los repetidos y te dice cuántos eliminó.</p><p>🔍 <b>Encontrarlos sin borrar:</b> Formato condicional → Reglas para resaltar → <b>Valores duplicados</b>. Se pintan y tú decides.</p><p>🧴 Y ya conoces el resto del kit: ESPACIOS() para espacios fantasma, NOMPROPIO() para mayúsculas, validación con listas para que no vuelva a entrar basura.</p><div class="tip">💡 Antes de quitar duplicados, haz una copia de la hoja (clic derecho en la pestaña → Mover o copiar → Crear una copia). Lo borrado no avisa.</div>',
ex:{tit:'Depurando la lista del sorteo', desc:'Miguel se registró dos veces con la misma cédula. "Quitar duplicados" por la columna Cédula lo detecta y deja una sola entrada.',
grid:[['Cédula','Nombre'],['1.098.222','Miguel R.'],['63.111.444','Carmen P.'],['1.098.222','miguel rodriguez'],['91.555.333','Andrés T.']],
sel:'A4', formula:'', cap:'Aunque el nombre está escrito distinto, la cédula es la misma: por eso se elige la cédula como columna clave del duplicado.',
pasos:['Haz una lista con algún registro repetido a propósito.','Primero píntalos: Formato condicional → Valores duplicados.','Copia la hoja de respaldo.','Datos → Quitar duplicados → marca solo la columna clave (cédula) → Aceptar.']},
quiz:[
{q:'¿Dónde está "Quitar duplicados"?', o:['Inicio','Datos','Vista','Archivo'], c:1, fb:'Pestaña Datos → Quitar duplicados. Eliges las columnas y Excel limpia.'},
{q:'¿Por qué conviene marcar solo la CÉDULA al quitar duplicados de personas?', o:['Porque es más rápido','Porque el nombre puede estar escrito distinto, pero la cédula no miente','Porque los nombres no importan','Porque sí'], c:1, fb:'"Miguel R." y "miguel rodriguez" parecen distintos, pero la cédula revela que son la misma persona.'},
{q:'¿Qué precaución tomas antes de quitar duplicados?', o:['Cerrar Excel','Hacer una copia de la hoja','Imprimir','Cambiar el color'], c:1, fb:'Copia de respaldo primero: lo que borra Quitar duplicados no se puede revisar después.'}]},

{t:'Buscar objetivo: la pregunta al revés', e:'🎯',
txt:'<p>Normalmente le das datos a Excel y te devuelve un resultado. <b>Buscar objetivo</b> funciona al revés: le dices el resultado que quieres y Excel te dice <b>qué dato necesitas para lograrlo</b>.</p><p>Ejemplos de la vida real:</p><p>💰 "¿Cuánto debo vender al día para ganarme $2.000.000 al mes?"<br>📈 "¿Qué nota necesito en el examen final para pasar la materia?"<br>🏦 "¿A cuántas cuotas debo diferir para que la cuota no pase de $300.000?"</p><p>Cómo se usa: <b>Datos → Análisis de hipótesis → Buscar objetivo</b>. Tres casillas:</p><p>1️⃣ <b>Definir la celda:</b> la del resultado (debe tener fórmula)<br>2️⃣ <b>Con el valor:</b> el número que sueñas<br>3️⃣ <b>Cambiando la celda:</b> la que Excel puede mover</p><p>Aceptar, y Excel prueba miles de valores en un segundo hasta dar en el blanco.</p><div class="tip">💡 La celda del paso 1 debe tener una FÓRMULA que dependa de la celda del paso 3. Si no están conectadas, no hay magia posible.</div>',
ex:{tit:'¿Qué nota necesito para pasar?', desc:'La definitiva es el promedio de 3 notas. Ya hay un 2,5 y un 3,0. Buscar objetivo calcula qué nota falta para que el promedio dé 3,0.',
grid:[['Corte','Nota'],['Primer parcial','2,5'],['Segundo parcial','3,0'],['Examen final','3,5'],['DEFINITIVA','3,0']],
sel:'B5', formula:'=PROMEDIO(B2:B4)', res:['B4','B5'], cap:'Se definió: celda B5 (la definitiva) con valor 3,0 cambiando B4 (el examen). Respuesta de Excel: necesitas 3,5.',
pasos:['Arma el promedio: tres notas y =PROMEDIO() abajo.','Deja la tercera nota vacía o inventada.','Datos → Análisis de hipótesis → Buscar objetivo.','Definir: la celda del promedio. Valor: 3. Cambiando: la nota del final.','Acepta y mira a Excel resolver tu vida académica.']},
quiz:[
{q:'¿Qué hace Buscar objetivo?', o:['Busca palabras en la hoja','Calcula qué dato necesitas para llegar al resultado que quieres','Encuentra archivos perdidos','Filtra datos'], c:1, fb:'Le das la meta y te dice el valor exacto que la logra. La pregunta al revés.'},
{q:'¿Qué debe tener la celda que "defines" en Buscar objetivo?', o:['Un texto','Una fórmula conectada con la celda que cambia','Un color','Estar vacía'], c:1, fb:'Sin fórmula que las conecte, Excel no tiene forma de mover una para afectar la otra.'},
{q:'"¿Cuánto debo vender diario para ganar $2.000.000 al mes?" es un caso de...', o:['BUSCARV','Buscar objetivo','Filtros','Ordenar'], c:1, fb:'Meta conocida, dato desconocido: exactamente para eso existe Buscar objetivo.'}]},

{t:'Proteger tu trabajo', e:'🔒',
txt:'<p>Hiciste una plantilla hermosa, la compartiste... y alguien borró las fórmulas "sin querer queriendo". 😤 Nunca más. Excel te deja blindar tu trabajo:</p><p>🔒 <b>Proteger la hoja:</b> <b>Revisar → Proteger hoja</b> (con o sin contraseña). Nadie puede modificar nada... salvo lo que tú permitas.</p><p>🔓 <b>Dejar celdas editables:</b> el truco está en el orden: ANTES de proteger, selecciona las celdas donde SÍ se puede escribir (donde va el nombre, las cantidades...) → clic derecho → Formato de celdas → pestaña <b>Proteger</b> → desmarca "Bloqueada". Luego proteges la hoja: solo esas celdas quedan libres.</p><p>🗝️ <b>Proteger el archivo entero:</b> Archivo → Información → Proteger libro → <b>Cifrar con contraseña</b>. Sin la clave, nadie lo abre.</p><div class="tip">💡 Si le pones contraseña y se te olvida, no hay "recuperar contraseña". Escríbela en un lugar seguro. En serio. 😅</div>',
ex:{tit:'Plantilla blindada', desc:'Formato de pedido protegido: solo se puede escribir en Cantidad (celdas desbloqueadas). Precios y fórmulas, intocables.',
grid:[['Producto','Precio','Cantidad','Total'],['Empanada','1.500','10','15.000'],['Jugo','2.000','5','10.000'],['','','A PAGAR:','25.000']],
sel:'C2', formula:'', cap:'Las celdas de Cantidad se desbloquearon antes de proteger. Si alguien intenta tocar un precio, Excel se lo impide con un aviso.',
pasos:['Arma un formato con precios y fórmulas de total.','Selecciona SOLO las celdas de cantidad → clic derecho → Formato de celdas → Proteger → desmarca "Bloqueada".','Revisar → Proteger hoja → Aceptar.','Intenta dañar una fórmula: imposible. Intenta cambiar una cantidad: fluye normal.']},
quiz:[
{q:'¿Qué haces ANTES de proteger la hoja para dejar algunas celdas editables?', o:['Pintarlas de verde','Desmarcarles "Bloqueada" en Formato de celdas → Proteger','Borrarlas','Copiarlas a otra hoja'], c:1, fb:'Primero se desbloquean las celdas permitidas, después se protege la hoja. El orden es la clave.'},
{q:'¿Dónde está el botón "Proteger hoja"?', o:['Inicio','Insertar','Revisar','Vista'], c:2, fb:'Pestaña Revisar → Proteger hoja. Con contraseña opcional.'},
{q:'Se te olvidó la contraseña del archivo cifrado. ¿Qué pasa?', o:['Excel la recuerda por ti','La mandan al correo','No hay forma oficial de recuperarla: guárdala bien','Se quita sola en 30 días'], c:2, fb:'El cifrado es en serio: sin clave no hay acceso. Anótala en un lugar seguro.'}]},

{t:'Macros I: graba tu primer robot', e:'🤖',
txt:'<p>Una <b>macro</b> es una grabación de tus pasos en Excel que luego puedes repetir con un clic. Todo lo que haces a diario y por repetición (dar formato, ordenar, limpiar, preparar el informe) puede hacerlo un "robot" grabado por ti.</p><p>Primero, activa el arma secreta: <b>Archivo → Opciones → Personalizar cinta → marca "Programador"</b>. Aparece una pestaña nueva.</p><p>Para grabar: <b>Programador → Grabar macro</b> → dale un nombre (sin espacios, ej: FormatoInforme) → Aceptar. Desde ese momento Excel <b>graba todo lo que hagas</b>. Haz tus pasos con calma y al final: <b>Detener grabación</b>.</p><p>Para reproducirla: Programador → Macros → eliges la tuya → <b>Ejecutar</b>. Y todo pasa solo en un parpadeo. 🤯</p><div class="tip">💡 OJO al guardar: los archivos con macros se guardan como <b>.xlsm</b> (libro habilitado para macros), no .xlsx normal. Si no, la macro se pierde.</div>',
ex:{tit:'La macro "FormatoTitulos"', desc:'Pasos grabados: negrita + fondo verde + bordes + autoajustar columnas. Ahora cualquier tabla fea queda linda con un solo clic.',
grid:[['ANTES','','DESPUÉS',''],['datos sin formato','','Encabezado verde','Bordes ✓'],['todo regado','','Negrita ✓','Ajustado ✓']],
sel:'C2', formula:'', cap:'Lo que te tomaba 8 clics cada vez, ahora es 1. Multiplica eso por cada día del año.',
pasos:['Activa la pestaña Programador (Archivo → Opciones → Personalizar cinta).','Grabar macro → nómbrala FormatoTitulos → Aceptar.','Aplica formato a una tabla: negrita, color, bordes. Detén la grabación.','Pega datos sin formato en otro lado y ejecuta tu macro. 🎩']},
quiz:[
{q:'¿Qué es una macro?', o:['Un virus','Una grabación de pasos que se repite con un clic','Una celda gigante','Un tipo de gráfico'], c:1, fb:'Grabas tus pasos una vez y Excel los repite cuando quieras. Automatización pura.'},
{q:'¿Con qué extensión guardas un archivo con macros?', o:['.xlsx','.xlsm','.pdf','.docx'], c:1, fb:'.xlsm = libro habilitado para macros. En .xlsx normal, las macros se pierden.'},
{q:'¿Dónde activas la pestaña Programador?', o:['Ya viene activa','Archivo → Opciones → Personalizar cinta','En internet','Con Ctrl+P'], c:1, fb:'Se marca la casilla "Programador" en Personalizar cinta y aparece la pestaña.'}]},

{t:'Macros II: botones para tu equipo', e:'🔘',
txt:'<p>Tu macro funciona, pero nadie va a ir hasta el menú de macros a buscarla. Lo profesional es ponerle un <b>botón gigante</b> en la hoja que diga "ORDENAR PEDIDOS" o "LIMPIAR FORMATO". Cualquiera lo entiende.</p><p>Cómo: <b>Insertar → Formas</b> → dibuja un rectángulo redondeado → escríbele el texto → <b>clic derecho → Asignar macro</b> → eliges la tuya. Listo: forma con superpoderes.</p><p>Ideas de macros útiles para grabar:</p><p>🧹 Limpiar los datos de un formulario para empezar de nuevo<br>📊 Ordenar la lista de pedidos por fecha y resaltarla<br>🖨️ Configurar la impresión y sacar el PDF del informe<br>📅 Insertar la fecha y preparar la plantilla del día</p><div class="tip">💡 Cuando abras un archivo con macros, Excel muestra una barra amarilla de advertencia. Si el archivo es tuyo o de alguien de confianza: "Habilitar contenido". Si te llegó de un desconocido: no, gracias (las macros también pueden traer virus).</div>',
ex:{tit:'La hoja con botones', desc:'Así se ve una hoja de trabajo con botones de macro: la persona que la usa no necesita saber nada de Excel, solo tocar.',
grid:[['🔘 LIMPIAR FORMULARIO','','🔘 GENERAR INFORME'],['','',''],['Pedidos del día:','','32'],['Listos para entrega:','','28']],
sel:'A1', formula:'', cap:'Cada "botón" es una forma con macro asignada. La hoja se convierte en una pequeña aplicación hecha por ti.',
pasos:['Inserta una forma (rectángulo redondeado) y escríbele "MI MACRO".','Clic derecho sobre la forma → Asignar macro → elige la de la lección pasada.','Toca el botón: tu macro corre al instante.','Dale color y sombra a la forma: que se vea tocable.']},
quiz:[
{q:'¿Cómo conectas una forma con una macro?', o:['Se conectan solas','Clic derecho sobre la forma → Asignar macro','Con una fórmula','Por Bluetooth'], c:1, fb:'Asignar macro convierte cualquier forma en un botón ejecutable.'},
{q:'Te llega por correo un Excel con macros de un desconocido. ¿Qué haces?', o:['Habilitar contenido de una','No habilitar las macros: pueden traer código malicioso','Reenviarlo a todos','Imprimirlo'], c:1, fb:'Las macros ejecutan código. De fuentes desconocidas, mejor no habilitarlas.'},
{q:'¿Cuál es la gran ventaja de los botones de macro?', o:['Se ven bonitos','Cualquier persona puede usar la hoja sin saber Excel','Gastan menos tinta','Suman más rápido'], c:1, fb:'Conviertes tu hoja en una mini-aplicación: la gente solo toca botones.'}]},

{t:'Proyecto: nómina paso a paso', e:'💼',
txt:'<p>Vamos a armar algo muy solicitado: una <b>nómina sencilla</b>, el cálculo del pago de empleados. (Ojo: simplificada para aprender; los porcentajes legales cambian, verifica los vigentes en tu país.)</p><p>La lógica universal de una nómina:</p><p>1️⃣ <b>Devengado:</b> lo ganado = días trabajados × valor del día (+ extras)<br>2️⃣ <b>Deducciones:</b> lo que se descuenta (en Colombia, por ejemplo: 4% salud + 4% pensión del trabajador)<br>3️⃣ <b>Neto a pagar:</b> devengado − deducciones</p><p>Aquí brillan tus referencias absolutas: los porcentajes van en celdas aparte con <b>$</b>, para cambiarlos en un solo lugar si la ley cambia.</p><div class="tip">💡 Combínala con lo aprendido: BUSCARX para traer datos del empleado, formato moneda, protección de hoja para que nadie dañe las fórmulas, y una macro que genere el PDF de los desprendibles. 😎</div>',
ex:{tit:'La nómina de la microempresa', desc:'Salario diario × días = devengado. Salud y pensión (4% cada una, guardadas en celdas fijas) se restan y queda el neto.',
grid:[['Empleado','Días','Devengado','Deducc.','Neto'],['Carmen','30','1.400.000','112.000','1.288.000'],['Andrés','15','700.000','56.000','644.000'],['TOTALES','','2.100.000','168.000','1.932.000']],
sel:'E2', formula:'=C2-D2', res:['C2','D2','E2','E3','E4'], cap:'D2 es =C2*($H$1+$H$2), donde H1 y H2 guardan los porcentajes de salud y pensión. Cambia la ley → cambias 2 celdas y toda la nómina se recalcula.',
pasos:['Crea celdas aparte: % salud (4%) y % pensión (4%).','Tabla: empleado, días, valor día, devengado (=días*valor día).','Deducciones: =devengado*($celda salud+$celda pensión) con referencias fijas.','Neto: =devengado−deducciones. Totales con SUMA.','Protege la hoja dejando editables solo los días trabajados.']},
quiz:[
{q:'¿Cómo se calcula el neto a pagar?', o:['Devengado + deducciones','Devengado − deducciones','Deducciones × 2','Con MAX'], c:1, fb:'Lo ganado menos lo descontado: esa es la plata que recibe el empleado.'},
{q:'¿Por qué los porcentajes van en celdas aparte con referencias $?', o:['Por estética','Para cambiarlos en UN solo lugar si la ley cambia','Porque Excel lo exige','Para esconderlos'], c:1, fb:'Un dato importante se escribe UNA vez y se referencia con $. Mantenimiento en segundos.'},
{q:'Deducción del 8% total sobre $1.000.000. ¿Cuánto se descuenta?', o:['$8.000','$80.000','$800.000','$18.000'], c:1, fb:'1.000.000 × 0,08 = 80.000. El neto sería $920.000.'}]},

{t:'Dashboard: tu tablero de control', e:'📟',
txt:'<p>Un <b>dashboard</b> es una hoja donde se ve TODO el estado de tu negocio de un solo vistazo: los números clave, gráficos y filtros, como el tablero de un carro. Y ya tienes todas las piezas para armarlo:</p><p>🧱 <b>La receta profesional:</b></p><p>1️⃣ Una hoja "Datos" con tu registro en Tabla (Ctrl+T)<br>2️⃣ Una hoja "Cálculos" con tus tablas dinámicas<br>3️⃣ Una hoja "Tablero", limpia y bonita, con:<br>&nbsp;&nbsp;&nbsp;• 3 o 4 <b>números grandes</b> (ventas del mes, total pedidos, % de meta) traídos con fórmulas<br>&nbsp;&nbsp;&nbsp;• 2 o 3 <b>gráficos dinámicos</b> movidos desde Cálculos<br>&nbsp;&nbsp;&nbsp;• <b>Segmentaciones</b> conectadas a todas las dinámicas</p><p>Trucos de presentación: quita las líneas de cuadrícula (Vista → desmarcar Líneas de cuadrícula), usa 2 colores máximo, celdas grandes para las cifras clave.</p><div class="tip">💡 Los números grandes se hacen con celdas combinadas + fuente tamaño 36 + la fórmula que trae el dato. Simple y de alto impacto.</div>',
ex:{tit:'El tablero del negocio', desc:'Así se organiza la hoja Tablero: arriba las cifras clave gigantes, abajo los gráficos, a un lado los botones de mes.',
grid:[['VENTAS JULIO','PEDIDOS','META'],['$ 4.2 M','132','84%'],['[Gráfico columnas]','[Gráfico torta]','[Jun][Jul]'],['Ventas por semana','Por producto','← filtros']],
sel:'A2', formula:'', cap:'Quien abre esta hoja entiende el negocio en 5 segundos. Ese es el objetivo de un dashboard.',
pasos:['Hoja 1 "Datos": tu registro en Tabla oficial.','Hoja 2 "Cálculos": crea 2 o 3 tablas dinámicas (ventas por mes, por producto...).','Hoja 3 "Tablero": cifras grandes con fórmulas, y mueve ahí los gráficos dinámicos.','Inserta segmentaciones y conéctalas a todas las dinámicas (Conexiones de informe).','Quita cuadrícula, alinea, dale color. A presumir. 😎']},
quiz:[
{q:'¿Qué es un dashboard?', o:['Un tipo de letra','Una hoja que resume lo importante del negocio de un vistazo','Una impresora','Un virus'], c:1, fb:'Cifras clave + gráficos + filtros en una sola pantalla. El tablero de mando.'},
{q:'¿Cuál es la estructura recomendada del archivo?', o:['Todo revuelto en una hoja','Datos, Cálculos y Tablero en hojas separadas','Un archivo por número','Solo gráficos'], c:1, fb:'Separar datos, cálculos y presentación mantiene todo ordenado y fácil de actualizar.'},
{q:'¿Cómo se filtra todo el tablero de una vez?', o:['Hoja por hoja','Con segmentaciones conectadas a todas las tablas dinámicas','No se puede','Borrando datos'], c:1, fb:'Una segmentación con Conexiones de informe controla todas las dinámicas → todo el tablero cambia junto.'}]},

{t:'Funciones modernas: UNICOS y FILTRAR', e:'✨',
txt:'<p>Las versiones recientes de Excel (y Google Sheets) traen funciones "que se desparraman": escribes UNA fórmula y el resultado <b>se extiende solo</b> por varias celdas. Las tres estrellas:</p><p>💎 <span class="formula-pill">=UNICOS(A2:A200)</span> — te da la lista <b>sin repetidos</b>. ¿500 ventas con clientes repetidos? Esta te saca la lista limpia de clientes. (En Sheets se llama UNIQUE.)</p><p>🔍 <span class="formula-pill">=FILTRAR(A2:C200;C2:C200&gt;100000)</span> — extrae a otra parte SOLO las filas que cumplen la condición. Como el filtro normal, pero el resultado es una tabla nueva que se actualiza sola. (En Sheets: FILTER.)</p><p>↕️ <span class="formula-pill">=ORDENAR(A2:C200)</span> — una copia ordenada de tus datos, sin tocar los originales. (En Sheets: SORT.)</p><div class="tip">💡 Si al usarlas ves el error #¡DESBORDAMIENTO!, es que el resultado no cabe: hay celdas ocupadas estorbando debajo. Despeja el espacio y listo.</div>',
ex:{tit:'Clientes únicos de la droguería', desc:'Del registro de ventas (con clientes repetidos), UNICOS saca la lista limpia en la columna D. Una fórmula, toda la lista:',
grid:[['Cliente','Compra','','Únicos'],['Marta','12.000','','Marta'],['Julio','8.000','','Julio'],['Marta','15.000','','Rosa'],['Rosa','9.500','','']],
sel:'D2', formula:'=UNICOS(A2:A5)', res:['D2','D3','D4'], cap:'La fórmula se escribió SOLO en D2, y ella solita se desparramó hacia abajo con la lista sin repetidos. Si llega un cliente nuevo, aparece solo.',
pasos:['En un registro con nombres repetidos, escribe =UNICOS( o =UNIQUE( en Sheets ) en una columna libre.','Observa el desparrame: una fórmula, muchas celdas.','Prueba =FILTRAR(tu tabla; columna de valores>100000).','Combínalas: =ORDENAR(UNICOS(A2:A200)) — lista limpia Y ordenada.']},
quiz:[
{q:'¿Qué hace =UNICOS(A2:A100)?', o:['Cuenta las celdas','Devuelve la lista sin valores repetidos','Borra los repetidos del original','Pinta los únicos'], c:1, fb:'Crea la lista limpia en otro lado, sin tocar tus datos originales.'},
{q:'¿Qué significa el error #¡DESBORDAMIENTO!?', o:['El archivo se llenó','El resultado no cabe porque hay celdas ocupadas estorbando','Excel se cansó','Faltan datos'], c:1, fb:'Estas fórmulas necesitan espacio libre para desparramarse. Despeja debajo y funciona.'},
{q:'¿Cómo se llama UNICOS en Google Sheets?', o:['UNIQUE','SOLO','CLEAN','SINREPES'], c:0, fb:'UNIQUE, FILTER y SORT: mismos poderes, nombre en inglés.'}]},

{t:'SI.CONJUNTO: muchos casos sin enredo', e:'🧭',
txt:'<p>¿Recuerdas la función SI? Funciona linda con 2 opciones... pero cuando hay 4 o 5 casos toca anidar SI dentro de SI dentro de SI y queda un espagueti. La solución moderna: <b>SI.CONJUNTO</b> (IFS en Sheets/inglés):</p><p><span class="formula-pill">=SI.CONJUNTO(B2&gt;=4,5;"Excelente";B2&gt;=4;"Bueno";B2&gt;=3;"Aprobó";VERDADERO;"Perdió")</span></p><p>Se lee de corrido: "¿es ≥4,5? Excelente. ¿≥4? Bueno. ¿≥3? Aprobó. ¿Nada de eso? Perdió". Va evaluando <b>en orden</b> y responde con el primer caso que se cumpla.</p><p>Detalles finos: el orden importa (pon primero el caso más exigente), y el último par <b>VERDADERO;"lo que sea"</b> es el "para todo lo demás".</p><div class="tip">💡 Caso real de la empresa de domicilios: tarifa por zona. Zona 1: $3.000, Zona 2: $5.000, Zona 3: $8.000, resto: "consultar". Un SI.CONJUNTO y la tarifa sale sola.</div>',
ex:{tit:'Clasificando clientes por compras', desc:'El almacén clasifica clientes según sus compras del año: VIP, Frecuente, Ocasional o Nuevo. Un solo SI.CONJUNTO decide:',
grid:[['Cliente','Compras año','Categoría'],['Marta','5.200.000','VIP'],['Julio','1.800.000','Frecuente'],['Rosa','400.000','Ocasional'],['Leo','80.000','Nuevo']],
sel:'C2', formula:'=SI.CONJUNTO(B2>=3000000;"VIP";B2>=1000000;"Frecuente";B2>=200000;"Ocasional";VERDADERO;"Nuevo")', res:['C2','C3','C4','C5'], cap:'Cuatro categorías en una sola fórmula legible. Con SI anidados esto sería un trabalenguas de paréntesis.',
pasos:['Define tus categorías y sus límites (de mayor a menor).','Escribe el SI.CONJUNTO empezando por el caso más alto.','Cierra con VERDADERO;"categoría por defecto".','Arrastra y verifica contra tus datos.']},
quiz:[
{q:'¿Para qué sirve SI.CONJUNTO?', o:['Para sumar conjuntos','Para evaluar varios casos en orden sin anidar SI tras SI','Para contar celdas','Para unir textos'], c:1, fb:'Muchos casos, una fórmula limpia. El primero que se cumpla, gana.'},
{q:'¿Qué significa el par final VERDADERO;"Otro"?', o:['Un error','El caso por defecto: para todo lo que no cumplió nada','Que la fórmula es verdadera','Que hay que repetir'], c:1, fb:'VERDADERO siempre se cumple: es la red de seguridad para los casos restantes.'},
{q:'¿Por qué importa el ORDEN de los casos?', o:['Por estética','Porque responde con el PRIMER caso que se cumpla','No importa','Por el alfabeto'], c:1, fb:'Si pones B2>=3 antes que B2>=4,5, un 5,0 quedaría en "Aprobó". Primero lo más exigente.'}]},

{t:'Préstamos con PAGO: la cuota clara', e:'🏦',
txt:'<p>Esta lección te puede ahorrar plata de verdad. Antes de aceptar un crédito, calcula tú mismo la cuota con la función <b>PAGO</b>:</p><p><span class="formula-pill">=PAGO(tasa;número de cuotas;-monto)</span></p><p>Por ejemplo, un préstamo de $10.000.000 a 36 meses con interés del 1,5% mensual:</p><p><span class="formula-pill">=PAGO(1,5%;36;-10000000)</span> → $361.524 al mes</p><p>Detalles importantes:<br>⚠️ La tasa debe estar en el <b>mismo período</b> que las cuotas: cuotas mensuales, tasa mensual.<br>➖ El monto va en <b>negativo</b> (es plata que te dieron) para que la cuota salga en positivo.<br>💡 Multiplica la cuota por el número de meses y réstale el préstamo: eso es lo que pagas de intereses. Prepárate para la sorpresa.</p><div class="tip">💡 PAGO funciona igual en Google Sheets. Y combínala con Buscar objetivo: "¿cuántos meses necesito para que la cuota me quede en $250.000?" 😏</div>',
ex:{tit:'¿Me conviene este crédito de moto?', desc:'Moto de $8.000.000, 24 cuotas, 1,8% mensual. La hoja calcula la cuota y el costo real del crédito:',
grid:[['Concepto','Valor'],['Préstamo','8.000.000'],['Cuotas','24'],['Tasa mensual','1,8%'],['Cuota','=PAGO'],['Total pagado','9.960.000'],['Intereses','1.960.000']],
sel:'B5', formula:'=PAGO(B4;B3;-B2)', res:['B5','B6','B7'], cap:'La cuota da ≈ $415.000. Total pagado: cuota × 24. La moto de 8 millones termina costando casi 10. Ahora decides con los ojos abiertos.',
pasos:['Arma las celdas: monto, cuotas, tasa mensual.','Calcula =PAGO(tasa;cuotas;-monto).','Total pagado: =cuota*cuotas. Intereses: =total−monto.','Prueba con un crédito real que te hayan ofrecido. Respira. Decide.']},
quiz:[
{q:'¿Qué calcula la función PAGO?', o:['El sueldo','La cuota fija de un préstamo','El IVA','Los años de deuda'], c:1, fb:'Con tasa, número de cuotas y monto, te dice la cuota exacta.'},
{q:'Si las cuotas son mensuales, la tasa debe ser...', o:['Anual','Mensual','Diaria','Da igual'], c:1, fb:'Tasa y cuotas en el mismo período. Si te dan tasa anual, divídela entre 12 (aproximado).'},
{q:'¿Por qué el monto se pone en negativo: -10000000?', o:['Por error','Porque es plata que recibes, y así la cuota sale positiva','Porque los bancos son negativos','Para esconderlo'], c:1, fb:'Es la convención financiera de Excel: lo que entra y lo que sale con signos opuestos.'}]},

{t:'Consolidar: juntar varias hojas en una', e:'🧩',
txt:'<p>La distribuidora tiene 3 sedes y cada una manda su hoja de ventas. El jefe quiere <b>un solo resumen</b>. ¿Copiar y pegar todo? No, señor. Opciones profesionales:</p><p>🔗 <b>Fórmulas 3D:</b> si las hojas tienen la MISMA estructura (mismo producto en la misma celda), suma a través de hojas:<br><span class="formula-pill">=SUMA(Norte:Sur!B2)</span> — suma la celda B2 de TODAS las hojas entre "Norte" y "Sur". Una fórmula, todas las sedes.</p><p>➕ <b>Sumar hoja por hoja:</b> <span class="formula-pill">=Norte!B2+Centro!B2+Sur!B2</span> — más manual pero funciona siempre y se entiende fácil.</p><p>🛠️ <b>Herramienta Consolidar:</b> <b>Datos → Consolidar</b> junta rangos de varias hojas aunque no estén en el mismo orden (usa los rótulos para emparejar).</p><div class="tip">💡 La regla de oro para que consolidar sea fácil: usa la MISMA plantilla en todas las hojas. Estandarizar primero, consolidar después.</div>',
ex:{tit:'El resumen de las 3 sedes', desc:'Hojas "Norte", "Centro" y "Sur" con la misma plantilla. La hoja Resumen las junta con fórmulas 3D:',
grid:[['Producto','Total 3 sedes'],['Gaseosas','2.450.000'],['Snacks','1.890.000'],['Lácteos','3.120.000']],
sel:'B2', formula:'=SUMA(Norte:Sur!B2)', res:['B2','B3','B4'], cap:'Cada celda del resumen suma esa misma celda en todas las hojas de sede. Si una sede corrige un dato, el resumen se actualiza.',
pasos:['Crea 3 hojas con la misma mini-tabla (producto y venta), cambia solo los valores.','Nómbralas: Norte, Centro, Sur.','En una hoja "Resumen": =SUMA(Norte:Sur!B2) y arrastra.','Cambia un valor en cualquier sede y mira el resumen reaccionar.']},
quiz:[
{q:'¿Qué suma la fórmula =SUMA(Enero:Diciembre!B5)?', o:['Solo enero y diciembre','La celda B5 de TODAS las hojas entre Enero y Diciembre','Un error','La fila 5 completa'], c:1, fb:'Es una fórmula 3D: atraviesa todas las hojas del rango y suma esa celda en cada una.'},
{q:'¿Cuál es el requisito ideal para consolidar fácil?', o:['Hojas de colores','Que todas las hojas usen la misma plantilla/estructura','Tener impresora','Pocas filas'], c:1, fb:'Misma estructura = consolidación de un plumazo. Estandarizar es la mitad del trabajo.'},
{q:'¿Dónde está la herramienta Consolidar?', o:['Inicio','Datos → Consolidar','Vista','Archivo'], c:1, fb:'Pestaña Datos → Consolidar: junta rangos de varias hojas emparejando por rótulos.'}]},

{t:'Power Query: el aspirador de datos', e:'🌀',
txt:'<p>Última herramienta del arsenal, y es de las grandes: <b>Power Query</b> (en Excel de PC: pestaña <b>Datos → Obtener y transformar</b>).</p><p>¿Qué hace? Se conecta a una fuente de datos (otro Excel, un CSV que te mandan cada semana, una carpeta llena de archivos...), le aplica <b>pasos de limpieza que tú defines UNA vez</b> (quitar columnas, filtrar, cambiar formatos, quitar duplicados...) y suelta la tabla limpia en tu hoja.</p><p>La magia: los pasos <b>quedan grabados</b>. La próxima semana, cuando llegue el archivo nuevo, tocas <b>Actualizar</b> y toda la limpieza se repite sola. Es como una macro, pero especializada en datos y sin programar.</p><p>El flujo profesional completo que ya puedes armar: <b>Power Query</b> (limpia) → <b>Tabla</b> (organiza) → <b>Tabla dinámica</b> (resume) → <b>Dashboard</b> (muestra). Así trabajan los analistas de verdad.</p><div class="tip">💡 Power Query es de Excel para PC (no está en la app del celular). En Google Sheets, lo más parecido para traer datos es la función IMPORTRANGE, que conecta una hoja con otra.</div>',
ex:{tit:'La rutina semanal, automatizada', desc:'Cada lunes llega el mismo archivo desordenado del proveedor. Compara la rutina manual contra Power Query:',
grid:[['Tarea','A mano','Power Query'],['Abrir y pegar','10 min','0 min'],['Borrar columnas','5 min','0 min'],['Quitar duplicados','5 min','0 min'],['TOTAL semanal','20 min','1 clic']],
sel:'C5', formula:'', cap:'20 minutos semanales son más de 17 horas al año. Un clic contra 17 horas: ese es el negocio de Power Query.',

function getPract(){ return PRACT[DATA[cur.ni].id+"-"+cur.li]; }
function normPr(s){
  return s.toLowerCase().replace(/\s+/g,"").normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[""]/g,'"');
}
function comprobarPractica(){
  const pr = getPract();
  const inp = document.getElementById("prIn").value;
  if(!inp.trim()){ alert("✍️ Escribe tu respuesta primero."); return; }
  const val = normPr(inp);
  let ok = false;
  pr.ans.forEach(a=>{
    const n = normPr(a);
    if(val===n || val===n.split(";").join(",")) ok = true;
  });
  const fb = document.getElementById("prFb");
  if(ok){
    if(navigator.vibrate) navigator.vibrate(30);
    sonido("practica");
    reaccion("feliz");
    cur.pts = (cur.pts||0)+15;
    fb.innerHTML = '<div class="q-fb ok"><b>✅ ¡Perfecto! Así se escribe. +15 🪙</b>Acabas de escribirla tú mismo(a): eso ya nadie te lo quita. Sigue al quiz.</div>';
    document.getElementById("prIn").disabled = true;
    const btn = document.getElementById("btnSig");
    btn.className = "btn btn-verde"; btn.disabled = false;
    btn.textContent = "Al quiz 🎯"; btn.onclick = ()=>{ cur.fase=3; cur.qi=0; cur.score=0; pintarLeccion(); };
  }else{
    cur.intentos = (cur.intentos||0)+1;
    sonido("error");
    if(navigator.vibrate) navigator.vibrate([60,40,60]);
    reaccion("triste");
    let extra = "";
    if(cur.intentos>=2) extra = '<button class="btn btn-blanco" style="margin-top:10px" onclick="verRespuestaPr()">Mostrar la respuesta 👀</button>';
    fb.innerHTML = '<div class="q-fb mal"><b>🤏 Casi. Revisa e intenta de nuevo.</b>Pista: '+pr.hint+'</div>'+extra;
  }
}
function pistaPractica(){
  const pr = getPract();
  document.getElementById("prFb").innerHTML = '<div class="q-fb ok" style="border-color:var(--amarillo);background:#fff8e1"><b>💡 Pista</b>'+pr.hint+'</div>';
  reaccion("amor");
}
function verRespuestaPr(){
  const pr = getPract();
  document.getElementById("prFb").innerHTML = '<div class="q-fb ok"><b>👀 La respuesta era:</b><span class="formula-pill" style="font-size:16px">'+pr.ans[0].toUpperCase()+'</span><br><br>Escríbela tú en el recuadro para que te quede en los dedos, y sigue al quiz.</div>';
  const btn = document.getElementById("btnSig");
  btn.className = "btn btn-verde"; btn.disabled = false;
  btn.textContent = "Al quiz 🎯"; btn.onclick = ()=>{ cur.fase=3; cur.qi=0; cur.score=0; pintarLeccion(); };
}

let S = {};
try{ S = JSON.parse(localStorage.getItem("excelJAL")||"{}"); }catch(e){ S={}; }
if(!S.stars) S.stars = {};
if(typeof S.pts!=="number") S.pts = 0;
if(!S.buys) S.buys = ["michi"];
if(!S.equip) S.equip = {base:"michi", top:null, face:null, aura:null};
if(!S.lvlBonus) S.lvlBonus = {};
if(typeof S.voz!=="number") S.voz = 1.35;
if(typeof S.mute!=="boolean") S.mute = false;
function guardar(){ localStorage.setItem("excelJAL", JSON.stringify(S)); }
function fmtPts(n){ return (n||0).toLocaleString("es-CO"); }

function totalLecc(){ return DATA.reduce((a,n)=>a+n.lecciones.length,0); }
function hechas(){ return Object.keys(S.stars).length; }
function nivelCompleto(ni){ return DATA[ni].lecciones.every((l,i)=>S.stars[ni+"-"+i]); }
function desbloqueada(ni,li){
  if(ni===0 && li===0) return true;
  if(li>0) return !!S.stars[ni+"-"+(li-1)];
  return nivelCompleto(ni-1);
}

function esc(t){ return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

  document.getElementById("tbBar").style.width = pct+"%";

  let h = "";
  h += '<div class="hero">';
  if(S.nombre) h += '<div class="saludo">👋 ¡Hola, '+esc(S.nombre)+'!</div>';
  h += '<h1>Aprende Excel gratis, a tu ritmo 📱</h1>';
  h += '<p>Lección por lección, con ejemplos de la vida real, <b>práctica interactiva</b> y quiz. Gana <b>🪙 monedas</b> por cada acierto, cómprate personajes en la tiendita y al terminar TODO el curso descarga tu <b>certificado en PDF</b>. Tu progreso se guarda solo en este celular: nada sale de aquí.</p>';
  h += '<p style="margin-top:10px;font-size:13px;opacity:.85">🎬 Un curso del canal de <b>Iván Rodríguez</b></p>';
  h += '<div class="perfil">'+avatarHTML("mini")+'<div><div class="pf-n">'+(S.nombre?esc(S.nombre):"Estudiante")+'</div><div class="pf-p">🪙 '+fmtPts(S.pts)+' monedas</div></div><button class="btn-tienda" onclick="abrirTienda()">🛍️ Tiendita</button></div>';
  h += '<div style="display:flex;gap:8px;margin-top:8px"><button class="btn-tienda" style="flex:1;margin:0;background:#fff;color:var(--verde);box-shadow:0 3px 0 #cfd8d2" onclick="abrirRetos()">🧩 Retos: Arma la tabla</button></div>';
  h += '</div>';

  let primeraActual = null, nivelGlobal = 0;
  DATA.forEach((niv,ni)=>{
    const done = niv.lecciones.filter((l,i)=>S.stars[ni+"-"+i]).length;
    const pctNiv = Math.round(done/niv.lecciones.length*100);
    const bloqNivel = ni>0 && !nivelCompleto(ni-1);
    h += '<div class="nivel-head'+(bloqNivel?' bloq':'')+'"><div class="nh-ico">'+niv.ico+'</div><div style="flex:1;min-width:0"><div class="nh-tit">'+niv.nombre+'</div><div class="nh-sub">'+niv.sub+'</div>';
    h += '<div style="height:7px;background:#e2eae5;border-radius:99px;margin-top:7px;overflow:hidden"><div style="height:100%;width:'+pctNiv+'%;background:var(--verde);border-radius:99px;transition:width .5s"></div></div>';
    h += '</div><div class="nh-prog">'+done+'/'+niv.lecciones.length+'</div></div>';
    h += '<div class="camino">';
    niv.lecciones.forEach((lec,li)=>{
      nivelGlobal++;
      const key = ni+"-"+li, st = S.stars[key];
      const unlocked = desbloqueada(ni,li);
      const actual = unlocked && !st && !primeraActual;
      if(actual) primeraActual = key;
      const pos = ["","izq","der",""][li%4] || "";
      let cls = "nodo "+pos+(st?" hecho":actual?" actual":unlocked?"":" bloq");
      h += '<button class="'+cls+'" onclick="abrirLeccion('+ni+','+li+')">';
      if(st) h += '<div class="stars">'+"⭐".repeat(st)+'</div>';
      if(actual) h += '<div class="empieza">EMPIEZA AQUÍ</div>';
      h += '<div class="circ">'+(st? "✅" : unlocked? lec.e : "🔒")+'</div>';
      h += '<div class="etq"><span style="color:var(--verde);font-weight:800">NIVEL '+nivelGlobal+'</span><br>'+lec.t+'</div></button>';
    });
    if(ni>0){
      const certOk = nivelCompleto(ni);
      h += '<button class="nodo cert'+(certOk?' hecho':' bloq')+'" onclick="abrirCert('+ni+')">';
      h += '<div class="circ">'+(certOk?"🎓":"🔒")+'</div><div class="etq">CERTIFICADO<br>Excel '+niv.nombre.replace("Nivel ","")+'</div></button>';
    }
    h += '</div>';
  });
  h += '<div class="footerlinks">Hecho con ❤️ por Iván Rodríguez · <button onclick="reiniciar()">Borrar mi progreso</button></div>';
  document.getElementById("home").innerHTML = h;
}

let cur = null; // {ni, li, fase, qi, score, resp}

function abrirLeccion(ni,li){
  sonido("click");
  if(!desbloqueada(ni,li)){
    alert("🔒 Primero completa la lección anterior. ¡Vas por buen camino!");
    return;
  }
  cur = {ni, li, fase:0, qi:0, score:0, intentos:0};
  pintarLeccion();
}

function cerrarLeccion(){
  pararAudio();
  document.getElementById("pantallas").innerHTML = "";
  cur = null; renderHome();
  window.scrollTo(0, scrollGuardado);
}
let scrollGuardado = 0;

function faseAtras(){
  if(cur.fase===3){ cur.fase = getPract()?2:1; cur.qi=0; cur.score=0; cur.perm=null; cur.qOrder=null; cur.intentos=0; }
  else if(cur.fase===2) cur.fase = 1;
  else if(cur.fase===1) cur.fase = 0;
  pintarLeccion();
}
const SHEETS_EX = {
  "avanzado-10":"🟩 <b>En Google Sheets:</b> las macros también existen (Extensiones → Macros → Grabar macro). Se guardan en la nube, sin archivos .xlsm.",
  "avanzado-11":"🟩 <b>En Google Sheets:</b> asignas la macro desde Insertar → Dibujo (creas el botón) → los 3 puntitos → Asignar secuencia de comandos.",
  "avanzado-18":"🟩 <b>En Google Sheets:</b> Power Query no existe, pero IMPORTRANGE conecta hojas entre sí, y con Gemini puedes pedir limpiezas de datos."
};
function notaSheets(){
  const key = DATA[cur.ni].id+"-"+cur.li;
  return SHEETS_EX[key] || "🟩 <b>¿Usas Google Sheets?</b> Esto funciona igualito: mismas fórmulas, mismos pasos. Aprende una vez, aplica en los dos.";
}
function progLeccion(){
  const lec = DATA[cur.ni].lecciones[cur.li];
  const pr = getPract()?1:0;
  const totalPasos = 2 + pr + lec.quiz.length + 1;
  let paso;
  if(cur.fase===0) paso = 1;
  else if(cur.fase===1) paso = 2;
  else if(cur.fase===2) paso = 2+pr;
  else if(cur.fase===3) paso = 2+pr+cur.qi+1;
  else paso = totalPasos;
  return Math.round(paso/totalPasos*100);
}

function pintarLeccion(){
  pararAudio();
  scrollGuardado = window.scrollY || scrollGuardado;
  const lec = DATA[cur.ni].lecciones[cur.li];
  let h = '<div class="pantalla"><div class="p-head">';
  h += '<button class="btn-x" onclick="cerrarLeccion()">✕</button>';
  if(cur.fase>0 && cur.fase<4) h += '<button class="btn-x" style="background:var(--verde-claro);color:var(--verde);font-size:20px" onclick="faseAtras()" title="Volver atrás">←</button>';
  h += '<div class="p-prog"><div style="width:'+progLeccion()+'%"></div></div></div>';
  h += '<div class="p-body"><div class="wrap" style="max-width:520px;margin:0 auto;">';
  let foot = "";

  if(cur.fase===0){ /* APRENDE */
    A_TXT = lec.t+". "+limpiarHTML(lec.txt);
    h += '<span class="paso-tag">📖 Paso 1 · Aprende</span>'+botonAudio();
    h += '<h2 class="lec-tit">'+lec.e+' '+lec.t+'</h2>';
    h += '<div class="charla">'+lec.txt+'</div>';
    if(cur.ni>0 || cur.li>=3) h += '<div class="tip" style="border-left-color:#34a853;background:#e9f7ee">'+notaSheets()+'</div>';
    foot = '<button class="btn btn-verde" onclick="sonido(\'pop\');cur.fase=1;pintarLeccion()">Ver el ejemplo práctico 👉</button>';
  }
  else if(cur.fase===1){ /* EJEMPLO */
    A_TXT = lec.ex.tit+". "+limpiarHTML(lec.ex.desc||"")+" "+(lec.ex.cap?limpiarHTML(lec.ex.cap):"")+(lec.ex.pasos?" Pasos para hacerlo tú: "+lec.ex.pasos.map((p,i)=>"Paso "+(i+1)+": "+limpiarHTML(p)).join(" "):"");
    h += '<span class="paso-tag">🛠️ Paso 2 · Ejemplo práctico</span>'+botonAudio();
    h += '<h2 class="lec-tit">'+lec.ex.tit+'</h2>';
    if(lec.ex.desc) h += '<div class="charla"><p>'+lec.ex.desc+'</p></div>';
    if(lec.ex.antes){
      h += '<div style="text-align:center;font-weight:800;color:var(--rojo);margin-top:14px">😖 ANTES</div>';
      h += hojaExcel({grid:lec.ex.antes, plain:true});
      h += '<div style="text-align:center;font-size:26px;margin:2px 0">⬇️</div>';
      h += '<div style="text-align:center;font-weight:800;color:var(--verde);margin-bottom:2px">😍 DESPUÉS</div>';
    }
    h += hojaExcel(lec.ex);
    if(lec.ex.pasos && lec.ex.pasos.length){
      h += '<div class="pasos"><h4>👉 Hazlo tú, paso a paso:</h4><ol>';
      lec.ex.pasos.forEach(p=>h += '<li>'+p+'</li>');
      h += '</ol></div>';
    }
    if(getPract()) foot = '<button class="btn btn-verde" onclick="sonido(\'pop\');cur.fase=2;cur.intentos=0;pintarLeccion()">¡Ahora te toca a ti! ✍️</button>';
    else foot = '<button class="btn btn-verde" onclick="sonido(\'pop\');cur.fase=3;cur.qi=0;cur.score=0;pintarLeccion()">¡Listo! Vamos al quiz 🎯</button>';
  }
  else if(cur.fase===2){ /* PRÁCTICA INTERACTIVA */
    const pr = getPract();
    A_TXT = "Ahora te toca a ti. "+limpiarHTML(pr.ins)+" Escribe tu respuesta en el recuadro y toca Comprobar. Si necesitas ayuda, toca el botón de pista.";
    h += '<span class="paso-tag">✍️ ¡Te toca! · Escríbelo tú</span>'+botonAudio();
    h += '<div class="q-preg">'+pr.ins+'</div>';
    h += '<div style="background:#0d1117;border-radius:16px;padding:16px;box-shadow:0 6px 20px rgba(0,0,0,.25);border:1px solid #23292f">';
    h += '<div style="display:flex;gap:6px;margin-bottom:12px"><span style="width:11px;height:11px;border-radius:50%;background:#ff5f57"></span><span style="width:11px;height:11px;border-radius:50%;background:#febc2e"></span><span style="width:11px;height:11px;border-radius:50%;background:#28c840"></span><span style="margin-left:auto;color:#8b949e;font-size:12px;font-family:ui-monospace,Menlo,Consolas,monospace">tu-hoja.xlsx</span></div>';
    h += '<div style="display:flex;align-items:center;gap:8px"><span style="color:#7ee787;font-family:ui-monospace,Menlo,Consolas,monospace;font-style:italic">fx</span>';
    h += '<input id="prIn" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="'+(pr.ph||'Escribe aquí la fórmula...')+'" style="flex:1;background:#161b22;border:1.5px solid #30363d;border-radius:10px;padding:13px 14px;font-size:16px;color:#e6edf3;font-family:ui-monospace,Menlo,Consolas,monospace;outline:none" onfocus="this.style.borderColor=\'#28c840\'" onblur="this.style.borderColor=\'#30363d\'"></div>';
    h += '<div style="display:flex;gap:10px;margin-top:12px"><button class="btn" style="flex:1;background:#238636;color:#fff;box-shadow:0 4px 0 #1a6329" onclick="comprobarPractica()">Comprobar ▸</button>';
    h += '<button class="btn" style="flex:none;width:auto;padding:16px 18px;background:#30363d;color:#ffd866;box-shadow:0 4px 0 #1b1f24" onclick="pistaPractica()">💡 Pista</button></div>';
    h += '</div><div id="prFb" style="margin-top:12px"></div>';
    h += '<div class="tip" style="margin-top:14px">💡 No importa si usas mayúsculas o minúsculas, ni los espacios. Puedes separar con ; o con , — como tu app.</div>';
    foot = '<button class="btn btn-gris" id="btnSig" disabled>Comprueba tu respuesta arriba</button>';
  }
  else if(cur.fase===3){ /* QUIZ */
    if(!cur.qOrder || cur.qOrder.length!==lec.quiz.length){
      cur.qOrder = lec.quiz.map((_,i)=>i).sort(()=>Math.random()-0.5);
    }
    const q = lec.quiz[cur.qOrder[cur.qi]];
    if(!cur.perm || cur.permQ!==cur.qi){
      cur.perm = q.o.map((_,i)=>i).sort(()=>Math.random()-0.5);
      cur.permQ = cur.qi;
    }
    h += '<span class="paso-tag">🎯 Quiz · Pregunta '+(cur.qi+1)+' de '+lec.quiz.length+'</span>'+botonAudio();
    h += '<div class="q-preg">'+q.q+'</div><div id="ops">';
    A_TXT = "Pregunta "+(cur.qi+1)+": "+limpiarHTML(q.q)+". "+cur.perm.map((oi,i)=>"Opción "+"ABCD"[i]+": "+limpiarHTML(q.o[oi])).join(". ");
    cur.perm.forEach((oi,i)=>{

    const necesita = Math.ceil(total*0.6);
    const paso = cur.score >= necesita;
    const stars = cur.score===total?3 : cur.score>=necesita+ (total>3?1:0) ?2 : paso?2:1;
    h += '<div class="res-box">';
    if(paso){
      const prev = S.stars[cur.ni+"-"+cur.li]||0;
      S.stars[cur.ni+"-"+cur.li] = Math.max(prev, stars);
      let ganado = 0;
      if(!prev){
        ganado = (cur.pts||0) + 25 + stars*5;
        if(nivelCompleto(cur.ni) && !S.lvlBonus[cur.ni]){ S.lvlBonus[cur.ni]=1; ganado += 150; }

      }
      cur.pts = 0;
      guardar();
      h += '<div class="res-emoji">🎉</div><div class="res-tit">¡Lección superada!</div>';
      h += '<div class="res-stars">'+"⭐".repeat(stars)+"<span style='opacity:.25'>"+"⭐".repeat(3-stars)+"</span>"+'</div>';

      h += '<div class="res-sub">'+(stars===3?"¡Perfecto! Ni una sola falla. 👏":"¡Muy bien! Puedes repetirla luego para ganar las 3 estrellas.")+(ganado?" Ya tienes 🪙 "+fmtPts(S.pts)+" para gastar en la tiendita. 🛍️":"")+'</div>';
      h += '<div class="res-score">Acertaste '+cur.score+' de '+total+'</div>';
      foot = '<button class="btn btn-verde" onclick="siguiente()">Continuar 👉</button>';
      setTimeout(()=>reaccion("fiesta"), 500);
      if(nivelCompleto(cur.ni)){ sonido("nivel"); lloverConfeti(); }
      else if(ganado){ sonido("estrella"); setTimeout(()=>sonido("moneda"),260); }
    }else{
      h += '<div class="res-emoji">💪</div><div class="res-tit">¡Casi! Inténtalo otra vez</div>';
      h += '<div class="res-sub">Acertaste '+cur.score+' de '+total+'. Necesitas '+necesita+' para pasar. Repasa el ejemplo y verás que sí puedes.</div>';
      foot = '<button class="btn btn-verde" onclick="cur.fase=1;pintarLeccion()">Repasar el ejemplo 📖</button>'
           + '<button class="btn btn-blanco" onclick="cur.fase=3;cur.qi=0;cur.score=0;cur.perm=null;cur.qOrder=null;pintarLeccion()">Repetir el quiz 🎯</button>';
    }
    h += '</div>';
  }

  h += '</div></div><div class="p-foot">'+foot+'</div>'+mascotaHTML()+'</div>';

function pistaQuiz(){
  if(S.pts < 15){ alert("🪙 La pista cuesta 15 monedas y tienes "+fmtPts(S.pts)+". ¡Responde lecciones para ganar más!"); return; }
  const lec = DATA[cur.ni].lecciones[cur.li];
  const q = lec.quiz[cur.qOrder ? cur.qOrder[cur.qi] : cur.qi];
  S.pts -= 15; guardar();
  cur.hintQ = true;
  const malas = [];
  cur.perm.forEach((oi,j)=>{ if(oi!==q.c) malas.push(j); });
  malas.sort(()=>Math.random()-0.5);
  malas.slice(0,2).forEach(j=>{
    const b = document.getElementById("op"+j);
    b.disabled = true; b.classList.add("apagada");
    b.style.textDecoration = "line-through";
  });
  const bp = document.getElementById("btnPista");
  if(bp) bp.remove();
  reaccion("amor");
}
function responder(i){
  cur.hintQ = false;
  const lec = DATA[cur.ni].lecciones[cur.li];
  const q = lec.quiz[cur.qOrder ? cur.qOrder[cur.qi] : cur.qi];
  cur.perm.forEach((oi,j)=>{
    const b = document.getElementById("op"+j);
    b.disabled = true;
    if(oi===q.c) b.classList.add("ok");
    else if(j===i) b.classList.add("mal");
    else b.classList.add("apagada");
  });
  const ok = cur.perm[i]===q.c;
  if(ok){ cur.score++; cur.pts = (cur.pts||0)+10; }
  if(navigator.vibrate) navigator.vibrate(ok?30:[60,40,60]);
  sonido(ok?"acierto":"error");
  reaccion(ok?"feliz":"triste");
  const bp = document.getElementById("btnPista"); if(bp) bp.remove();
  A_TXT = (ok?"¡Correcto! ":"Esa no era. La respuesta correcta es: "+limpiarHTML(q.o[q.c])+". ")+limpiarHTML(q.fb);
  document.getElementById("fb").innerHTML =
    '<div class="q-fb '+(ok?"ok":"mal")+'"><b>'+(ok?"✅ ¡Correcto! +10 🪙":"❌ No era esa")+'</b>'+q.fb+'</div>';
  const btn = document.getElementById("btnSig");
  btn.className = "btn btn-verde"; btn.disabled = false;
  btn.textContent = (cur.qi < lec.quiz.length-1) ? "Siguiente pregunta 👉" : "Ver mi resultado 🏁";
  btn.onclick = ()=>{
    if(cur.qi < lec.quiz.length-1){ cur.qi++; pintarLeccion(); }
    else { cur.fase=4; pintarLeccion(); }
  };
}

function siguiente(){
  sonido("pop");
  const ni = cur.ni, li = cur.li;
  const niv = DATA[ni];
  if(li < niv.lecciones.length-1){ cur = {ni, li:li+1, fase:0, qi:0, score:0, intentos:0}; pintarLeccion(); }
  else if(ni>0 && nivelCompleto(ni)){ cerrarLeccion(); abrirCert(ni); }
  else cerrarLeccion();
}

/* =========================================================
   HOJA DE EXCEL SIMULADA
   ========================================================= */
function hojaExcel(ex){
  if(!ex.grid) return "";
  const nc = Math.max(...ex.grid.map(f=>f.length));
  const letras = "ABCDEFGH".slice(0,nc).split("");
  let h = '<div class="xl"><div class="xl-top"><div class="xl-name"><span style="background:#e05353"></span><span style="background:#ffc800"></span><span style="background:#39b45e"></span></div>';
  h += '<div class="xl-fx"><b>fx</b> '+(ex.formula||"")+'</div></div>';
  h += '<table class="xl-grid"><tr><th></th>';
  letras.forEach(l=>h+='<th>'+l+'</th>');
  h += '</tr>';
  ex.grid.forEach((fila,fi)=>{
    h += '<tr><th>'+(fi+1)+'</th>';
    for(let c=0;c<nc;c++){
      let v = fila[c]!==undefined?fila[c]:"";
      let cls = [];
      if(fi===0 && v!=="" && !ex.plain) cls.push("hdr");
      if(typeof v==="number" || /^[$%]?[\d.,]+%?$/.test(v)) cls.push("num");
      const ref = letras[c]+(fi+1);
      if(ex.sel===ref) cls.push("sel");
      if(ex.res && ex.res.includes(ref)) cls.push("res");
      h += '<td class="'+cls.join(" ")+'">'+v+'</td>';
    }
    h += '</tr>';
  });
  h += '</table>';
  if(ex.cap) h += '<div class="xl-cap">💡 '+ex.cap+'</div>';
  h += '</div>';
  return h;
}

function comprar(id){
  const x = item(id);
  if(S.pts < x.p){ alert("🪙 Te faltan "+fmtPts(x.p-S.pts)+" monedas. ¡Unas leccioncitas más y es tuyo!"); return; }
  S.pts -= x.p;
  S.buys.push(id);
  S.equip[x.slot] = id;
  guardar();
  sonido("compra");
  lloverConfeti();
  pintarTienda();
}
function equipar(id){
  const x = item(id);
  if(!S.buys.includes(id)) return;
  sonido("pop");
  if(S.equip[x.slot]===id && x.slot!=="base") S.equip[x.slot] = null;
  else S.equip[x.slot] = id;
  guardar();
  pintarTienda();
}

function limpiarHTML(s){
  return String(s||"")

    .replace(/\s+/g," ").trim();

/* =========================================================
   SONIDOS (Web Audio, generados en vivo — sin archivos)
   ========================================================= */
let AC = null;
function ac(){
  if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=null; } }
  if(AC && AC.state==="suspended") AC.resume();
  return AC;
}
// una nota con envolvente suave (ataque/caída) para que suene placentero
function tono(freq, t0, dur, tipo, vol){
  const a = ac(); if(!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = tipo||"sine"; o.frequency.value = freq;
  const start = a.currentTime + t0;
  g.gain.setValueAtTime(0, start);
  g.gain.linearRampToValueAtTime(vol||0.16, start+0.012);      // ataque suave
  g.gain.exponentialRampToValueAtTime(0.0001, start+dur);       // caída natural
  o.connect(g); g.connect(a.masterGain||a.destination);
  o.start(start); o.stop(start+dur+0.02);
}
function sonido(tipo){
  if(S.mute) return;
  const a = ac(); if(!a) return;
  if(!a.masterGain){ a.masterGain = a.createGain(); a.masterGain.gain.value = 0.9; a.masterGain.connect(a.destination); }
  switch(tipo){
    case "acierto": // arpegio mayor ascendente, brillante y satisfactorio
      [523.25,659.25,783.99].forEach((f,i)=>tono(f,i*0.075,0.28,"triangle",0.18));
      tono(1046.5,0.16,0.5,"sine",0.10); break;
    case "practica": // campanita doble alegre
      tono(880,0,0.18,"triangle",0.16); tono(1174.7,0.09,0.35,"sine",0.14); break;
    case "error": // dos notas graves suaves (no agresivo)
      tono(311.13,0,0.16,"sine",0.15); tono(233.08,0.12,0.28,"sine",0.15); break;
    case "moneda": // "cha-ching" cristalino
      tono(1318.5,0,0.09,"square",0.09); tono(1975.5,0.06,0.18,"square",0.08); break;
    case "click": // toque corto y limpio
      tono(660,0,0.06,"sine",0.12); break;
    case "pop": // burbuja para avanzar
      tono(392,0,0.07,"sine",0.14); tono(587.33,0.05,0.12,"sine",0.12); break;
    case "compra": // registradora feliz
      [659.25,830.61,987.77,1318.5].forEach((f,i)=>tono(f,i*0.06,0.22,"triangle",0.15)); break;
    case "nivel": // fanfarria de victoria
      [523.25,659.25,783.99,1046.5].forEach((f,i)=>tono(f,i*0.12,0.5,"triangle",0.2));
      tono(1567.98,0.48,0.7,"sine",0.13); break;
    case "estrella": // destello agudo
      tono(1568,0,0.12,"triangle",0.12); tono(2093,0.08,0.25,"sine",0.09); break;
  }
}
function toggleMute(){
  S.mute = !S.mute; guardar();
  if(!S.mute) sonido("click");
  const b = document.getElementById("btnMute");
  if(b) b.textContent = S.mute ? "🔇" : "🔊";
  renderHome();
}

function cargarVoces(){ if(window.speechSynthesis) VOCES = speechSynthesis.getVoices()||[]; }
if(window.speechSynthesis){ cargarVoces(); speechSynthesis.onvoiceschanged = cargarVoces; }
function mejorVozHombre(){
  cargarVoces();
  const es = VOCES.filter(v=>v.lang && v.lang.toLowerCase().startsWith("es"));
  // 1) nombres típicos de voz masculina en español
  const pistasH = ["jorge","diego","carlos","juan","pablo","miguel","enrique","male","hombre","raul","raúl","gonzalo","andres","andrés"];
  let v = es.find(x=> pistasH.some(p=> x.name.toLowerCase().includes(p)) );
  // 2) español latino cualquiera
  if(!v) v = es.find(x=>/es-(us|mx|co|la|419)/i.test(x.lang));
  // 3) cualquier español
  if(!v) v = es[0];
  return v||null;
}
function hablar(txt){
  if(!window.speechSynthesis){ alert("Tu navegador no tiene lector de voz. Prueba con Chrome desde tu celular."); return; }
  const s = window.speechSynthesis;
  if(s.speaking){ s.cancel(); marcarAudio(false); return; }
  const u = new SpeechSynthesisUtterance(txt);
  u.lang = "es-US";
  u.rate = S.voz||1.35;       // velocidad (rápido tipo TikTok)
  u.pitch = 0.8;              // tono más grave = más masculino
  const v = mejorVozHombre();
  if(v){ u.voice = v; u.lang = v.lang; }
  u.onend = ()=>marcarAudio(false);
  u.onerror = ()=>marcarAudio(false);
  marcarAudio(true);
  s.speak(u);
}
function marcarAudio(on){
  const b = document.getElementById("btnAudio");
  if(b){ b.classList[on?"add":"remove"]("sonando"); b.innerHTML = on?'⏸️ Pausar audio':'🔊 Escuchar explicación'; }
}
function hablarActual(){ hablar(A_TXT); }
function cambiarVel(){
  const vels = [1, 1.35, 1.7, 2];
  const et = {1:"Normal",1.35:"Rápido",1.7:"Muy rápido",2:"Turbo"};
  let i = vels.indexOf(S.voz); if(i<0) i=1;
  i = (i+1)%vels.length; S.voz = vels[i]; guardar();
  const b = document.getElementById("btnVel"); if(b) b.textContent = "⚡ "+et[S.voz];
  if(window.speechSynthesis && speechSynthesis.speaking){ speechSynthesis.cancel(); hablarActual(); }
}
function botonAudio(){
  const et = {1:"Normal",1.35:"Rápido",1.7:"Muy rápido",2:"Turbo"};
  return '<div class="audio-bar"><button class="btn-audio" id="btnAudio" onclick="hablarActual()">🔊 Escuchar explicación</button>'
       + '<button class="btn-vel" id="btnVel" onclick="cambiarVel()">⚡ '+(et[S.voz]||"Rápido")+'</button></div>';
}
function pararAudio(){ if(window.speechSynthesis && speechSynthesis.speaking) speechSynthesis.cancel(); }

    [{v:"Sueldo"},{v:"1.400.000"},{v:""}],
    [{v:"Ventas extra"},{v:"300.000"},{v:""}],
    [{v:"Arriendo"},{v:""},{v:"500.000"}],
    [{v:"Mercado"},{v:""},{v:"450.000"}],

function retoById(id){ return RETOS.find(r=>r.id===id); }
let retoActual = null, retoInputs = {};

function abrirRetos(){
  sonido("click");
  let h = '<div class="pantalla"><div class="p-head"><button class="btn-x" onclick="cerrarLeccion()">✕</button><div style="font-weight:800">🧩 Retos: Arma la tabla</div></div>';
  h += '<div class="p-body"><div style="max-width:520px;margin:0 auto">';
  h += '<div class="charla" style="margin-bottom:14px"><p><b>¡El examen final de verdad!</b> 💪 Aquí no eliges: <b>tú armas la tabla completa</b>, como en la vida real. Escribe los datos y las fórmulas que faltan. Cada reto terminado te da monedas 🪙.</p></div>';
  RETOS.forEach(r=>{
    const hecho = (S.retos||{})[r.id];
    h += '<button class="nivel-head" style="width:100%;text-align:left;border:none;cursor:pointer;'+(hecho?'border-left-color:var(--verde)':'')+'" onclick="empezarReto(\''+r.id+'\')">';
    h += '<div class="nh-ico">'+r.ico+'</div><div style="flex:1"><div class="nh-tit">'+r.nombre+'</div><div class="nh-sub">'+(hecho?'✅ Completado':'🪙 '+r.premio+' monedas al terminar')+'</div></div><div style="font-size:22px">'+(hecho?'🏆':'▸')+'</div></button>';
  });
  h += '</div></div>'+mascotaHTML()+'</div>';
  document.getElementById("pantallas").innerHTML = h;
}
function empezarReto(id){
  sonido("pop");
  retoActual = retoById(id); retoInputs = {};
  pintarReto();
}
function celdaId(fi,ci){ return "r_"+fi+"_"+ci; }
function pintarReto(){
  pararAudio();
  const r = retoActual;
  const letras = "ABCDEFGH".split("");
  let h = '<div class="pantalla"><div class="p-head"><button class="btn-x" onclick="abrirRetos()">←</button><div style="font-weight:800">'+r.ico+' '+r.nombre+'</div></div>';
  h += '<div class="p-body"><div style="max-width:520px;margin:0 auto">';
  A_TXT = r.nombre+". "+limpiarHTML(r.intro);
  h += botonAudio();
  h += '<div class="charla" style="margin-bottom:14px"><p>'+r.intro+'</p></div>';
  // tabla editable
  h += '<div class="xl"><table class="xl-grid"><tr><th></th>';
  r.cols.forEach((c,i)=>h+='<th>'+letras[i]+'</th>');
  h += '</tr><tr><th>1</th>';
  r.cols.forEach(c=>h+='<td class="hdr">'+c+'</td>');
  h += '</tr>';
  r.filas.forEach((fila,fi)=>{
    h += '<tr><th>'+(fi+2)+'</th>';
    fila.forEach((cel,ci)=>{
      if(cel.b){
        const id = celdaId(fi,ci);
        h += '<td style="padding:2px"><input id="'+id+'" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="'+(cel.ph||'')+'" style="width:100%;min-width:82px;border:2px solid var(--amarillo);border-radius:8px;padding:8px 6px;font-size:13.5px;font-family:ui-monospace,Menlo,Consolas,monospace;text-align:center;background:#fffdf5" value="'+(retoInputs[id]||"")+'"></td>';
      } else {
        h += '<td class="'+(/^[$\d.,%]+$/.test(cel.v)?'num':'')+'">'+(cel.v||"")+'</td>';
      }
    });
    h += '</tr>';
  });
  h += '</table></div>';
  if(r.extra){
    h += '<div style="background:#fff;border-radius:14px;padding:14px;box-shadow:0 3px 10px rgba(0,0,0,.05);margin-top:12px">';
    if(r.cierre) h += '<p style="margin:0 0 8px;font-weight:700">'+r.cierre+'</p>';
    h += '<b style="font-size:14.5px">'+r.extra.label+'</b>';
    h += '<input id="r_extra" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="'+(r.extra.ph||'')+'" style="width:100%;border:2px solid var(--amarillo);border-radius:10px;padding:11px;font-size:15px;font-family:ui-monospace,Menlo,Consolas,monospace;margin-top:8px;background:#fffdf5" value="'+(retoInputs["r_extra"]||"")+'">';
    h += '</div>';
  }
  h += '<div id="retoFb" style="margin-top:14px"></div>';
  h += '</div></div><div class="p-foot"><button class="btn btn-verde" onclick="revisarReto()">✅ Revisar mi tabla</button></div>'+mascotaHTML()+'</div>';
  document.getElementById("pantallas").innerHTML = h;
}
function revisarReto(){
  const r = retoActual;
  let total=0, bien=0, primerFallo=null;
  const marcar=(id, ans)=>{
    total++;
    const el = document.getElementById(id);
    retoInputs[id] = el.value;
    const val = normPr(el.value);
    let ok = ans.some(a=>{ const n=normPr(a); return val===n || val===n.split(";").join(","); });
    el.style.borderColor = ok? "var(--verde)" : "var(--rojo)";
    el.style.background = ok? "#f2fbf6" : "#fdecec";
    if(ok) bien++; else if(!primerFallo) primerFallo = id;
  };
  r.filas.forEach((fila,fi)=>fila.forEach((cel,ci)=>{ if(cel.b) marcar(celdaId(fi,ci), cel.ans); }));
  if(r.extra) marcar("r_extra", r.extra.ans);
  const fb = document.getElementById("retoFb");
  if(bien===total){
    sonido("nivel"); lloverConfeti(); reaccion("fiesta");
    let premio = 0;
    if(!(S.retos||{})[r.id]){ if(!S.retos) S.retos={}; S.retos[r.id]=1; S.pts += r.premio; premio = r.premio; guardar(); }
    fb.innerHTML = '<div class="q-fb ok"><b>🏆 ¡TABLA PERFECTA!</b>Armaste toda la tabla como un profesional.'+(premio?' Ganaste 🪙 '+premio+' monedas.':' (Ya la habías completado antes)')+'</div>'
      + '<button class="btn btn-verde" style="margin-top:12px" onclick="abrirRetos()">Volver a los retos 🧩</button>';
  } else {
    sonido("error"); reaccion("triste");
    // buscar la pista del primer fallo
    let hint = "Revisa las celdas en rojo e intenta de nuevo.";
    r.filas.forEach((fila,fi)=>fila.forEach((cel,ci)=>{ if(cel.b && celdaId(fi,ci)===primerFallo && cel.hint) hint=cel.hint; }));
    if(r.extra && primerFallo==="r_extra" && r.extra.hint) hint = r.extra.hint;
    fb.innerHTML = '<div class="q-fb mal"><b>💪 Vas '+bien+' de '+total+'. ¡Casi!</b>Las celdas en rojo hay que corregirlas. 💡 Pista: '+hint+'</div>';
  }
}

/* =========================================================
   MASCOTA COMPAÑERA (te acompaña en todo)
   ========================================================= */
function mascotaHTML(){
  return '<div class="mascota" id="mascota" onmousedown="pokeIni(event)" onmouseup="pokeFin(event)" ontouchstart="pokeIni(event)" ontouchend="pokeFin(event)"><div class="burbuja" id="mBur">👋 ¡Hola!</div>'+avatarHTML()+'</div>';
}
let pokeT = 0, pokeTouch = false;
function pokeIni(e){
  if(e.type==="touchstart") pokeTouch = true;
  else if(pokeTouch) return;
  pokeT = Date.now();
}
function pokeFin(e){
  if(e.type==="mouseup" && pokeTouch){ pokeTouch=false; return; }
  if(e.type==="touchend") pokeTouch = false;
  const dur = Date.now()-pokeT;
  if(dur>=450) reaccion("amor");   // caricia: mantener presionado
  else reaccion("molesto");        // toque rápido: se molesta
  if(navigator.vibrate) navigator.vibrate(dur>=450?[20,30,20]:50);
}
function reaccion(tipo){
  const m = document.getElementById("mascota");
  if(!m) return;
  const bur = document.getElementById("mBur");
  const em = {
    feliz:["🎉 ¡Eso!","😄 ¡Bien!","👏 ¡Duro!","⭐ ¡Crack!"],
    molesto:["💢 ¡Ey!","😤 ¡Suave!","😾 ¡No me piques!","💢 ¡Ay!"],
    amor:["❤️ Mmm...","🥰 ¡Rico!","💚 Te quiero","✨ Más porfa"],
    triste:["💧 Uy...","😟 Casi...","💪 ¡Tú puedes!","🫂 Tranqui"],
    fiesta:["🏆 ¡GANASTE!","🎊 ¡GRANDE!","🥳 ¡WEPA!"]
  };
  const arr = em[tipo]||em.feliz;
  if(bur) bur.textContent = arr[Math.floor(Math.random()*arr.length)];
  m.classList.remove("feliz","molesto","amor","hablando");
  void m.offsetWidth;
  m.classList.add("hablando", tipo==="triste"?"molesto":(tipo==="fiesta"?"feliz":tipo));
  clearTimeout(m._t);
  m._t = setTimeout(()=>{ m.classList.remove("hablando","feliz","molesto","amor"); }, 1500);
}

   EXTRAS

function lloverConfeti(){
  const em = ["🎉","🎊","⭐","✨","🥳"];
  for(let i=0;i<30;i++){
    const s = document.createElement("div");
    s.className = "confeti";
    s.textContent = em[i%em.length];
    s.style.left = Math.random()*100+"vw";
    s.style.animationDuration = (2+Math.random()*2)+"s";
    s.style.animationDelay = (Math.random()*0.8)+"s";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 5000);
  }
}

function pedirNombre(){
  if(S.nombre) return;
  const v = document.createElement("div");
  v.className = "velo";
  v.innerHTML = '<div class="modal"><div style="font-size:50px">📊</div><h2>¡Bienvenido(a) a Excel para Todos!</h2><p>El curso gratis del canal de <b>Iván Rodríguez</b> para aprender Excel y Google Sheets desde tu celular, paso a paso y sin enredos. ¿Cómo te llamas?</p><input id="miNombre" placeholder="Tu nombre"><button class="btn btn-verde" onclick="guardarNombre()">¡Empezar a aprender! 🚀</button></div>';
  document.body.appendChild(v);
}
function guardarNombre(){
  const n = document.getElementById("miNombre").value.trim();
  if(!n){ alert("✍️ Cuéntanos tu nombre para empezar."); return; }
  S.nombre = n; guardar();
  document.querySelector(".velo").remove();
  renderHome();
}

renderHome();
pedirNombre();
